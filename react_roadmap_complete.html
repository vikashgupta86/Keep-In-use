<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>React Zero to Hero — Complete Roadmap</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #212529; }

  .roadmap-container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }

  .header-section { text-align: center; padding: 2rem 1rem 1.5rem; background: #fff; border-radius: 12px; border: 1px solid #dee2e6; margin-bottom: 1.5rem; }
  .header-section h1 { font-size: 24px; font-weight: 600; margin-bottom: 0.5rem; }
  .header-section p { font-size: 14px; color: #6c757d; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: #fff; border: 1px solid #dee2e6; border-radius: 10px; padding: 1rem; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 600; }
  .stat-label { font-size: 12px; color: #6c757d; margin-top: 2px; }
  .stat-card.blue .stat-num { color: #0d6efd; }
  .stat-card.green .stat-num { color: #198754; }
  .stat-card.amber .stat-num { color: #fd7e14; }
  .stat-card.red .stat-num { color: #dc3545; }
  .stat-card.purple .stat-num { color: #6f42c1; }

  .progress-section { background: #fff; border: 1px solid #dee2e6; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
  .progress-label span:last-child { color: #6c757d; font-weight: 400; }
  .progress { height: 8px; border-radius: 4px; background: #e9ecef; }
  .progress-bar { background: #198754; border-radius: 4px; transition: width 0.3s; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filter-btn { font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 1px solid #dee2e6; cursor: pointer; background: #fff; color: #6c757d; transition: all 0.15s; }
  .filter-btn:hover { border-color: #adb5bd; color: #212529; }
  .filter-btn.active { font-weight: 500; }
  .filter-btn.all.active { background: #212529; color: #fff; border-color: #212529; }
  .filter-btn.ph1.active { background: #cfe2ff; color: #084298; border-color: #9ec5fe; }
  .filter-btn.ph2.active { background: #d1e7dd; color: #0a3622; border-color: #a3cfbb; }
  .filter-btn.ph3.active { background: #fff3cd; color: #664d03; border-color: #ffda6a; }
  .filter-btn.ph4.active { background: #ffe5d0; color: #6a2c0a; border-color: #ffb380; }
  .filter-btn.ph5.active { background: #e8d5f5; color: #4a1c7c; border-color: #c49ee0; }
  .filter-btn.ph6.active { background: #ffd6e0; color: #7c1c35; border-color: #f5a0b5; }
  .filter-btn.ph7.active { background: #d0f0ff; color: #0c4a6e; border-color: #7dd3fc; }
  .filter-btn.ph8.active { background: #dcfce7; color: #14532d; border-color: #86efac; }

  .phase-divider { font-size: 12px; font-weight: 600; color: #6c757d; padding: 12px 0 6px; text-transform: uppercase; letter-spacing: 1px; }

  .task-card { background: #fff; border: 1px solid #dee2e6; border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
  .task-card:hover { border-color: #adb5bd; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .task-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; }
  .level-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .ph1 .level-badge { background: #cfe2ff; color: #084298; }
  .ph2 .level-badge { background: #d1e7dd; color: #0a3622; }
  .ph3 .level-badge { background: #fff3cd; color: #664d03; }
  .ph4 .level-badge { background: #ffe5d0; color: #6a2c0a; }
  .ph5 .level-badge { background: #e8d5f5; color: #4a1c7c; }
  .ph6 .level-badge { background: #ffd6e0; color: #7c1c35; }
  .ph7 .level-badge { background: #d0f0ff; color: #0c4a6e; }
  .ph8 .level-badge { background: #dcfce7; color: #14532d; }

  .task-title { flex: 1; font-size: 14px; font-weight: 500; }
  .concept-tag { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6; }
  .industry-tag { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: #fff3cd; color: #664d03; border: 1px solid #ffda6a; font-weight: 600; }
  .expand-icon { font-size: 18px; color: #adb5bd; transition: transform 0.2s; display: inline-block; }
  .task-card.open .expand-icon { transform: rotate(180deg); }

  .task-body { display: none; border-top: 1px solid #dee2e6; padding: 18px; }
  .task-card.open .task-body { display: block; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .info-block { background: #f8f9fa; border-radius: 8px; padding: 12px 14px; }
  .info-block.full { grid-column: 1 / -1; }
  .info-label { font-size: 11px; color: #6c757d; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .info-value { font-size: 13px; color: #212529; line-height: 1.6; }

  .html-template { background: #1e1e2e; border-radius: 8px; padding: 14px; margin: 10px 0; overflow-x: auto; }
  .html-template pre { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; color: #cdd6f4; white-space: pre; line-height: 1.7; margin: 0; }
  .ht { color: #f38ba8; }
  .ha { color: #a6e3a1; }
  .hv { color: #fab387; }
  .hc { color: #6c7086; }

  .checklist { list-style: none; padding: 0; }
  .checklist li { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; font-size: 13px; border-bottom: 1px solid #f1f3f5; }
  .checklist li:last-child { border-bottom: none; }
  .check-box { width: 18px; height: 18px; border: 2px solid #ced4da; border-radius: 4px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-box:hover { border-color: #198754; }
  .check-box.checked { background: #198754; border-color: #198754; color: #fff; font-size: 11px; }

  .interview-box { background: #f0f0ff; border-radius: 8px; padding: 12px 14px; border-left: 4px solid #6f42c1; margin-bottom: 12px; }
  .interview-box .info-label { color: #6f42c1; }
  .interview-box .info-value { color: #3d2a6e; }

  .resources-box { background: #fff8e1; border-radius: 8px; padding: 12px 14px; border-left: 4px solid #fd7e14; margin-bottom: 12px; }
  .resources-box .info-label { color: #c85a00; }
  .resources-box .info-value { color: #5c3800; }

  .action-btn { display: inline-block; margin-top: 14px; font-size: 13px; padding: 8px 20px; border-radius: 8px; border: 1px solid #0d6efd; background: #0d6efd; color: #fff; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .action-btn:hover { background: #0b5ed7; color: #fff; }

  /* Industry section banner */
  .industry-banner { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-radius: 12px; padding: 1.5rem; margin: 2rem 0 1.5rem; color: #fff; text-align: center; }
  .industry-banner h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .industry-banner p { font-size: 13px; color: #a0aec0; margin-bottom: 1rem; }
  .industry-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .industry-stat { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; text-align: center; }
  .industry-stat .num { font-size: 20px; font-weight: 700; color: #68d391; }
  .industry-stat .lbl { font-size: 11px; color: #a0aec0; margin-top: 2px; }

  .truth-alert { background: #fff8e1; border: 1px solid #ffda6a; border-radius: 10px; padding: 12px 16px; margin-bottom: 1.5rem; font-size: 13px; color: #5c3800; }
  .truth-alert strong { color: #c85a00; }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .task-header { flex-wrap: wrap; gap: 8px; }
    .industry-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="roadmap-container">

  <div class="header-section">
    <h1>⚛️ React Zero to Hero — Complete Roadmap</h1>
    <p>32 tasks &nbsp;·&nbsp; Foundation se Industry-Ready tak &nbsp;·&nbsp; Hinglish guidance</p>
  </div>

  <div class="stats-row">
    <div class="stat-card blue"><div class="stat-num">20</div><div class="stat-label">Foundation Tasks</div></div>
    <div class="stat-card purple"><div class="stat-num">12</div><div class="stat-label">Industry Tasks</div></div>
    <div class="stat-card green"><div class="stat-num" id="done-count">0</div><div class="stat-label">Completed</div></div>
    <div class="stat-card amber"><div class="stat-num">8</div><div class="stat-label">Total Phases</div></div>
  </div>

  <div class="progress-section">
    <div class="progress-label"><span>Overall Progress</span><span id="progress-pct">0 / 32 tasks</span></div>
    <div class="progress"><div class="progress-bar" id="progress-fill" style="width:0%" role="progressbar"></div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn all active" onclick="filterPhase('all', this)">All</button>
    <button class="filter-btn ph1" onclick="filterPhase(1, this)">🔵 Phase 1: Foundation</button>
    <button class="filter-btn ph2" onclick="filterPhase(2, this)">🟢 Phase 2: Interaction</button>
    <button class="filter-btn ph3" onclick="filterPhase(3, this)">🟡 Phase 3: Data & Routing</button>
    <button class="filter-btn ph4" onclick="filterPhase(4, this)">🟠 Phase 4: Advanced</button>
    <button class="filter-btn ph5" onclick="filterPhase(5, this)">🟣 Phase 5: TypeScript</button>
    <button class="filter-btn ph6" onclick="filterPhase(6, this)">🔴 Phase 6: Testing</button>
    <button class="filter-btn ph7" onclick="filterPhase(7, this)">🩵 Phase 7: Next.js</button>
    <button class="filter-btn ph8" onclick="filterPhase(8, this)">🟩 Phase 8: Interview Prep</button>
  </div>

  <div id="tasks-container"></div>

</div>

<script>
const tasks = [
  /* ───── ORIGINAL 20 TASKS ───── */
  {
    level:1, phase:1, concept:"JSX", prev:"—",
    name:"My Visiting Card",
    scenario:"Ek simple visiting card banana hai jisme naam, designation, aur contact info ho — bilkul real business card jaisa.",
    html:`<div class="card text-center p-4 shadow-sm">\n  <h2>Rahul Sharma</h2>\n  <p class="text-muted">Full Stack Developer</p>\n  <p>📧 rahul@email.com</p>\n  <p>📱 +91 98765 43210</p>\n</div>`,
    goal:"Sirf JSX use karke ek functional component banao jo visiting card render kare. className use karo, multiple elements return karo ek parent div mein.",
    interview:"JSX ek syntax extension hai jo JavaScript mein HTML likhne deta hai. Ye React.createElement() mein compile hota hai. Main isme className use karta hoon kyunki class JavaScript mein reserved word hai. JSX expressions curly braces {} mein likhte hain.",
    checklist:["JSX return kiya component se?","className use kiya class ki jagah?","Ek hi root element wrap kiya?","Component name capital letter se start?","Fragment (<>) try kiya?"],
    output:"Screen pe visiting card dikhna chahiye with name, role, email — styled."
  },
  {
    level:2, phase:1, concept:"Components",prev:"JSX",
    name:"Product Card App",
    scenario:"Amazon jaisi app mein product cards alag-alag components mein todna — reusable architecture.",
    html:`<div class="card mb-3" style="max-width:300px">\n  <img src="https://via.placeholder.com/300x200" class="card-img-top"/>\n  <div class="card-body">\n    <h5 class="card-title">Wireless Headphones</h5>\n    <p class="text-muted">Rs. 2,499</p>\n    <button class="btn btn-primary">Buy Now</button>\n  </div>\n</div>`,
    goal:"App, ProductCard, aur ProductList — teen alag components banao. App → ProductList → ProductCard hierarchy maintain karo. Sirf hardcoded data use karo abhi.",
    interview:"Components React ke building blocks hain. Main UI ko chhote-chhote reusable pieces mein todta hoon. Har component ek kaam karta hai — Single Responsibility Principle. Functional components prefer karta hoon class components pe.",
    checklist:["3 alag component files banaye?","Component dusre mein import kiya?","Component tree banaya (App > List > Card)?","Har component ek kaam karta?","Components reusable hain?"],
    output:"3 product cards ek grid mein dikhe, alag-alag components se render hon."
  },
  {
    level:3, phase:1, concept:"Props", prev:"JSX + Components",
    name:"Reusable Alert Box",
    scenario:"Success, Warning, Error — ek hi component se alag-alag alerts banana. Notification system jaisa.",
    html:`<div class="alert alert-success" role="alert">\n  ✅ Order placed successfully!\n</div>\n<div class="alert alert-danger" role="alert">\n  ❌ Payment failed. Try again.\n</div>\n<div class="alert alert-warning" role="alert">\n  ⚠️ Low stock remaining.\n</div>`,
    goal:"Ek Alert component banao jo type='success'|'warning'|'danger' aur message prop le. Props se color aur icon dynamically change ho. Default props bhi define karo.",
    interview:"Props parent se child ko data bhejne ka tarika hai — unidirectional data flow. Ye read-only hote hain, child inhe change nahi kar sakta. Main inhe destructure karta hoon clarity ke liye. PropTypes ya TypeScript se type safety add karta hoon.",
    checklist:["Component props accept karta hai?","Parent se alag-alag values pass kiye?","Props destructure kiya?","Default prop value di?","3 alag alert types kaam kar rahe?"],
    output:"Teen alag colored alert boxes — ek hi component se, alag props se."
  },
  {
    level:4, phase:1, concept:"useState", prev:"JSX + Components + Props",
    name:"Like Button Counter",
    scenario:"Twitter/Instagram jaisa Like button jisme click count badhta rahe.",
    html:`<div class="text-center p-5">\n  <button class="btn btn-outline-danger btn-lg">\n    ❤️ Like &nbsp;<span class="badge bg-danger">0</span>\n  </button>\n  <p class="text-muted mt-2">Be the first to like!</p>\n</div>`,
    goal:"useState hook se like count track karo. Button click pe count +1 ho. State change pe component re-render ho automatically. Unlike functionality bhi add karo.",
    interview:"useState ek Hook hai jo functional component mein state store karta hai. Jab state change hoti hai React sirf us component ko re-render karta hai. useState array destructuring return karta hai — [value, setter]. State directly mutate nahi karte, setter function use karte hain.",
    checklist:["useState import kiya?","Initial state set ki?","Setter function use kiya?","State directly mutate nahi ki?","Re-render ho raha state change pe?"],
    output:"Button click pe number badhta dikhna chahiye. Unlike pe ghatna chahiye."
  },
  {
    level:5, phase:2, concept:"Events", prev:"JSX + Components + Props + useState",
    name:"Color Theme Switcher",
    scenario:"Dark/Light/Blue mode toggle — settings panel jaisa.",
    html:`<div class="container p-4">\n  <h2 class="mb-3">Theme Switcher</h2>\n  <div class="btn-group mb-3">\n    <button class="btn btn-dark">🌙 Dark</button>\n    <button class="btn btn-light border">☀️ Light</button>\n    <button class="btn btn-primary">🔵 Blue</button>\n  </div>\n  <div class="p-4 rounded bg-dark text-white">\n    <h4>Preview Area</h4>\n    <p>Theme change hone pe ye box update hoga.</p>\n  </div>\n</div>`,
    goal:"onClick event handlers likho. Button click pe state change ho, background color dynamically update ho. Event object (e) bhi use karo. Ek handler mein multiple themes handle karo.",
    interview:"React mein events camelCase mein likhte hain — onClick, onChange, onSubmit. Handler function directly call nahi karte (onClick={fn()} galat hai), reference dete hain (onClick={fn}). Arrow function se arguments pass karte hain: onClick={() => handleTheme('dark')}. React Synthetic Event system use karta hai.",
    checklist:["onClick handler attach kiya?","Arrow function vs reference try kiya?","Event object (e) use kiya?","State update se UI change dikh raha?","Multiple buttons pe alag behavior?"],
    output:"Buttons click karne pe background aur text color change ho immediately."
  },
  {
    level:6, phase:2, concept:"Conditional Rendering", prev:"Previous 5 concepts",
    name:"Login/Logout Dashboard",
    scenario:"Jab user logged in ho — dashboard dikhao. Logged out ho — login prompt.",
    html:`<!-- Logged Out State -->\n<div class="card p-4 text-center">\n  <h4>🔒 Please Login</h4>\n  <p class="text-muted">Access your dashboard</p>\n  <button class="btn btn-primary">Login</button>\n</div>\n<!-- Logged In State -->\n<div class="alert alert-success d-flex justify-content-between">\n  <span>👋 Welcome back, Rahul!</span>\n  <button class="btn btn-sm btn-danger">Logout</button>\n</div>`,
    goal:"isLoggedIn state ke basis pe alag-alag UI render karo. Ternary operator, && operator, aur alag component — teeno try karo. Null return karna bhi seekho.",
    interview:"Conditional rendering ke liye ternary (? :) use karta hoon chhoti conditions mein, aur && operator tab jab sirf ek case render karna ho. Complex cases mein early return ya alag component better rahta hai. null return karne pe kuch render nahi hota.",
    checklist:["Ternary operator use kiya?","&& short-circuit try kiya?","isLoggedIn toggle ho raha?","Dono states ka UI alag hai?","null return karna seekha?"],
    output:"Login button pe dashboard aaye, Logout pe wapas form dikhaye."
  },
  {
    level:7, phase:2, concept:"List Rendering (.map())", prev:"Previous 6 concepts",
    name:"Movie Watchlist",
    scenario:"Netflix jaisa movie list jisme rating aur genre filter bhi ho.",
    html:`<div class="container py-3">\n  <div class="btn-group mb-3">\n    <button class="btn btn-sm btn-outline-secondary">All</button>\n    <button class="btn btn-sm btn-outline-primary">Action</button>\n    <button class="btn btn-sm btn-outline-success">Drama</button>\n  </div>\n  <ul class="list-group">\n    <li class="list-group-item d-flex justify-content-between">\n      <span>🎬 Inception</span>\n      <span class="badge bg-warning text-dark">⭐ 8.8 · Sci-Fi</span>\n    </li>\n  </ul>\n</div>`,
    goal:"Movies array ko .map() se render karo. Har item ka unique key prop do. Genre filter buttons se filtered list dikhao. Empty state bhi handle karo.",
    interview:"List rendering mein .map() use karta hoon jo array ko JSX elements mein convert karta hai. Key prop React ko batata hai kaunsa element change hua — index use karna avoid karta hoon kyunki reordering pe bugs aate hain, unique id better hai.",
    checklist:["Array.map() use kiya?","Key prop diya har item ko?","Key unique hai (id, not index)?","Filter functionality kaam karti?","Empty list case handle kiya?"],
    output:"Movie list render ho. Genre buttons se filter kaam kare. Koi match nahi toh message dikhaye."
  },
  {
    level:8, phase:2, concept:"Forms", prev:"Previous 7 concepts",
    name:"User Registration Form",
    scenario:"Signup form with validation — real apps jaisa controlled form.",
    html:`<form class="p-4 border rounded bg-white shadow-sm">\n  <h4 class="mb-3">Create Account</h4>\n  <div class="mb-3">\n    <label class="form-label">Full Name</label>\n    <input type="text" class="form-control" placeholder="Enter name"/>\n  </div>\n  <div class="mb-3">\n    <label class="form-label">Email</label>\n    <input type="email" class="form-control" placeholder="you@email.com"/>\n  </div>\n  <div class="mb-3">\n    <label class="form-label">Password</label>\n    <input type="password" class="form-control"/>\n  </div>\n  <button type="submit" class="btn btn-success w-100">Register</button>\n</form>`,
    goal:"Controlled components banao — har input ka state ho. onChange se state update ho. onSubmit se data console mein print ho aur validation errors dikhao.",
    interview:"Controlled component mein input ki value state se aati hai, onChange se state update hoti hai — React single source of truth hai. e.preventDefault() form submit pe page reload rokta hai. Uncontrolled components mein DOM ref use hoti hai — wo avoid karta hoon jab tak zarurat na ho.",
    checklist:["Har input ka alag state?","onChange handler kaam karta?","e.preventDefault() lagaya?","Validation errors dikh rahe?","Submit pe data console mein?"],
    output:"Form fill karo, submit pe data print ho. Errors real-time dikhein."
  },
  {
    level:9, phase:2, concept:"Lifting State Up", prev:"Previous 8 concepts",
    name:"Shopping Cart Preview",
    scenario:"Product list aur Cart Summary — dono mein sync data. Sibling communication.",
    html:`<div class="row g-3">\n  <div class="col-8">\n    <h5>Products</h5>\n    <div class="card p-3 mb-2 d-flex flex-row justify-content-between">\n      <span>Laptop Bag — Rs. 799</span>\n      <button class="btn btn-sm btn-primary">+ Add</button>\n    </div>\n  </div>\n  <div class="col-4">\n    <div class="card p-3 border-primary">\n      <h6>🛒 Cart (2 items)</h6>\n      <hr/>\n      <p class="mb-1">Laptop Bag × 1</p>\n      <hr/>\n      <strong>Total: Rs. 1,598</strong>\n    </div>\n  </div>\n</div>`,
    goal:"cartItems state parent (App) mein rakho. ProductList aur CartSummary dono siblings ko props se data aur handler pass karo. Add/Remove buttons se cart real-time update ho.",
    interview:"Jab do sibling components ko same data chahiye, state ko unke common parent mein lift karte hain — State Lifting pattern. Props down, events up. Ye React ka unidirectional data flow maintain karta hai aur single source of truth deta hai.",
    checklist:["State parent mein hai?","Handler function props se pass?","Dono siblings sync mein?","Prop drilling samjha?","Cart total calculate hota?"],
    output:"Product add karo — dono panels immediately sync mein update hon."
  },
  {
    level:10, phase:3, concept:"useEffect", prev:"Previous 9 concepts",
    name:"Live Clock Widget",
    scenario:"Dashboard pe real-time clock jo har second tick kare — memory leak nahi honi chahiye.",
    html:`<div class="card text-center p-5 shadow">\n  <p class="text-muted mb-1">Current Time</p>\n  <h1 class="display-3 fw-bold">12:34:56</h1>\n  <p class="text-muted">Wednesday, 20 May 2026</p>\n  <span class="badge bg-success">🟢 Live</span>\n</div>`,
    goal:"useEffect se setInterval setup karo. Component unmount pe clearInterval cleanup karo. Dependency array [] samjho. Date formatting bhi add karo.",
    interview:"useEffect se side effects handle karta hoon — data fetch, subscriptions, timers, DOM manipulation. Cleanup function return karta hoon memory leaks rokne ke liye. Empty [] matlab effect sirf mount pe chale. Dependencies list mein wo values daalo jinpe effect depend kare.",
    checklist:["useEffect import kiya?","setInterval andar set kiya?","Cleanup function return kiya?","[] dependency array use kiya?","Time seconds mein update hota?"],
    output:"Clock real-time mein tick kare. Browser tab change karne ke baad bhi kaam kare."
  },
  {

    name:"GitHub User Search",

const phaseNames = {

  2:'🟢 Phase 2 — Interaction',

let completedMap = JSON.parse(localStorage.getItem('rz2h_checks_v2') || '{}');

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function colorHtml(raw) {
  const tokens = [];
  let i = 0;
  while (i < raw.length) {
    if (raw[i] === '<') {
      if (raw.slice(i,i+4) === '<!--') {
        const end = raw.indexOf('-->',i);
        const chunk = end === -1 ? raw.slice(i) : raw.slice(i, end+3);
        tokens.push('<span class="hc">' + esc(chunk) + '</span>');
        i += chunk.length;
      } else {
        const end = raw.indexOf('>',i);
        const tag = end === -1 ? raw.slice(i) : raw.slice(i, end+1);
        tokens.push(colorTag(tag));
        i += tag.length;
      }
    } else if (raw[i] === '/' && raw[i+1] === '/') {
      const end = raw.indexOf('\n',i);
      const chunk = end === -1 ? raw.slice(i) : raw.slice(i,end);
      tokens.push('<span class="hc">' + esc(chunk) + '</span>');
      i += chunk.length;
    } else {
      let j = i;
      while (j < raw.length && raw[j] !== '<' && !(raw[j]==='/' && raw[j+1]==='/')) j++;
      tokens.push(esc(raw.slice(i,j)));
      i = j;
    }
  }
  return tokens.join('');
}

function colorTag(tag) {
  let out = '';
  let i = 0;
  if (tag[0] === '<') { out += '<span class="ht">&lt;</span>'; i = 1; }
  let j = i;
  while (j < tag.length && tag[j] !== ' ' && tag[j] !== '>' && tag[j] !== '/') j++;
  out += '<span class="ht">' + esc(tag.slice(i,j)) + '</span>';
  i = j;
  while (i < tag.length) {
    if (tag[i] === '>') { out += '<span class="ht">&gt;</span>'; i++; }
    else if (tag[i] === '/' && tag[i+1] === '>') { out += '<span class="ht">/&gt;</span>'; i+=2; }
    else if (tag[i] === '"') {
      let end = tag.indexOf('"', i+1);
      if (end === -1) end = tag.length - 1;
      out += '<span class="hv">"' + esc(tag.slice(i+1, end)) + '"</span>';
      i = end + 1;
    } else {
      const attrM = tag.slice(i).match(/^([\w-]+)(=?)/);
      if (attrM) {
        const attrs = ['class','id','src','type','href','role','placeholder','width','height','style','alt','for','name','value','target','rel','method','action','data-'];
        const isAttr = attrs.some(a => attrM[1].startsWith(a));
        out += isAttr
          ? '<span class="ha">' + esc(attrM[1]) + '</span>' + attrM[2]
          : esc(attrM[1]) + attrM[2];
        i += attrM[0].length;
      } else {
        out += esc(tag[i]); i++;
      }
    }
  }
  return out;
}

function renderTasks() {
  const container = document.getElementById('tasks-container');
  container.innerHTML = '';
  let lastPhase = null;

  // Industry section banner
  let industryBannerAdded = false;

  tasks.forEach(t => {
    if (currentFilter !== 'all' && t.phase !== currentFilter) return;

    // Add industry section banner before phase 5

      industryBannerAdded = true;
      const banner = document.createElement('div');
      banner.innerHTML = `
        <div class="industry-banner">
          <h2>🏢 Industry-Level Tasks</h2>
          <p>Ye 12 tasks wo cheezein hain jo teri existing roadmap mein nahi hain — lekin companies hire karte waqt expect karti hain</p>

            <div class="industry-stat"><div class="num">70%</div><div class="lbl">Expect tests</div></div>
            <div class="industry-stat"><div class="num">50%</div><div class="lbl">Want Next.js</div></div>
            <div class="industry-stat"><div class="num">100%</div><div class="lbl">Need Git workflow</div></div>

        </div>`;
      container.appendChild(banner);
      lastPhase = null;
    }

    if (t.phase !== lastPhase) {
      const d = document.createElement('div');
      d.className = 'phase-divider';
      d.textContent = phaseNames[t.phase];
      container.appendChild(d);
      lastPhase = t.phase;
    }

    const key = `task_${t.level}`;
    const checks = completedMap[key] || [];
    const allDone = t.checklist.length > 0 && checks.length >= t.checklist.length && t.checklist.every((_,i) => checks[i]);
    const card = document.createElement('div');
    card.className = `task-card ${phaseClass[t.phase]}`;
    card.id = `task-${t.level}`;

    const checkHtml = t.checklist.map((item,i) => {
      const chk = checks[i] ? 'checked' : '';
      return `<li><div class="check-box ${chk}" onclick="toggleCheck(${t.level},${i},this)">${chk ? '✓' : ''}</div><span>${esc(item)}</span></li>`;
    }).join('');

    const conceptTagHtml = t.isIndustry
      ? `<span class="industry-tag">🏢 ${esc(t.concept)}</span>`

    const resourcesHtml = t.resources
      ? `<div class="resources-box mb-3"><div class="info-label">📚 Resources — Kahan Se Seekho</div><div class="info-value">${esc(t.resources)}</div></div>`
      : '';

    // For industry tasks, show code snippet; for original tasks show html template with preview
    const codeSection = t.isIndustry
      ? `<div class="info-block mb-3">
          <div class="info-label">💻 Code Example / Template</div>
          <div class="html-template" style="max-height:280px;overflow:auto"><pre>${colorHtml(t.html)}</pre></div>
        </div>`
      : `<div class="info-block mb-3">
          <div class="info-label">📐 HTML Bootstrap Template — Dekhkar React mein banao</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
            <div>
              <div style="font-size:11px;color:#6c757d;margin-bottom:4px;font-weight:600;">CODE</div>
              <div class="html-template" style="height:220px;overflow:auto"><pre>${colorHtml(t.html)}</pre></div>
            </div>
            <div>
              <div style="font-size:11px;color:#6c757d;margin-bottom:4px;font-weight:600;">LIVE PREVIEW</div>
              <iframe class="preview-frame" data-html="${escAttr(t.html)}"
                style="width:100%;height:220px;border:1px solid #dee2e6;border-radius:8px;background:#fff"
                sandbox="allow-scripts" loading="lazy"></iframe>
            </div>
          </div>
        </div>`;

    card.innerHTML = `
      <div class="task-header" onclick="toggleCard(${t.level})">
        <span class="level-badge">Level ${t.level}</span>
        <span class="task-title">${allDone ? '✅ ' : ''}${esc(t.name)}</span>
        ${conceptTagHtml}
        <span class="expand-icon">▾</span>
      </div>
      <div class="task-body">
        <div class="info-grid">
          <div class="info-block"><div class="info-label">🎯 Real-world Scenario</div><div class="info-value">${esc(t.scenario)}</div></div>
          <div class="info-block"><div class="info-label">⚙️ Concept</div><div class="info-value"><strong>${esc(t.concept)}</strong><br/><small class="text-muted">Previous: ${esc(t.prev)}</small></div></div>
          <div class="info-block full"><div class="info-label">🎯 Implementation Goal</div><div class="info-value">${esc(t.goal)}</div></div>
        </div>
        ${codeSection}
        <div class="interview-box mb-3">
          <div class="info-label">🎤 Interview Mein Kaise Explain Karein</div>
          <div class="info-value">${esc(t.interview)}</div>
        </div>
        ${resourcesHtml}
        <div class="info-block mb-3">
          <div class="info-label">✅ Task Completion Checklist</div>
          <ul class="checklist">${checkHtml}</ul>
        </div>
        <div class="info-block">
          <div class="info-label">👁️ Expected Output</div>
          <div class="info-value">${esc(t.output)}</div>
        </div>
      </div>`;
    container.appendChild(card);
  });
  updateProgress();
}

function toggleCard(level) {
  const card = document.getElementById(`task-${level}`);
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    card.querySelectorAll('.preview-frame').forEach(iframe => {
      if (!iframe.srcdoc) {
        const html = iframe.dataset.html || '';
        iframe.srcdoc = `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/><body style="padding:12px;background:#fff;font-size:13px">${html}</body>`;
      }
    });
  }
}

function toggleCheck(level, idx, el) {
  el.classList.toggle('checked');
  const isChecked = el.classList.contains('checked');
  el.textContent = isChecked ? '✓' : '';
  const key = `task_${level}`;
  if (!completedMap[key]) completedMap[key] = [];
  completedMap[key][idx] = isChecked;
  localStorage.setItem('rz2h_checks_v2', JSON.stringify(completedMap));
  updateProgress();
}

function updateProgress() {
  let done = 0;
  tasks.forEach(t => {
    const key = `task_${t.level}`;
    const checks = completedMap[key] || [];
    if (t.checklist.length > 0 && t.checklist.every((_,i) => checks[i])) done++;
  });
  document.getElementById('done-count').textContent = done;
  const pct = Math.round((done / totalTasks) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = `${done} / ${totalTasks} tasks complete (${pct}%)`;
}

function filterPhase(phase, btn) {
  currentFilter = phase === 'all' ? 'all' : parseInt(phase);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}
