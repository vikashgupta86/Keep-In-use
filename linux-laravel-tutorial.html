<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux for Laravel Developers — Hinglish Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --teal: #39d353;
    --cmd-bg: #010409;
    --cmd-border: #238636;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    font-size: 15px;
    line-height: 1.7;
  }
  /* SIDEBAR */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    height: 100vh;
    overflow-y: auto;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
  }
  #sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  #sidebar-header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  #sidebar-header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  .search-box {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--accent); }
  .nav-section {
    padding: 8px 0;
  }
  .nav-section-title {
    padding: 6px 16px;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--muted);
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text); background: var(--bg3); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,0.07); }
  .nav-item .num {
    font-size: 10px;
    background: var(--bg3);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--muted);
    min-width: 22px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .nav-item.active .num { background: rgba(88,166,255,0.2); color: var(--accent); }
  /* MAIN */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 0 40px 80px;
    max-width: 900px;
  }
  .page-header {
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .page-header .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.3);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .page-header h2 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .page-header .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-top: 8px;
  }
  /* TOPIC BLOCKS */
  .topic-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .topic-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: all 0.15s;
  }
  .topic-header:hover { background: var(--bg3); }
  .topic-header.open { border-bottom-color: var(--border); }
  .topic-header .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .topic-header h3 {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .topic-header .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .topic-header.open .chevron { transform: rotate(90deg); }
  .topic-body {
    display: none;
    padding: 20px;
  }
  .topic-body.open { display: block; }
  /* CMD BLOCK */
  .cmd-block {
    background: var(--cmd-bg);
    border: 1px solid var(--cmd-border);
    border-radius: 8px;
    margin: 12px 0;
    overflow: hidden;
  }
  .cmd-header {
    background: rgba(35,134,54,0.15);
    padding: 6px 14px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    border-bottom: 1px solid rgba(35,134,54,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cmd-header .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .cmd-header .copy-btn:hover { color: var(--green); background: rgba(35,134,54,0.2); }
  .cmd-body {
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    color: #e6edf3;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .cmd-body .prompt { color: var(--green); }
  .cmd-body .comment { color: var(--muted); font-style: italic; }
  .cmd-body .flag { color: var(--orange); }
  .cmd-body .path { color: var(--purple); }
  .cmd-body .output { color: var(--muted); }
  /* INFO BOXES */
  .info-box {
    border-radius: 8px;
    padding: 14px 16px;
    margin: 12px 0;
    border-left: 3px solid;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .info-box.tip { background: rgba(63,185,80,0.07); border-color: var(--green); }
  .info-box.warn { background: rgba(210,153,34,0.07); border-color: var(--orange); }
  .info-box.danger { background: rgba(248,81,73,0.07); border-color: var(--red); }
  .info-box.info { background: rgba(88,166,255,0.07); border-color: var(--accent); }
  .info-box .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    font-family: 'JetBrains Mono', monospace;
  }
  .info-box.tip .label { color: var(--green); }
  .info-box.warn .label { color: var(--orange); }
  .info-box.danger .label { color: var(--red); }
  .info-box.info .label { color: var(--accent); }
  h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  p { margin: 8px 0; font-size: 14px; }
  code { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--purple); }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
  .tag.green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag.orange { background: rgba(210,153,34,0.15); color: var(--orange); }
  .tag.red { background: rgba(248,81,73,0.15); color: var(--red); }
  .tag.blue { background: rgba(88,166,255,0.15); color: var(--accent); }
  /* CHEAT SHEET TABLE */
  .cmd-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  .cmd-table th { background: var(--bg3); color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
  .cmd-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .cmd-table tr:last-child td { border-bottom: none; }
  .cmd-table tr:hover td { background: rgba(255,255,255,0.03); }
  .cmd-table td:first-child { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--green); min-width: 200px; }
  .cmd-table td:nth-child(2) { color: var(--muted); font-size: 12.5px; }
  /* CHECKLIST */
  .checklist { list-style: none; margin: 12px 0; }
  .checklist li { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13.5px; }
  .checklist li:last-child { border-bottom: none; }
  .checklist li::before { content: "□"; font-family: 'JetBrains Mono'; color: var(--muted); font-size: 16px; line-height: 1.3; flex-shrink: 0; }
  .checklist li.done::before { content: "✓"; color: var(--green); }
  /* ROADMAP */
  .roadmap-week { background: var(--bg3); border-radius: 8px; margin: 10px 0; padding: 14px 16px; border-left: 3px solid; }
  .roadmap-week.w1 { border-color: var(--accent); }
  .roadmap-week.w2 { border-color: var(--green); }
  .roadmap-week.w3 { border-color: var(--orange); }
  .roadmap-week.w4 { border-color: var(--purple); }
  .roadmap-week h5 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .roadmap-week.w1 h5 { color: var(--accent); }
  .roadmap-week.w2 h5 { color: var(--green); }
  .roadmap-week.w3 h5 { color: var(--orange); }
  .roadmap-week.w4 h5 { color: var(--purple); }
  .roadmap-week ul { list-style: none; }
  .roadmap-week ul li { font-size: 12.5px; color: var(--muted); padding: 2px 0; }
  .roadmap-week ul li::before { content: "→ "; color: inherit; }
  /* SECTION TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .tab-btn:hover { color: var(--text); border-color: var(--accent); }
  .tab-btn.active { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  /* PROGRESS BAR */
  .progress-wrap { margin-bottom: 20px; }
  .progress-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-bar { height: 3px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 3px; transition: width 0.3s; }
  /* INTERVIEW BOX */
  .interview-box { background: rgba(188,140,255,0.07); border: 1px solid rgba(188,140,255,0.2); border-radius: 8px; padding: 14px 16px; margin: 12px 0; }
  .interview-box .ib-title { font-size: 11px; color: var(--purple); text-transform: uppercase; font-family: 'JetBrains Mono'; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
  .interview-box p { font-size: 13.5px; color: var(--muted); }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  /* DEPLOY FLOW */
  .deploy-step { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .deploy-step:last-child { border-bottom: none; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(88,166,255,0.15); border: 1px solid var(--accent); color: var(--accent); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'JetBrains Mono'; }
  .step-content h5 { font-size: 13.5px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .step-content p { font-size: 12.5px; color: var(--muted); margin: 0; }
  /* HIDDEN */
  .hidden { display: none !important; }
  /* RESPONSIVE */
  @media (max-width: 768px) {
    #sidebar { display: none; }
    #main { padding: 20px 16px 60px; }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>🐧 Linux for Laravel</h1>
    <p>Hinglish Tutorial — Beginner to Advanced</p>
  </div>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Topic search karo..." oninput="filterNav(this.value)">
  </div>
  <div id="nav-list"></div>
</nav>

<main id="main">
  <div id="content-area"></div>
</main>

<script>
const sections = [
  { id: "home", title: "Home — Overview", icon: "🏠", color: "#58a6ff", nav: "overview" },
  { id: "basics", title: "Linux Basics", icon: "📖", color: "#58a6ff", nav: "basics" },
  { id: "ssh", title: "SSH / PuTTY", icon: "🔐", color: "#3fb950", nav: "basics" },
  { id: "navigation", title: "File Navigation", icon: "📂", color: "#3fb950", nav: "basics" },
  { id: "fileops", title: "File Operations", icon: "✂️", color: "#3fb950", nav: "basics" },
  { id: "viewing", title: "File Viewing & Editing", icon: "👁️", color: "#d29922", nav: "basics" },
  { id: "permissions", title: "Permissions & Ownership", icon: "🔒", color: "#d29922", nav: "intermediate" },
  { id: "php_laravel", title: "PHP & Laravel Commands", icon: "⚡", color: "#bc8cff", nav: "intermediate" },
  { id: "webserver", title: "Web Server Basics", icon: "🌐", color: "#bc8cff", nav: "intermediate" },
  { id: "logs", title: "Logs & Debugging", icon: "🐛", color: "#f85149", nav: "intermediate" },
  { id: "database", title: "Database Commands", icon: "🗃️", color: "#f85149", nav: "intermediate" },
  { id: "backup", title: "Backup & Restore", icon: "💾", color: "#39d353", nav: "advanced" },
  { id: "upload", title: "Upload / Download", icon: "📤", color: "#39d353", nav: "advanced" },
  { id: "monitoring", title: "Process Monitoring", icon: "📊", color: "#58a6ff", nav: "advanced" },
  { id: "cron", title: "Cron & Laravel Scheduler", icon: "⏰", color: "#d29922", nav: "advanced" },
  { id: "git", title: "Git on Server", icon: "🌿", color: "#3fb950", nav: "advanced" },
  { id: "security", title: "Security Basics", icon: "🛡️", color: "#f85149", nav: "advanced" },
  { id: "issues", title: "Common Laravel Issues", icon: "🔧", color: "#bc8cff", nav: "advanced" },
  { id: "deploy", title: "Deployment Flow", icon: "🚀", color: "#58a6ff", nav: "advanced" },
  { id: "cheatsheet", title: "Cheat Sheet", icon: "📋", color: "#d29922", nav: "resources" },
  { id: "roadmap", title: "30-Day Roadmap", icon: "🗺️", color: "#39d353", nav: "resources" },
  { id: "checklist", title: "Deploy Checklist", icon: "✅", color: "#3fb950", nav: "resources" },
];

const contentMap = {
  home: `
    <div class="page-header">
      <div class="badge">🐧 Linux for Laravel Developers</div>
      <h2>Linux Sikhne Ka Sahi Tarika — Hinglish Mein</h2>
      <p class="subtitle">Ek complete, practical, production-ready tutorial for PHP/Laravel developers. Har topic Hinglish mein, real commands ke saath.</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px">
      ${[["18","Topics Covered"],["100+","Real Commands"],["30","Day Roadmap"],["50+","Common Issues"]].map(([n,l])=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--accent)">${n}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${l}</div></div>`).join("")}
    </div>
    <div class="info-box tip"><div class="label">💡 Kaise Use Karein</div>Left sidebar mein topics click karo. Har topic mein concept, commands, examples, aur common mistakes sab milegi. <code>cmd</code> blocks pe click karke copy kar sakte ho.</div>
    <h4>Learning Path</h4>
    ${[["🟢","Week 1-2","Basics: SSH, Navigation, Files, Permissions"],["🟡","Week 3","Intermediate: PHP, Apache/Nginx, Logs, Database"],["🟠","Week 4","Advanced: Git, Backup, Security, Cron"],["🔴","Ongoing","Real Deployments, Debugging, Optimization"]].map(([e,w,t])=>`<div class="roadmap-week w1" style="margin:8px 0;border-color:#30363d"><h5 style="color:var(--text)">${e} ${w}</h5><p style="font-size:12.5px;color:var(--muted)">${t}</p></div>`).join("")}
    <div class="info-box info" style="margin-top:24px"><div class="label">🎯 Goal</div>Tutorial khatam hone ke baad tum confidently kisi bhi Linux server pe Laravel project deploy, debug, backup, aur maintain kar sakte ho.</div>
  `,

  basics: `
    <div class="page-header">
      <div class="badge">Topic 1</div>
      <h2>Linux Basics for Developers</h2>
      <p class="subtitle">Linux server kya hota hai, Windows se kya fark hai, aur kaise kaam karta hai — ekdum simple language mein.</p>
    </div>

    <div class="topic-block">
      <div class="topic-header" onclick="toggle(this)">
        <div class="icon" style="background:rgba(88,166,255,0.15)">🖥️</div>
        <h3>Linux Server Kya Hota Hai?</h3>
        <span class="chevron">▶</span>
      </div>
      <div class="topic-body">
        <p><strong>Simple Explanation:</strong> Linux ek operating system hai — bilkul Windows/Mac ki tarah. Lekin ye servers pe use hota hai kyunki ye <em>free, fast, stable, aur secure</em> hai.</p>
        <p>Jab tum XAMPP apne Windows PC pe chalate ho, woh ek "fake server" hai. Real duniya mein, tera website ek Linux server pe run karta hai — jo 24/7 internet se connected hota hai.</p>
        <div class="info-box tip">
          <div class="label">Real Life Example</div>
          Soch, tumhara ghar = Windows PC (local). Hotel = Linux server (live). Ghar pe khana banana = local development. Hotel ka kitchen = production server.
        </div>
        <h4>Windows XAMPP vs Linux Server</h4>
        <table class="cmd-table">
          <tr><th>Feature</th><th>Windows / XAMPP</th><th>Linux Server</th></tr>
          <tr><td>OS</td><td>Windows</td><td>Ubuntu / CentOS / Debian</td></tr>
          <tr><td>Access</td><td>Direct / GUI</td><td>Terminal / SSH only</td></tr>
          <tr><td>Cost</td><td>Free locally</td><td>VPS rent lagta hai</td></tr>
          <tr><td>GUI</td><td>Full GUI</td><td>Mostly command line</td></tr>
          <tr><td>Performance</td><td>Slow, testing only</td><td>Fast, production ready</td></tr>
          <tr><td>File paths</td><td>C:\\xampp\\htdocs</td><td>/var/www/html</td></tr>
        </table>
      </div>
    </div>

    <div class="topic-block">
      <div class="topic-header" onclick="toggle(this)">
        <div class="icon" style="background:rgba(63,185,80,0.15)">👤</div>
        <h3>Root User vs Normal User & sudo</h3>
        <span class="chevron">▶</span>
      </div>
      <div class="topic-body">
        <p><strong>Root User:</strong> Linux ka "God" — poori system ka full control. Har kuch kar sakta hai — files delete, services install, users create.</p>
        <p><strong>Normal User:</strong> Limited access. Sirf apne folder mein kaam kar sakta hai.</p>
        <p><strong>sudo:</strong> "Super User DO" — Normal user ko temporary root powers deta hai ek command ke liye.</p>
        <div class="cmd-block">
          <div class="cmd-header">Terminal — sudo examples <button class="copy-btn" onclick="copyCmd(this)">copy</button></div>
          <div class="cmd-body"><span class="prompt">$</span> whoami                    <span class="comment"># apna username check karo</span>
<span class="prompt">$</span> sudo whoami               <span class="comment"># root ban ke check karo</span>
<span class="prompt">$</span> sudo apt install nginx    <span class="comment"># nginx install karo (root power chahiye)</span>
<span class="prompt">$</span> sudo -i                   <span class="comment"># permanently root ban jao (careful!)</span>
<span class="prompt">$</span> exit                      <span class="comment"># root se bahar niklo</span></div>
        </div>
        <div class="info-box danger">
          <div class="label">⚠️ Common Mistake</div>
          Hamesha root user se kaam mat karo! Normal user + sudo use karo. <code>sudo rm -rf /</code> jaise command poora server wipe kar deta hai!
        </div>
        <div class="interview-box">
          <div class="ib-title">Interview Answer</div>
          <p>"Root user Linux ka superuser hota hai jiske paas full system access hota hai. Production servers pe hum normal users use karte hain with sudo for specific admin tasks — ye principle of least privilege follow karta hai for security."</p>
        </div>
      </div>
    </div>

        <span class="chevron">▶</span>
      </div>
      <div class="topic-body open">
        <p>Linux mein har file ke teen types ke permissions hote hain:</p>
        <table class="cmd-table">
          <tr><th>Permission</th><th>Number</th><th>Kya allow karta hai</th></tr>
          <tr><td>read (r)</td><td>4</td><td>File padhna / folder contents dekhna</td></tr>
          <tr><td>write (w)</td><td>2</td><td>File likhna / modify karna</td></tr>
          <tr><td>execute (x)</td><td>1</td><td>File run karna / folder enter karna</td></tr>
        </table>
        <p>Aur teen groups ke liye:</p>
        <table class="cmd-table">
          <tr><th>Group</th><th>Kaun?</th></tr>
          <tr><td>Owner (u)</td><td>File ka malik</td></tr>
          <tr><td>Group (g)</td><td>Ek group ke log (e.g., www-data)</td></tr>
          <tr><td>Others (o)</td><td>Baaki sab</td></tr>
        </table>
        <h4>Common Permission Values</h4>
        <table class="cmd-table">
          <tr><th>Value</th><th>Meaning</th><th>Use Case</th></tr>
          <tr><td>755</td><td>rwxr-xr-x</td><td>Folders, executables</td></tr>
          <tr><td>644</td><td>rw-r--r--</td><td>Normal files (.php, .html)</td></tr>
          <tr><td>775</td><td>rwxrwxr-x</td><td>Shared group folders (storage)</td></tr>
          <tr><td>777</td><td>rwxrwxrwx</td><td>⚠️ Everyone can do everything — DANGEROUS!</td></tr>
        </table>
        <div class="cmd-block">
          <div class="cmd-header">chmod Examples <button class="copy-btn" onclick="copyCmd(this)">copy</button></div>
          <div class="cmd-body"><span class="comment"># Single file permission set karo</span>
<span class="prompt">$</span> chmod 644 config.php

<span class="comment"># Folder aur uske andar sab kuch (-R = recursive)</span>
<span class="prompt">$</span> chmod <span class="flag">-R</span> 755 /var/www/html/myproject

<span class="comment"># Laravel ke liye — storage aur cache writable chahiye</span>
<span class="prompt">$</span> chmod <span class="flag">-R</span> 775 storage/
<span class="prompt">$</span> chmod <span class="flag">-R</span> 775 bootstrap/cache/</div>
        </div>
        <div class="info-box danger">
          <div class="label">☠️ 777 Dangerous Kyun Hai?</div>
          777 matlab duniya mein <em>koi bhi</em> file likh, padhh, aur run kar sakta hai — including hackers! Kabhi bhi production pe 777 mat karo. 775 ya 755 use karo.

      </div>
    </div>
    <div class="topic-block">
      <div class="topic-header" onclick="toggle(this)">
        <div class="icon" style="background:rgba(63,185,80,0.15)">👥</div>

        <span class="chevron">▶</span>
      </div>
      <div class="topic-body">
        <p><strong>www-data</strong> = Apache/Nginx ka user. Jab web server koi file access karta hai, woh <code>www-data</code> user ke naam se karta hai. Laravel ko is user se read/write access chahiye.</p>
        <div class="cmd-block">
          <div class="cmd-header">Laravel Permission Setup — Complete <button class="copy-btn" onclick="copyCmd(this)">copy</button></div>
          <div class="cmd-body"><span class="comment"># Project ka owner change karo</span>
<span class="prompt">$</span> sudo chown <span class="flag">-R</span> www-data:www-data /var/www/html/myproject

<span class="comment"># Ya apne user ko www-data group mein add karo</span>

<span class="comment"># Complete Laravel permission setup:</span>
<span class="prompt">$</span> cd /var/www/html/myproject
<span class="prompt">$</span> sudo chown <span class="flag">-R</span> $USER:www-data .
<span class="prompt">$</span> find . <span class="flag">-type</span> f -exec chmod 664 {} \;
<span class="prompt">$</span> find . <span class="flag">-type</span> d -exec chmod 775 {} \;
<span class="prompt">$</span> chmod <span class="flag">-R</span> 775 storage bootstrap/cache

<span class="comment"># .env file sirf owner ko readable hona chahiye</span>
<span class="prompt">$</span> chmod 600 .env</div>
        </div>
        <div class="interview-box">
          <div class="ib-title">Interview Answer</div>

        </div>
      </div>

        <li>MySQL service running hai?</li>
      </ul>
      <h4>🟡 File Upload Issues</h4>
      <ul class="checklist">
        <li>php.ini mein upload_max_filesize set hai?</li>
        <li>post_max_size upload size se bada hai?</li>
        <li>storage/app/public folder writable hai?</li>
        <li>storage:link run kiya hai?</li>
        <li>Disk space full nahi hai?</li>
      </ul>
    </div>
    <div id="cl-security" class="tab-content">
      <ul class="checklist">
        <li>APP_DEBUG=false production pe</li>
        <li>.env file publicly accessible nahi hai</li>
        <li>Root SSH login disabled hai</li>
        <li>SSH key authentication use ho raha hai</li>
        <li>UFW firewall active hai</li>
        <li>MySQL 3306 port publicly open nahi hai</li>
        <li>SSL certificate installed aur valid hai</li>
        <li>vendor/ folder properly configured hai</li>
        <li>Files 777 permission nahi hain</li>
        <li>Regular backups schedule kiye hain</li>
        <li>Web server latest version pe hai</li>
        <li>PHP latest stable version pe hai</li>
      </ul>
    </div>
  `,
};

// Build nav
function buildNav() {
  const groups = { overview: "Overview", basics: "Basics", intermediate: "Intermediate", advanced: "Advanced", resources: "Resources" };
  const grouped = {};
  sections.forEach(s => {
    if (!grouped[s.nav]) grouped[s.nav] = [];
    grouped[s.nav].push(s);
  });
  let html = "";
  Object.entries(groups).forEach(([key, label]) => {
    if (!grouped[key]) return;
    html += `<div class="nav-section"><div class="nav-section-title">${label}</div>`;
    grouped[key].forEach((s, i) => {
      const num = String(i + 1).padStart(2, "0");
      html += `<div class="nav-item" id="nav-${s.id}" onclick="loadSection('${s.id}')"><span class="num">${num}</span>${s.icon} ${s.title}</div>`;
    });
    html += `</div>`;
  });
  document.getElementById("nav-list").innerHTML = html;
}

function loadSection(id) {
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const navEl = document.getElementById("nav-" + id);
  if (navEl) navEl.classList.add("active");
  document.getElementById("content-area").innerHTML = contentMap[id] || "<p>Coming soon...</p>";
  document.getElementById("main").scrollTop = 0;
}

function toggle(header) {
  header.classList.toggle("open");
  const body = header.nextElementSibling;
  body.classList.toggle("open");
}

function copyCmd(btn) {
  const block = btn.closest(".cmd-block");
  const text = block.querySelector(".cmd-body").innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "copied!";
    setTimeout(() => btn.textContent = "copy", 1500);
  });
}

function switchTab(btn, contentId) {
  const parent = btn.closest("div").nextElementSibling.parentElement;
  parent.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  parent.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  btn.classList.add("active");
  const target = document.getElementById(contentId);
  if (target) target.classList.add("active");
}

function filterNav(query) {
  const q = query.toLowerCase();
  document.querySelectorAll(".nav-item").forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? "" : "none";
  });
}

buildNav();
loadSection("home");
</script>
