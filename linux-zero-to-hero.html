<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Zero to Hero — Hinglish Complete Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0f;
  --bg2: #0a1520;
  --bg3: #0f1e2e;
  --bg4: #142233;
  --border: #1a3048;
  --border2: #1e3a56;
  --text: #d4e8f7;
  --muted: #5a7a96;
  --accent: #00d4ff;
  --accent2: #0099cc;
  --green: #00ff88;
  --green2: #00cc6a;
  --orange: #ff8c00;
  --red: #ff4466;
  --purple: #a855f7;
  --yellow: #ffd700;
  --pink: #ff6eb4;
  --terminal: #020c14;
  --terminal-text: #00ff88;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* LAYOUT */
#app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 270px;
  min-width: 270px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  position: relative;
}

#sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.sb-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

.sb-logo .title {
  font-size: 13px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'Space Mono', monospace;
}

.sb-logo .sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}

.sb-progress {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.sb-progress .label { font-size: 10px; color: var(--muted); margin-bottom: 5px; display: flex; justify-content: space-between; }
.sb-progress .bar { height: 3px; background: var(--border); border-radius: 2px; }
.sb-progress .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width 0.5s; width: 0%; }

.sb-search {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.sb-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 10px;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  outline: none;
}

.sb-search input:focus { border-color: var(--accent); }
.sb-search input::placeholder { color: var(--muted); }

.sb-section-title {
  padding: 10px 16px 4px;
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'Space Mono', monospace;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--muted);
  border-left: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}

.sb-item:hover { background: var(--bg3); color: var(--text); }
.sb-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,212,255,0.05); }
.sb-item .badge { margin-left: auto; font-size: 9px; background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; padding: 1px 6px; font-family: 'Space Mono', monospace; }
.sb-item .badge.red { background: rgba(255,68,102,0.1); color: var(--red); border-color: rgba(255,68,102,0.2); }
.sb-item .badge.green { background: rgba(0,255,136,0.1); color: var(--green); border-color: rgba(0,255,136,0.2); }
.sb-item .icon { font-size: 14px; flex-shrink: 0; }

/* MAIN CONTENT */
#main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.content-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 40px 40px 100px;
}

/* PAGE HEADER */
.page-hdr {
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.page-hdr .chapter {
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.page-hdr .chapter::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--accent);
}

.page-hdr h1 {
  font-size: 32px;
  font-weight: 800;
  color: white;
  line-height: 1.2;
  margin-bottom: 10px;
}

.page-hdr h1 span { color: var(--accent); }

.page-hdr .desc {
  font-size: 15px;
  color: var(--muted);
  max-width: 600px;
  line-height: 1.6;
}

/* CONCEPT CARDS */
.concept {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.concept:hover { border-color: var(--border2); }

.concept-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}

.concept-hdr .ico {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.concept-hdr .info { flex: 1; }
.concept-hdr .info h3 { font-size: 15px; font-weight: 700; color: white; margin-bottom: 2px; }
.concept-hdr .info p { font-size: 12px; color: var(--muted); }

.concept-hdr .toggle-btn {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.concept.open .toggle-btn { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); transform: rotate(45deg); }

.concept-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}

.concept.open .concept-body { display: block; }
.concept-body > *:first-child { margin-top: 16px; }

/* SECTION LABELS */
.sec-label {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sec-label.blue { color: var(--accent); }
.sec-label.green { color: var(--green); }
.sec-label.orange { color: var(--orange); }
.sec-label.red { color: var(--red); }
.sec-label.purple { color: var(--purple); }
.sec-label.yellow { color: var(--yellow); }
.sec-label.pink { color: var(--pink); }

/* TERMINAL */
.terminal {
  background: var(--terminal);
  border: 1px solid #0a2a3a;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
  font-family: 'Space Mono', monospace;
}

.terminal-bar {
  background: #0a1a28;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid #0a2a3a;
}

.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.red { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green { background: #28c840; }

.terminal-title {
  margin-left: 8px;
  font-size: 11px;
  color: #2a5a7a;
  font-family: 'Space Mono', monospace;
  flex: 1;
}

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  transition: all 0.15s;
}

.copy-btn:hover { color: var(--green); border-color: var(--green); }

.terminal-body {
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.9;
  overflow-x: auto;
}

.terminal-body .p { color: #2a9d8f; }
.terminal-body .cmd { color: #e9f5db; }
.terminal-body .flag { color: #ff8c00; }
.terminal-body .arg { color: #a8dadc; }
.terminal-body .comment { color: #2a5a7a; font-style: italic; }
.terminal-body .out { color: #4a7a9b; }
.terminal-body .ok { color: var(--green); }
.terminal-body .err { color: var(--red); }
.terminal-body .warn { color: var(--orange); }
.terminal-body .path { color: var(--purple); }
.terminal-body .val { color: var(--yellow); }
.terminal-body .hl { color: var(--accent); }

/* BOXES */
.box {
  border-radius: 8px;
  padding: 14px 16px;
  margin: 10px 0;
  font-size: 14px;
  line-height: 1.6;
  border-left: 3px solid;
}

.box.tip { background: rgba(0,255,136,0.05); border-color: var(--green); }
.box.warn { background: rgba(255,140,0,0.05); border-color: var(--orange); }
.box.danger { background: rgba(255,68,102,0.05); border-color: var(--red); }
.box.info { background: rgba(0,212,255,0.05); border-color: var(--accent); }
.box.purple { background: rgba(168,85,247,0.05); border-color: var(--purple); }

.box-title {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.box.tip .box-title { color: var(--green); }
.box.warn .box-title { color: var(--orange); }
.box.danger .box-title { color: var(--red); }
.box.info .box-title { color: var(--accent); }
.box.purple .box-title { color: var(--purple); }

/* INTERVIEW CARD */
.interview-card {
  background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(0,212,255,0.05));
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 10px;
  padding: 16px 18px;
  margin: 12px 0;
  position: relative;
  overflow: hidden;
}

.interview-card::before {
  content: '💼';
  position: absolute;
  right: 16px;
  top: 12px;
  font-size: 20px;
  opacity: 0.3;
}

.interview-card .iq-label {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 700;
  margin-bottom: 8px;
}

.interview-card .iq-q {
  font-size: 14px;
  font-weight: 600;
  color: white;
  margin-bottom: 10px;
  line-height: 1.4;
}

.interview-card .iq-a {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.7;
}

.interview-card .iq-a code {
  background: rgba(0,0,0,0.3);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent);
}

/* TABLE */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin: 10px 0;
  border-radius: 8px;
  overflow: hidden;
}

.tbl th {
  background: var(--bg3);
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
}

.tbl td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  color: var(--text);
  font-size: 13px;
}

.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(255,255,255,0.02); }
.tbl td:first-child { font-family: 'Space Mono', monospace; color: var(--green); font-size: 12px; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-family: 'Space Mono', monospace; font-weight: 700; }
.tag.g { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
.tag.b { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
.tag.o { background: rgba(255,140,0,0.1); color: var(--orange); border: 1px solid rgba(255,140,0,0.2); }
.tag.r { background: rgba(255,68,102,0.1); color: var(--red); border: 1px solid rgba(255,68,102,0.2); }
.tag.p { background: rgba(168,85,247,0.1); color: var(--purple); border: 1px solid rgba(168,85,247,0.2); }

/* CODE INLINE */
code { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.15); border-radius: 4px; padding: 1px 6px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); }

/* TEXT ELEMENTS */
p { margin: 8px 0; font-size: 14px; color: var(--text); }
h4 { font-size: 16px; font-weight: 700; color: white; margin: 16px 0 8px; }
strong { color: white; font-weight: 600; }
ul, ol { padding-left: 20px; margin: 8px 0; }
li { margin: 4px 0; font-size: 13.5px; color: var(--text); line-height: 1.6; }
li::marker { color: var(--accent); }

/* PERM VISUAL */
.perm-visual {
  display: flex;
  gap: 8px;
  margin: 12px 0;
  flex-wrap: wrap;
}

.perm-block {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  text-align: center;
  min-width: 100px;
}

.perm-block .num { font-size: 28px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--accent); }
.perm-block .sym { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--green); margin: 4px 0; }
.perm-block .desc { font-size: 11px; color: var(--muted); }

/* QUIZ SECTION */
.quiz-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}

.quiz-q { font-size: 14px; font-weight: 600; color: white; margin-bottom: 12px; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  padding: 10px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.quiz-opt:hover { border-color: var(--accent); color: var(--accent); }
.quiz-opt.correct { border-color: var(--green); background: rgba(0,255,136,0.05); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: rgba(255,68,102,0.05); color: var(--red); }
.quiz-opt .opt-letter { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); min-width: 20px; }

.quiz-exp { margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 6px; font-size: 13px; color: var(--muted); display: none; }
.quiz-exp.show { display: block; }

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 10px 0; }

@media (max-width: 700px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  #sidebar { display: none; }
  .content-wrap { padding: 20px 16px 60px; }
  .page-hdr h1 { font-size: 22px; }
}

/* STAT CARDS */
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

.stat-card .num { font-size: 32px; font-weight: 800; font-family: 'Space Mono', monospace; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* CHAPTER DIVIDER */
.chapter-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 32px 0 20px;
}

.chapter-divider .num {
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 6px;
  padding: 4px 10px;
  white-space: nowrap;
}

.chapter-divider .line { flex: 1; height: 1px; background: var(--border); }
.chapter-divider h2 { font-size: 18px; font-weight: 700; color: white; white-space: nowrap; }

/* STEP FLOW */
.step-flow { display: flex; flex-direction: column; gap: 0; }
.step-item { display: flex; gap: 16px; position: relative; padding-bottom: 20px; }
.step-item:last-child { padding-bottom: 0; }
.step-item:not(:last-child)::before { content: ''; position: absolute; left: 19px; top: 40px; bottom: 0; width: 1px; background: var(--border); }
.step-num { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); font-family: 'Space Mono', monospace; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
.step-content h5 { font-size: 14px; font-weight: 600; color: white; margin-bottom: 4px; margin-top: 8px; }
.step-content p { font-size: 13px; color: var(--muted); margin: 0; }

/* ACTIVE NAV INDICATOR */
.active-line {
  width: 3px;
  height: 100%;
  position: absolute;
  left: 0;
  top: 0;
  background: linear-gradient(180deg, var(--accent), transparent);
  border-radius: 0 2px 2px 0;
}

/* HOME HERO */
.hero {
  background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 60%),
              linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 60px 40px 48px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 50% 0%, rgba(0,212,255,0.03) 0%, transparent 50%);
  pointer-events: none;
}

.hero .emoji { font-size: 64px; margin-bottom: 16px; display: block; }
.hero h1 { font-size: 42px; font-weight: 900; color: white; line-height: 1.15; margin-bottom: 14px; }
.hero h1 span { color: var(--accent); }
.hero .sub { font-size: 16px; color: var(--muted); max-width: 520px; margin: 0 auto 28px; line-height: 1.6; }

.hero-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; max-width: 700px; margin: 0 auto; }

/* ROADMAP */
.roadmap-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.roadmap-item:last-child { border-bottom: none; }
.roadmap-day { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--accent); min-width: 52px; padding-top: 2px; }
.roadmap-content h6 { font-size: 13px; font-weight: 600; color: white; margin-bottom: 3px; }
.roadmap-content p { font-size: 12px; color: var(--muted); margin: 0; }

/* PERMISSION CALCULATOR */
.perm-calc { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 12px 0; }
.perm-calc h5 { font-size: 13px; font-weight: 600; color: white; margin-bottom: 12px; }
.perm-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.perm-check { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.perm-check input { accent-color: var(--accent); width: 14px; height: 14px; }
.perm-check label { font-size: 13px; cursor: pointer; }
.perm-result { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--accent); font-weight: 700; margin-top: 10px; }

/* HIDDEN */
.hidden { display: none !important; }

/* CHEATSHEET GRID */
.cs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 12px 0; }
@media (max-width: 600px) { .cs-grid { grid-template-columns: 1fr; } }
.cs-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.cs-card-hdr { background: var(--bg3); padding: 8px 14px; font-size: 11px; font-family: 'Space Mono', monospace; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid var(--border); }
.cs-card-body { padding: 8px 0; }
.cs-row { display: flex; justify-content: space-between; padding: 4px 14px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.cs-row:last-child { border-bottom: none; }

// ==================== TERMINAL HELPER ====================
function term(title, lines) {
  const id = 'term-' + Math.random().toString(36).slice(2,7);
  const content = lines.map(l => {
    if (!l) return '';
    if (l.startsWith('# ')) return `<span class="comment">${l}</span>`;
    if (l.startsWith('$ ')) return `<span class="p">ubuntu@server</span><span class="cmd">:~$ </span><span class="cmd">${l.slice(2)}</span>`;
    if (l.startsWith('# ')) return `<span class="p">root@server</span><span class="cmd">:~# </span><span class="cmd">${l.slice(2)}</span>`;
    if (l.startsWith('>> ')) return `<span class="out">${l.slice(3)}</span>`;
    if (l.startsWith('OK ')) return `<span class="ok">${l.slice(3)}</span>`;
    if (l.startsWith('ERR ')) return `<span class="err">${l.slice(4)}</span>`;
    if (l.startsWith('WARN ')) return `<span class="warn">${l.slice(5)}</span>`;
    if (l.startsWith('HL ')) return `<span class="hl">${l.slice(3)}</span>`;
    return `<span class="cmd">${l}</span>`;
  }).join('\n');
  return `<div class="terminal" id="${id}">
    <div class="terminal-bar">
      <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
      <span class="terminal-title">${title}</span>
      <button class="copy-btn" onclick="copyTerm('${id}')">copy</button>
    </div>
    <pre class="terminal-body">${content}</pre>
  </div>`;
}

function copyTerm(id) {
  const el = document.getElementById(id).querySelector('.terminal-body');
  const text = el.innerText;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById(id).querySelector('.copy-btn');
  btn.textContent = 'copied!'; btn.style.color = 'var(--green)';
  setTimeout(() => { btn.textContent = 'copy'; btn.style.color = ''; }, 1500);
}

    <div class="iq-a"><strong>A:</strong> ${a}</div>

}

function concept(icon, bg, title, sub, body) {

    <div class="concept-hdr" onclick="toggleConcept('${id}')">

    <div class="concept-body">${body}</div>
  </div>`;
}

function toggleConcept(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function quiz(q, opts, correct, exp) {
  const id = 'q-' + Math.random().toString(36).slice(2,7);
  const letters = ['A','B','C','D'];
  const optsHtml = opts.map((o, i) => `<div class="quiz-opt" onclick="answerQuiz('${id}',${i},${correct})">${'<span class="opt-letter">'+letters[i]+'</span>'} ${o}</div>`).join('');
  return `<div class="quiz-card">
    <div class="quiz-q">🤔 ${q}</div>
    <div class="quiz-opts" id="${id}">${optsHtml}</div>
    <div class="quiz-exp" id="${id}-exp">💡 ${exp}</div>
  </div>`;
}

function answerQuiz(id, chosen, correct) {
  const opts = document.querySelectorAll(`#${id} .quiz-opt`);
  opts.forEach((o, i) => {
    o.onclick = null;
    if (i === correct) o.classList.add('correct');
    else if (i === chosen) o.classList.add('wrong');
  });
  document.getElementById(id + '-exp').classList.add('show');
}

${iq('nano aur vim mein se kaunsa better hai?','Dono apni jagah useful hain. <strong>nano</strong> simple, beginner-friendly hai — quick edits ke liye perfect. <strong>vim</strong> powerful hai — large files, complex edits, macros, plugins ke liye best. Production developer ke liye: nano for quick .env/config edits, vim for serious code editing. Most important: vim mein <code>:q!</code> se exit karna yaad rakho!')}
`)}
</div>`,

// ==================== PERMISSIONS ====================
'permissions': `<div class="content-wrap">
<div class="page-hdr">
  <div class="chapter">Chapter 8</div>
  <h1>Permissions <span>& Ownership</span></h1>
  <p class="desc">Linux ka sabse important concept — ye samajhna production deployment ke liye must hai!</p>
</div>

${concept('🔒','rgba(255,140,0,0.1)','Permission System — rwx Samajhna','Read, Write, Execute — teen types, teen groups',`
<div class="sec-label blue">Permission Types</div>
<table class="tbl">
<tr><th>Symbol</th><th>Name</th><th>Number</th><th>Files par</th><th>Directories par</th></tr>
<tr><td>r</td><td>read</td><td>4</td><td>File padhh sakte ho</td><td>Contents list kar sakte ho (ls)</td></tr>
<tr><td>w</td><td>write</td><td>2</td><td>File modify kar sakte ho</td><td>Files create/delete kar sakte ho</td></tr>
<tr><td>x</td><td>execute</td><td>1</td><td>File run kar sakte ho</td><td>Directory mein enter kar sakte ho (cd)</td></tr>
<tr><td>-</td><td>none</td><td>0</td><td>Permission nahi</td><td>Permission nahi</td></tr>
</table>

<div class="sec-label green">Three Groups</div>
<table class="tbl">
<tr><th>Group</th><th>Symbol</th><th>Kaun hai?</th></tr>
<tr><td>Owner (User)</td><td>u</td><td>File ka owner — jo create kiya ya assigned hai</td></tr>
<tr><td>Group</td><td>g</td><td>Ek group ke saare users (e.g., www-data, developers)</td></tr>
<tr><td>Others</td><td>o</td><td>Duniya mein baaki sab log</td></tr>
</table>

<div class="sec-label orange">Permission String Padhna</div>
${term('ls -la output samajhna',[
  '$ ls -la',
  '>> drwxr-xr-x  12 www-data www-data  4096 artisan',
  '>> -rw-r--r--   1 ubuntu   ubuntu     892 .env',
  '>> -rwxr-xr-x   1 www-data www-data  1686 deploy.sh',
  '',
  '# drwxr-xr-x breakdown:',
  '# d   = type: d=directory, -=file, l=symlink',
  '# rwx = owner: read+write+execute (7)',
  '# r-x = group: read+execute only (5)',
  '# r-x = others: read+execute only (5)',
  '# So: 755',
  '',
  '# -rw-r--r-- breakdown:',
  '# -   = regular file',
  '# rw- = owner: read+write (6)',
  '# r-- = group: read only (4)',
  '# r-- = others: read only (4)',
  '# So: 644',
])}

<div class="sec-label purple">Permission Calculator</div>
<div class="perm-calc" id="perm-calc">
  <h5>🔢 Permission Calculator</h5>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
    <div>
      <div style="font-size:11px;color:var(--accent);margin-bottom:6px;font-family:'Space Mono',monospace">OWNER (u)</div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="ur" checked><label for="ur">Read (4)</label></label></div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="uw" checked><label for="uw">Write (2)</label></label></div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="ux" checked><label for="ux">Execute (1)</label></label></div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--green);margin-bottom:6px;font-family:'Space Mono',monospace">GROUP (g)</div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="gr" checked><label for="gr">Read (4)</label></label></div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="gw"><label for="gw">Write (2)</label></label></div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="gx" checked><label for="gx">Execute (1)</label></label></div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--orange);margin-bottom:6px;font-family:'Space Mono',monospace">OTHERS (o)</div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="or2" checked><label for="or2">Read (4)</label></label></div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="ow"><label for="ow">Write (2)</label></label></div>
      <div class="perm-row"><label class="perm-check"><input type="checkbox" onchange="calcPerm()" id="ox" checked><label for="ox">Execute (1)</label></label></div>
    </div>
  </div>
  <div style="margin-top:12px;padding:12px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)">
    <span style="font-size:11px;color:var(--muted)">Result:</span>
    <div class="perm-result" id="perm-result">755 — rwxr-xr-x</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px" id="perm-desc">Owner: read+write+execute | Group: read+execute | Others: read+execute</div>
  </div>
</div>
`)}

${concept('🔢','rgba(0,212,255,0.1)','Common Permission Values','Yaad rakho — ye roz kaam aate hain',`
<div class="perm-visual">
  ${[['755','rwxr-xr-x','Folders aur executables ke liye standard'],['644','rw-r--r--','Normal files — .php, .html, .css'],['775','rwxrwxr-x','Shared group folders — Laravel storage'],['600','rw-------','Private files — .env, SSH keys'],['700','rwx------','Private directories — .ssh'],['777','rwxrwxrwx','⚠️ DANGEROUS — everyone can do everything'],['664','rw-rw-r--','Group writable files'],['400','r--------','Read-only — SSH private key best practice']].map(([n,s,d])=>`<div class="perm-block"><div class="num">${n}</div><div class="sym">${s}</div><div class="desc">${d}</div></div>`).join('')}
</div>
<div class="box danger"><div class="box-title">☠️ 777 Kyun Dangerous Hai?</div>777 matlab <strong>duniya mein koi bhi</strong> — hackers bhi — file likh sakta hai aur run kar sakta hai. Kabhi bhi production pe 777 mat karo. Agar koi bolta hai "777 kar do kaam ho jaayega" — woh security hole bana raha hai. 775 ya 755 use karo.</div>
${term('chmod — Permission Change Karo',[
  '# Numeric mode',
  '$ chmod 755 myscript.sh',
  '$ chmod 644 config.php',
  '$ chmod -R 775 storage/',
  '$ chmod -R 755 /var/www/html/myproject',
  '',
  '# Symbolic mode',
  '$ chmod +x myscript.sh',
  '$ chmod u+w file.php',
  '$ chmod g-w file.php',
  '$ chmod o-rwx .env',
  '$ chmod a+r file.txt',
  '',
  '# Special — .env ke liye',
  '$ chmod 600 .env',
  '',
  '# Laravel permission setup',
  '$ chmod -R 775 storage/',
  '$ chmod -R 775 bootstrap/cache/',
  '$ chmod 600 .env',
])}
${iq('chmod 755 aur 644 mein kab kya use karein?','<strong>755</strong> directories ke liye — owner read+write+execute, group+others read+execute. Execute bit directories ke liye <code>cd</code> karne ke liye chahiye. <strong>644</strong> regular files ke liye — owner read+write, group+others read only. PHP files, HTML, CSS — sab 644 hona chahiye. Laravel storage/ aur bootstrap/cache/ ke liye 775 use karo kyunki web server (www-data) ko write access chahiye.')}
`)}

${concept('👥','rgba(0,255,136,0.1)','chown — Ownership Change Karna','www-data aur web server concept',`
<div class="box info"><div class="box-title">🌐 www-data Kaun Hai?</div>Apache aur Nginx ek special user <strong>www-data</strong> se chalta hai. Jab web server koi file access karta hai, woh www-data user ke naam se karta hai. Laravel projects ko www-data user ko read/write access dena hota hai.</div>
${term('chown — Ownership Change',[
  '# File ka owner change karo',
  '$ sudo chown ubuntu file.php',
  '',
  '# Owner aur group dono change karo',
  '$ sudo chown ubuntu:www-data file.php',
  '',
  '# Recursive (-R)',
  '$ sudo chown -R www-data:www-data /var/www/html/myproject',
  '',
  '# Current user aur www-data group',
  '$ sudo chown -R $USER:www-data /var/www/html/myproject',
  '',
  '# Complete Laravel Permission Setup:',
  '$ cd /var/www/html/myproject',
  '$ sudo chown -R $USER:www-data .',
  '$ find . -type f -exec chmod 664 {} \\;',
  '$ find . -type d -exec chmod 775 {} \\;',
  '$ chmod -R 775 storage/ bootstrap/cache/',
  '$ chmod 600 .env',
  '',
  '# Apne user ko www-data group mein add karo',
  '$ sudo usermod -aG www-data $USER',
  '# Logout-login karo group apply hone ke liye',
])}
${iq('Laravel mein permission denied error kyun aata hai?','Mostly teen reasons hain: (1) <code>storage/</code> ya <code>bootstrap/cache/</code> directory www-data ke liye writable nahi hai — fix: <code>chmod -R 775 storage/ bootstrap/cache/</code>, (2) Files ka owner www-data nahi hai — fix: <code>chown -R www-data:www-data .</code>, (3) .env file ka permissions galat hai — fix: <code>chmod 640 .env chown www-data:www-data .env</code>. Ye teen commands yaad rakho — 90% permission issues fix ho jaate hain.')}
`)}
</div>`,

// ==================== USERS & GROUPS ====================
'users-groups': `<div class="content-wrap">

${concept('👤','rgba(0,212,255,0.1)','User Management','useradd, userdel, usermod',`
${term('User Commands',[

  '# -m = home directory banana',
  '# -s = shell specify karo',
  '',

  '$ sudo passwd deployuser',
  '>> New password:',

  '',

  '$ sudo usermod -aG www-data deployuser',

  '# User delete karo',
  '$ sudo userdel deployuser',

  '$ w',
  '$ last | head -20',
])}
${iq('/etc/passwd file mein kya hota hai?','<code>/etc/passwd</code> mein har user ki entry hoti hai. Format: <code>username:x:UID:GID:GECOS:home_dir:shell</code>. Example: <code>ubuntu:x:1000:1000:Ubuntu,,,:/home/ubuntu:/bin/bash</code> — username=ubuntu, x=password in /etc/shadow, uid=1000, gid=1000, home=/home/ubuntu, shell=/bin/bash. Password field mein "x" matlab actual encrypted password <code>/etc/shadow</code> mein hai (more secure).')}
`)}

${concept('👥','rgba(0,255,136,0.1)','Group Management','Groups create, modify, check',`
${term('Group Commands',[

${concept('🔑','rgba(255,140,0,0.1)','sudo — Superuser Powers','Root ke bina root powers',`
<div class="box info"><div class="box-title">Sudo kya hai?</div><strong>sudo</strong> = "Substitute User DO" — ek command ke liye temporarily root ban jao, bina root login ke. Ye security ke liye important hai — har time root mat bano.</div>
${term('sudo Commands',[
  '# Single command root se run karo',
  '$ sudo systemctl restart nginx',
  '',
  '# Root shell open karo',
  '$ sudo -i',
  '# OR',
  '$ sudo su -',
  '',
  '# Doosre user se run karo',
  '$ sudo -u www-data php artisan optimize',
  '',
  '# Previous command sudo ke saath run karo',
  '$ sudo !!',
  '',
  '# sudo kab expire hoga — list dekho',
  '$ sudo -l',
  '',
  '# sudoers file edit karo (ALWAYS visudo se!)',
  '$ sudo visudo',
  '',
  '# Common sudoers entry:',
  '>> ubuntu ALL=(ALL:ALL) ALL',
  '# Username   Hosts=(Users:Groups) Commands',
  '',
  '# Password-less sudo (deployment user ke liye)',

])}
${iq('sudo aur su mein kya fark hai?','<code>su</code> = Switch User — completely doosre user ban jao (password chahiye). <code>sudo</code> = Superuser Do — apne password se ek command root ke naam pe run karo. Security best practice: always sudo use karo, su avoid karo. <code>sudo -i</code> root shell deta hai. <code>su - username</code> specific user ban jata hai. Production servers pe root login disable karo aur sudo use karo.')}
`)}

${concept('📊','rgba(0,255,136,0.1)','top aur htop — Live Monitoring','Real-time system monitoring',`

${concept('🔫','rgba(255,68,102,0.1)','kill — Process Terminate Karo','Process band karo',`
${term('kill Commands',[
  '# PID se process kill karo (graceful)',
  '$ kill 1234',
  '# SIGTERM signal bhejta hai (15)',

  '# Force kill (immediately)',

'disk-storage': `<div class="content-wrap">

${term('df — Disk Free',[

${term('du — Directory Usage (kya occupy kar raha hai?)',[

  '',

  '$ du -sh * | sort -rh | head -10',
  '',
  '# Disk full hai — kya occupy kar raha hai?',

<div class="sec-label red">Disk Full Fix Karna</div>
${term('Disk Full Emergency Fix',[

  '# Step 3: Journal logs clean karo',
  '$ sudo journalctl --vacuum-time=3d',
  '$ sudo journalctl --vacuum-size=200M',
  '',
  '# Step 4: APT cache clean karo',
  '$ sudo apt clean',
  '$ sudo apt autoremove',
  '',

  '',

// ==================== CRON ====================
'cron-jobs': `<div class="content-wrap">
<div class="page-hdr">
  <div class="chapter">Chapter 15</div>
  <h1>Cron <span>Jobs</span></h1>
  <p class="desc">Scheduled tasks — automated backups, cleanups, aur Laravel scheduler.</p>
</div>

${concept('⏰','rgba(0,255,136,0.1)','Cron Syntax — Time Format Samajhna','5 fields, infinite possibilities',`
<div class="sec-label blue">Cron Format</div>
<div style="background:var(--terminal);border:1px solid #0a2a3a;border-radius:8px;padding:16px;font-family:'Space Mono',monospace;font-size:13px;margin:10px 0">
  <span style="color:#00d4ff">*</span>  <span style="color:#00ff88">*</span>  <span style="color:#ff8c00">*</span>  <span style="color:#a855f7">*</span>  <span style="color:#ffd700">*</span>  command<br>
  <span style="color:#00d4ff">│</span>  <span style="color:#00ff88">│</span>  <span style="color:#ff8c00">│</span>  <span style="color:#a855f7">│</span>  <span style="color:#ffd700">│</span><br>
  <span style="color:#00d4ff">│</span>  <span style="color:#00ff88">│</span>  <span style="color:#ff8c00">│</span>  <span style="color:#a855f7">│</span>  <span style="color:#ffd700">└─ Weekday (0-7, 0=Sun)</span><br>
  <span style="color:#00d4ff">│</span>  <span style="color:#00ff88">│</span>  <span style="color:#ff8c00">│</span>  <span style="color:#a855f7">└─── Month (1-12)</span><br>
  <span style="color:#00d4ff">│</span>  <span style="color:#00ff88">│</span>  <span style="color:#ff8c00">└───── Day (1-31)</span><br>
  <span style="color:#00d4ff">│</span>  <span style="color:#00ff88">└─────── Hour (0-23)</span><br>
  <span style="color:#00d4ff">└───────── Minute (0-59)</span>
</div>
<table class="tbl">
<tr><th>Cron Expression</th><th>Matlab</th></tr>
<tr><td>* * * * *</td><td>Har minute</td></tr>
<tr><td>0 * * * *</td><td>Har ghante mein (minute 0 pe)</td></tr>
<tr><td>0 0 * * *</td><td>Roz raat 12 baje (midnight)</td></tr>
<tr><td>0 2 * * *</td><td>Roz raat 2 baje</td></tr>
<tr><td>0 0 * * 0</td><td>Har Sunday midnight</td></tr>
<tr><td>0 0 1 * *</td><td>Har mahine 1 tarikh ko</td></tr>
<tr><td>*/5 * * * *</td><td>Har 5 minute mein</td></tr>
<tr><td>0 9-17 * * 1-5</td><td>Weekdays 9am-5pm har ghante</td></tr>
<tr><td>30 6 * * 1,3,5</td><td>Mon, Wed, Fri 6:30am</td></tr>
</table>
${term('crontab Commands',[
  '# Current user ke cron jobs dekho',
  '$ crontab -l',
  '',
  '# Cron jobs edit karo',
  '$ crontab -e',
  '',
  '# Cron jobs delete karo (CAREFUL!)',
  '$ crontab -r',
  '',
  '# Doosre user ke cron jobs (root se)',
  '$ sudo crontab -l -u ubuntu',
  '$ sudo crontab -e -u ubuntu',
  '',
  '# Cron logs dekho',
  '$ grep CRON /var/log/syslog',
  '$ grep CRON /var/log/cron',
])}
`)}

${concept('🚀','rgba(255,140,0,0.1)','Real-World Cron Examples','Laravel scheduler aur backups',`
${term('Common Cron Jobs',[
  '# Laravel Scheduler — MUST for production',
  '* * * * * cd /var/www/html/myproject && \\',
  'php artisan schedule:run >> /dev/null 2>&1',
  '',
  '# Daily database backup (2am pe)',
  '0 2 * * * /home/ubuntu/scripts/backup.sh \\',
  '>> /home/ubuntu/logs/backup.log 2>&1',
  '',
  '# Disk space alert (har 6 ghante)',
  '0 */6 * * * df -h | mail -s "Disk Report" admin@mysite.com',
  '',
  '# Old logs delete karo (har hafte Sunday)',
  '0 0 * * 0 find /var/log -name "*.gz" -mtime +30 -delete',
  '',
  '# PHP artisan queue restart (roz raat)',
  '0 0 * * * sudo supervisorctl restart laravel-worker:*',
  '',
  '# SSL certificate renewal check',
  '0 12 * * * /usr/bin/certbot renew --quiet',
  '',
  '# Website uptime check',
  '*/5 * * * * curl -s -o /dev/null -w "%{http_code}" \\',
  'https://mysite.com | grep -q 200 || \\',
  'echo "Site Down!" | mail admin@mysite.com',
])}
<div class="box warn"><div class="box-title">⚠️ Cron Debugging Tips</div>
1. Cron ko full path chahiye — <code>/usr/bin/php</code> not just <code>php</code><br>
2. Output redirect karo log mein check karne ke liye<br>
3. <code>>> /dev/null 2>&1</code> = all output discard karo<br>
4. Environment variables alag hote hain cron mein<br>
5. Pehle command manually run karke test karo</div>
${iq('>> /dev/null 2>&1 ka kya matlab hai?','<code>/dev/null</code> Linux ka "black hole" hai — jo bhi bhejo, wahan jaata hai aur disappear ho jaata hai. <code>>></code> stdout (normal output) ko /dev/null mein redirect karta hai. <code>2>&1</code> stderr (error output) ko stdout mein redirect karta hai — matlab dono outputs discard ho jaate hain. Cron mein ye use karte hain jab output email ke through receive nahi karna. Log file save karna ho to: <code>>> /var/log/myapp.log 2>&1</code>')}
`)}
</div>`,

<div class="box danger"><div class="box-title">⚠️ UFW Enable Karne Se Pehle</div>Hamesha pehle SSH allow karo: <code>sudo ufw allow ssh</code> — phir enable karo. Agar SSH allow nahi kiya to server se locked out ho jaoge!</div>
${iq('UFW mein MySQL port (3306) kyun block karna chahiye?','MySQL by default 0.0.0.0:3306 pe listen karta hai — matlab publicly accessible hota hai. Agar firewall nahi hai to koi bhi internet se MySQL ko brute force attack kar sakta hai. <code>sudo ufw deny 3306</code> se ye port block ho jaata hai. Aur MySQL config mein <code>bind-address = 127.0.0.1</code> set karo — ye locally hi accessible rahega. Sirf internal applications ko MySQL access chahiye, public internet ko nahi.')}

${concept('🔐','rgba(0,212,255,0.1)','SSH Hardening','SSH ko secure banana',`
${term('SSH Security Config',[
  '# SSH config file edit karo',

  '',
  '# Recommended settings:',
  'Port 2222                  # Default port change karo',

  'MaxAuthTries 3             # 3 attempts ke baad block',
  'AllowUsers ubuntu deploy   # Sirf ye users',
  '',
  '# Apply karo',

  '$ nano ~/.ssh/authorized_keys',
  '',
  '# Fail2Ban install karo (brute force protection)',
  '$ sudo apt install fail2ban',
  '$ sudo systemctl enable fail2ban',
  '$ sudo systemctl start fail2ban',
  '',
  '# Brute force attempts dekho',
  '$ sudo fail2ban-client status sshd',
  '$ grep "Failed password" /var/log/auth.log | wc -l',
])}
${iq('SSH key authentication kyun password se better hai?','SSH key authentication mein: (1) Private key kabhi network pe nahi jaati — sirf signature bheja jaata hai, (2) Brute force karna practically impossible hai (2048+ bit keys), (3) Koi passphrase yaad nahi rakhna padta (key file hi authentication hai), (4) Automated deployments possible hain bina password expose kiye. Password authentication mein: guessable hain, network pe travel karta hai, brute force possible. Production servers pe hamesha key-based auth use karo aur password auth disable karo.')}
`)}

${concept('🔒','rgba(0,255,136,0.1)','SSL/HTTPS — Let\'s Encrypt','Free SSL certificate install karna',`
${term('Certbot SSL Setup',[
  '# Certbot install karo',
  '$ sudo apt install certbot python3-certbot-nginx',
  '',
  '# SSL certificate generate karo (Nginx)',
  '$ sudo certbot --nginx -d mysite.com -d www.mysite.com',
  '',
  '# SSL certificate generate karo (Apache)',
  '$ sudo certbot --apache -d mysite.com',
  '',
  '# Certificate info dekho',
  '$ sudo certbot certificates',
  '',
  '# Renewal test karo (dry run)',
  '$ sudo certbot renew --dry-run',
  '',
  '# Auto renewal cron setup',
  '$ sudo systemctl status certbot.timer',
  '# Ubuntu pe auto-renew default enabled hai',
  '',
  '# Certificate files kahan hain',
  '/etc/letsencrypt/live/mysite.com/fullchain.pem',
  '/etc/letsencrypt/live/mysite.com/privkey.pem',
])}
`)}

<div class="box danger"><div class="box-title">🚨 Server Security Checklist</div>
❌ <code>APP_DEBUG=true</code> production pe mat rakhho<br>
❌ <code>.env</code> file publicly accessible mat chhodho<br>
❌ <code>777</code> permissions kabhi mat do<br>
❌ Root user se direct login mat karo<br>

❌ Default SSH port 22 pe mat raho (change karo 2222+)<br>
✅ UFW firewall enable karo<br>
✅ Fail2Ban install karo<br>
✅ SSH key authentication use karo<br>
✅ SSL/HTTPS use karo<br>
✅ Regular backups lo<br>
✅ <code>sudo apt update && upgrade</code> regularly karo

'ssh': `<div class="content-wrap">

${concept('🔐','rgba(0,212,255,0.1)','SSH Complete Guide','Connect, configure, secure',`
${term('SSH Usage',[

${iq('SSH keys kaise kaam karti hain?','SSH key authentication mein do keys hoti hain: Public key (server pe) aur Private key (aapke paas). Process: (1) Private key se digital signature create hoti hai, (2) Server pe stored public key se signature verify hota hai, (3) Match hone pe authentication successful. Private key kabhi server pe nahi jaati — sirf signature jaata hai. Security: 2048+ bit RSA ya Ed25519 keys practically uncrackable hain. <code>~/.ssh/authorized_keys</code> server pe public keys store karta hai.')}

// ==================== INTERVIEW ====================
'interview': `<div class="content-wrap">
<div class="page-hdr">
  <div class="chapter">Interview Prep</div>
  <h1>Top Linux <span>Interview Questions</span></h1>
  <p class="desc">80+ most-asked Linux interview questions — Hinglish mein simple aur clear answers ke saath.</p>
</div>

<div class="tab-wrap">
<div class="tab-row">
  <button class="tab-btn active" onclick="switchTab(this,'iq-basics')">Basics</button>
  <button class="tab-btn" onclick="switchTab(this,'iq-files')">Files & Permissions</button>
  <button class="tab-btn" onclick="switchTab(this,'iq-process')">Processes</button>
  <button class="tab-btn" onclick="switchTab(this,'iq-network')">Networking</button>
  <button class="tab-btn" onclick="switchTab(this,'iq-admin')">Sysadmin</button>
  <button class="tab-btn" onclick="switchTab(this,'iq-scripting')">Scripting</button>
</div>

<div class="tab-pane active" id="iq-basics">
${iq('Linux aur Unix mein kya fark hai?','Unix ek proprietary OS hai (1969, Bell Labs). Linux Unix-inspired open-source OS hai (1991, Linus Torvalds). Linux ka kernel free hai. Unix commercial hai (AIX, HP-UX, Solaris). macOS bhi Unix-certified hai.')}
${iq('Inode kya hota hai?','Inode (Index Node) ek data structure hai jo file ki metadata store karta hai: permissions, owner, group, size, timestamps, aur disk blocks ke pointers. Inode mein filename nahi hota — sirf directory mein filename-inode mapping hoti hai. <code>ls -i</code> se inode number dekh sakte ho. <code>df -i</code> se inode usage.')}
${iq('Hard link aur soft link mein kya fark hai?','<strong>Hard link</strong>: Same inode point karta hai — file ke data ka direct reference. Koi bhi link delete karo, data tab tak rahega jab tak ek bhi link bachi ho. Alag filesystems par nahi bana sakte. <code>ln file hardlink</code>. <strong>Soft link (Symlink)</strong>: Ek shortcut jaisa — ek aur path ko point karta hai. Original delete karo to symlink "broken" ho jaata hai. Alag filesystems par bhi bana sakte ho. <code>ln -s file softlink</code>.')}
${iq('$? kya hota hai shell mein?','<code>$?</code> previous command ka exit code hold karta hai. 0 = success, non-zero = failure (error). Example: <code>ls /nonexistent; echo $?</code> → 2 (error). Scripts mein use: <code>if [ $? -ne 0 ]; then echo "Error!"; fi</code>. Iska shortcut: <code>command && echo "OK" || echo "Failed"</code>.')}
${iq('&& aur || ka kya matlab hai?','<code>&&</code> = AND — pehla command succeed hone pe doosra run karo. <code>cmd1 && cmd2</code> — cmd2 sirf tab chalega agar cmd1 succeed kare (exit 0). <code>||</code> = OR — pehla command fail hone pe doosra run karo. <code>cmd1 || cmd2</code> — cmd2 sirf tab chalega agar cmd1 fail kare. Example: <code>nginx -t && systemctl reload nginx || echo "Config error!"</code>')}
${iq('Linux mein zombie process kya hota hai?','Zombie process (defunct) woh process hai jiske parent ne uske exit status ko read nahi kiya. Process execute ho chuka hai (dead) lekin process table mein still present hai. Symbol: Z in <code>ps aux</code> STAT column. Kill nahi kar sakte zombie ko directly — parent process ko fix karo ya restart karo. Bohot zyada zombies = parent process ka bug.')}
${iq('Swap space kya hota hai?','Swap = RAM extension. Jab RAM full ho jaata hai to OS disk pe temporary data swap karta hai. Slower than RAM. <code>free -m</code> mein Swap row dikhti hai. <code>swapon --show</code> se swap info. Swap file ya separate partition ho sakta hai. Recommended: RAM ka 2x swap (small RAM ke liye), ya RAM ke barabar (large RAM ke liye).')}
${iq('PATH variable kya hota hai?','<code>PATH</code> ek environment variable hai jo directories ki list hai jahan shell commands dhundhta hai. <code>echo $PATH</code> — directories : se separate hain. Jab tum <code>php</code> type karte ho, shell PATH mein har directory check karta hai jab tak php nahi milti. Custom path add karo: <code>export PATH=$PATH:/custom/path</code> aur <code>~/.bashrc</code> mein daalo permanent ke liye.')}
${iq('runlevels ya systemd targets kya hain?','Runlevels (SysV init) define karte hain system state ko. 0=halt, 1=single-user, 2-4=multi-user, 5=multi-user+GUI, 6=reboot. Systemd targets: poweroff.target (0), rescue.target (1), multi-user.target (3), graphical.target (5), reboot.target (6). Check: <code>systemctl get-default</code>. Change: <code>systemctl set-default multi-user.target</code>.')}
</div>

<div class="tab-pane" id="iq-files">
${iq('chmod 777 kyun dangerous hai?','777 permission matlab owner+group+others sab read+write+execute kar sakte hain. Koi bhi user ya process file modify kar sakta hai ya execute kar sakta hai — malicious users bhi. Web server environment mein: koi bhi uploaded file execute ho sakti hai agar 777 permission hai. Security principle: Principle of Least Privilege — sirf minimum required permissions do. Use 755 for directories, 644 for files, 775 for shared writable dirs.')}
${iq('/tmp directory ke baare mein batao?','<code>/tmp</code> temporary files ke liye hai. Most systems mein /tmp RAM-based (tmpfs) ya disk-based hota hai. System restart pe automatically clear ho jaata hai. World-writable (1777) hai — koi bhi user files create kar sakta hai lekin sirf owner hi delete kar sakta hai (sticky bit). Web apps session files, upload temps yahan rakhte hain. Sensitive data /tmp mein mat rakho — other users read kar sakte hain.')}
${iq('umask kya hota hai?','umask file/directory creation ke default permissions determine karta hai. It "masks" (removes) bits from default. Default permissions: files=666, dirs=777. Common umask=022: files = 666-022=644, dirs = 777-022=755. <code>umask 027</code>: files=640, dirs=750 — group write aur others access band. <code>umask</code> command se current value dekho. <code>~/.bashrc</code> mein set karo permanent ke liye.')}
${iq('find command se 7 din purani files kaise delete karein?','<code>find /tmp -type f -mtime +7 -delete</code> — <code>-mtime +7</code> matlab 7 din se zyada pahle modified. <code>-delete</code> se delete ho jaata hai. Safer version: pehle dry run: <code>find /tmp -type f -mtime +7</code> (bina delete ke). Ya: <code>find /tmp -type f -mtime +7 -exec rm {} \\;</code>. Log files ke liye: <code>find /var/log -name "*.log.gz" -mtime +30 -delete</code>.')}
${iq('grep -E aur egrep mein kya fark hai?','Practically koi fark nahi — <code>egrep</code> = <code>grep -E</code>. Dono Extended Regular Expressions use karte hain. <code>grep -E "error|warning|critical"</code> = <code>egrep "error|warning|critical"</code>. Modern Linux mein egrep deprecated hai, <code>grep -E</code> use karo. <code>grep -P</code> Perl-compatible regex use karta hai (most powerful).')}
${iq('Symbolic link broken ho jaaye to kaise fix karein?','Broken symlink tab hoti hai jab target file/dir delete ya move ho jaaye. Check: <code>ls -la</code> — broken links red color mein dikhte hain. Ya: <code>find /path -xtype l</code> — broken symlinks list. Fix: <code>ln -sf /new/target /path/to/symlink</code> — -f flag existing symlink replace karta hai. Laravel mein: <code>php artisan storage:link</code> storage symlink recreate karta hai.')}
</div>

<div class="tab-pane" id="iq-process">
${iq('Process states kya hain Linux mein?','Process states: <strong>R (Running)</strong> — CPU pe actively execute ho raha hai. <strong>S (Sleeping)</strong> — event ka wait kar raha hai (most processes). <strong>D (Uninterruptible sleep)</strong> — I/O wait — kill bhi nahi hota. <strong>Z (Zombie)</strong> — dead lekin table mein hai. <strong>T (Stopped)</strong> — signal se stopped (Ctrl+Z). <strong>I (Idle)</strong> — kernel thread idle. <code>ps aux</code> STAT column mein dekho.')}
${iq('Foreground aur background process mein kya fark hai?','<strong>Foreground process</strong>: Terminal se attached — terminal block ho jaata hai jab tak process complete na ho. <strong>Background process</strong>: Terminal free rehta hai. Background mein bhejne ke tarike: (1) <code>command &</code> — directly background mein start, (2) <code>Ctrl+Z</code> pause karo phir <code>bg</code> se background mein bhejo. <code>jobs</code> se background jobs dekho, <code>fg %1</code> se wapas foreground mein lao, <code>wait</code> se wait karo complete hone tak.')}
${iq('nohup kya karta hai?','<code>nohup command &</code> — "no hang up" — process ko terminal close hone ke baad bhi chalaata rehta hai. Normally jab terminal close hota hai, SIGHUP signal sab processes ko milta hai aur woh terminate ho jaate hain. nohup SIGHUP ko ignore karta hai. Output <code>nohup.out</code> mein save hoti hai by default. Better alternative: <code>screen</code> ya <code>tmux</code> terminal multiplexers, ya <code>systemd</code> service.')}
${iq('lsof command kya karta hai?','<code>lsof</code> (List Open Files) — sab open files aur network connections dikhata hai. Everything in Linux is a file. <code>lsof -p 1234</code> — specific process ki open files. <code>lsof -i :80</code> — port 80 use kar rahe processes. <code>lsof /var/log/nginx/error.log</code> — kaunsa process ye file open kiye hai. Useful: "Device or resource busy" error pe — <code>lsof +D /mount/point</code> se dekho kaunsa process filesystem use kar raha hai.')}
${iq('crontab entry debug kaise karein?','Debugging steps: (1) Path issue — cron mein $PATH limited hota hai, full path use karo: <code>/usr/bin/php</code>. (2) Test manually: exact command terminal mein run karo. (3) Output log mein save karo: <code>command >> /tmp/cron.log 2>&1</code>. (4) Cron daemon check: <code>systemctl status cron</code>. (5) Syslog check: <code>grep CRON /var/log/syslog</code>. (6) Permissions check: script executable hai? <code>ls -l script.sh</code>. (7) Environment variables: cron environment minimal hai — explicitly set karo.')}
</div>

<div class="tab-pane" id="iq-network">
${iq('OSI model ke 7 layers kya hain?','Layer 7: Application (HTTP, FTP, DNS). Layer 6: Presentation (SSL, encoding). Layer 5: Session (connection management). Layer 4: Transport (TCP, UDP — ports). Layer 3: Network (IP — routing). Layer 2: Data Link (MAC addresses, switches). Layer 1: Physical (cables, signals). Trick: "Please Do Not Throw Sausage Pizza Away" (7 se 1 tak).')}
${iq('TCP aur UDP mein kya fark hai?','<strong>TCP</strong> (Transmission Control Protocol): Connection-oriented, reliable, ordered delivery guarantee karta hai, error checking hai, slower. Uses: HTTP/HTTPS, SSH, MySQL, FTP. <strong>UDP</strong> (User Datagram Protocol): Connectionless, no delivery guarantee, faster, no ordering. Uses: DNS, VoIP, streaming, gaming. Server monitoring: TCP ports <code>ss -tlnp</code> se dekho.')}
${iq('/etc/hosts file kya karta hai?','<code>/etc/hosts</code> local DNS override karta hai. Format: <code>IP hostname</code>. DNS query hone se pehle system /etc/hosts check karta hai. Use cases: (1) Development — local domain map karo (<code>127.0.0.1 mysite.local</code>), (2) Internal servers — <code>192.168.1.10 db-server</code>, (3) Websites block karo (<code>0.0.0.0 malware-site.com</code>), (4) DNS down ho to critical domains map karo. /etc/nsswitch.conf se order control hota hai.')}
${iq('curl aur wget mein kya fark hai?','<strong>curl</strong>: More versatile — various protocols support (HTTP, HTTPS, FTP, SFTP), custom headers, POST requests, REST API calls. Output stdout pe by default. <strong>wget</strong>: Download focused — recursive download, resume capability, background download. Files save karta hai by default. Linux server pe dono usually available hain. API testing ke liye curl, file download ke liye wget prefer karo.')}
${iq('netstat -tulnp command explain karo?','<code>netstat</code> network statistics: <code>-t</code> = TCP connections, <code>-u</code> = UDP connections, <code>-l</code> = Listening sockets only, <code>-n</code> = Numeric (IP/port, hostname resolve mat karo — faster), <code>-p</code> = Process name/PID show karo. Modern alternative: <code>ss -tulnp</code> (faster). Output mein: Proto, Local Address, Foreign Address, State, PID/Program. Port 80 pe kaunsa process: <code>ss -tlnp | grep :80</code>.')}
</div>

<div class="tab-pane" id="iq-admin">
${iq('Server reboot ke baad services automatically start nahi hote — kya karoge?','<code>systemctl enable service-name</code> se service boot pe automatically start hogi. Check: <code>systemctl is-enabled nginx</code>. Agar disabled hai: <code>sudo systemctl enable nginx</code>. <code>systemctl enable</code> ek symlink banata hai /etc/systemd/system/ mein. Manual override: <code>/etc/rc.local</code> mein commands daal sakte ho (legacy). Verify: server reboot karo aur <code>systemctl status nginx</code> check karo.')}
${iq('Server slow hai — kaise diagnose karoge?','Systematic approach: (1) <code>top</code> ya <code>htop</code> — CPU aur memory dekho, high usage process identify karo. (2) <code>free -m</code> — RAM available hai? Swap use ho raha hai? (3) <code>df -h</code> — disk full to nahi? (4) <code>iostat</code> — disk I/O bottleneck? (5) <code>ss -tnp</code> — too many connections? (6) <code>tail -f /var/log/nginx/error.log</code> — errors? (7) Application-specific: Laravel log, MySQL slow query log. (8) <code>dmesg</code> — kernel level issues.')}
${iq('Production database backup kaise lete hain?','<strong>mysqldump</strong>: <code>mysqldump -u root -p dbname > backup.sql</code>. Compressed: <code>mysqldump -u root -p dbname | gzip > backup_$(date +%Y%m%d).sql.gz</code>. All databases: <code>mysqldump -u root -p --all-databases > all_dbs.sql</code>. Best practices: (1) Regular automated backups via cron, (2) Remote storage mein copy karo (S3, remote server), (3) Backup integrity test karo regularly, (4) Point-in-time recovery ke liye binary logging enable karo, (5) Hot backup tools: Percona XtraBackup (no lock).')}
${iq('Server pe kisi unknown process chal raha hai — kaise investigate karoge?','Steps: (1) <code>ps aux | grep [process-name]</code> — process details. (2) <code>ls -la /proc/[PID]/exe</code> — actual executable. (3) <code>lsof -p [PID]</code> — open files aur connections. (4) <code>ss -tnp | grep [PID]</code> — network connections. (5) <code>cat /proc/[PID]/cmdline</code> — command line. (6) <code>strace -p [PID]</code> — system calls monitor karo. (7) <code>/var/log/auth.log</code> — unauthorized access check. Suspicious process: <code>kill -9 [PID]</code> aur investigate karo incident ke liye.')}
${iq('SSH brute force attack detect kaise karein?','<code>grep "Failed password" /var/log/auth.log | wc -l</code> — failed attempts count. <code>grep "Failed password" /var/log/auth.log | awk "{print $11}" | sort | uniq -c | sort -rn | head</code> — top attacking IPs. Prevention: (1) fail2ban install — automatically block IPs after X failed attempts, (2) SSH port change karo (2222, 22222), (3) PasswordAuthentication no — key only, (4) AllowUsers specify karo, (5) MaxAuthTries 3. Monitoring: <code>sudo fail2ban-client status sshd</code>.')}
${iq('Load average kya hota hai — top mein kya dekha?','Load average 1, 5, 15 minute ke averages hain — CPU queue mein kitne processes wait kar rahe hain. Single CPU ke liye: load > 1.0 = overloaded. N CPUs ke liye: load > N = overloaded. <code>nproc</code> ya <code>lscpu</code> se CPU count. Healthy server pe load average CPU count se kam rehna chahiye. High load average but low CPU % = I/O wait (disk ya network bottleneck).')}
${iq('Kernel parameters kaise tune karte hain?','<code>sysctl</code> se runtime kernel parameters dekh aur change kar sakte ho. Check: <code>sysctl -a | grep net.core</code>. Temporary change: <code>sudo sysctl -w net.core.somaxconn=1024</code>. Permanent: <code>/etc/sysctl.conf</code> ya <code>/etc/sysctl.d/</code> mein add karo. Apply: <code>sudo sysctl -p</code>. Common tuning: net.ipv4.tcp_keepalive, vm.swappiness (RAM vs swap preference), fs.file-max (max open files).')}
</div>

<div class="tab-pane" id="iq-scripting">
${iq('Bash script mein exit codes ka kya use hai?','Every command ek exit code return karta hai. 0 = success, 1-255 = various errors. Script mein: <code>exit 0</code> success, <code>exit 1</code> failure. <code>$?</code> se previous command ka exit code milta hai. Use: <code>if [ $? -ne 0 ]; then echo "Failed"; exit 1; fi</code>. <code>set -e</code> se script any non-zero exit pe automatically stop ho jaata hai. CI/CD pipelines mein exit codes pe deployment decisions hote hain.')}
${iq('Special variables $0, $1, $#, $@ kya hain?','<code>$0</code> = Script ka naam. <code>$1, $2...</code> = Positional arguments (1st, 2nd...). <code>$#</code> = Arguments ki count. <code>$@</code> = Saare arguments (individually). <code>$*</code> = Saare arguments (as one string). <code>$$</code> = Current script ka PID. <code>$!</code> = Last background process ka PID. <code>$?</code> = Last command exit code. Example: <code>./script.sh arg1 arg2</code> mein $0=./script.sh, $1=arg1, $2=arg2, $#=2.')}
${iq('awk command ka basic use kya hai?','<code>awk</code> columnar data process karne ka powerful tool hai. <code>$1, $2...</code> columns hain. <code>awk "{print $1}" file</code> — pehla column print. <code>df -h | awk "NR==2{print $5}"</code> — 2nd row, 5th column (disk usage %). <code>awk -F: "{print $1}" /etc/passwd</code> — : delimiter se split karke 1st column. Common use: log parsing, column extraction, calculations. <code>awk "/pattern/{print $0}" file</code> — grep + print.')}
${iq('Bash mein function kaise banate hain?','Syntax: <code>function_name() { commands; }</code> ya <code>function function_name { commands; }</code>. Return value: <code>return 0</code> (exit code). String return: echo se output capture karo. Arguments: function ke andar $1, $2 positional args. Example: <code>check_service() { systemctl is-active $1 || { echo "$1 down!"; return 1; } }</code>. Call: <code>check_service nginx</code>. Functions script mein reusability aur readability badhate hain.')}
${iq('Here document (heredoc) kya hota hai?','Multi-line string bash mein: <code>cat << EOF ... EOF</code>. EOF ke beech sab kuch as-is treat hota hai. Variables expand hoti hain. Use case: Multi-line config file banana, SQL queries, documentation. Example: <code>cat << EOF > .env\nAPP_NAME=MyApp\nDB_HOST=127.0.0.1\nEOF</code>. Single quotes mein EOF: <code>cat << \'EOF\'</code> — variables expand nahi honge.')}
${iq('sed command kya karta hai?','<code>sed</code> (Stream Editor) files mein find & replace, delete, insert karta hai bina editor khole. Basic: <code>sed "s/old/new/g" file</code> — replace all occurrences. In-place edit: <code>sed -i "s/old/new/g" file</code>. Specific line delete: <code>sed -i "5d" file</code>. Pattern match pe delete: <code>sed -i "/pattern/d" file</code>. .env update: <code>sed -i "s/APP_DEBUG=true/APP_DEBUG=false/" .env</code>. Very powerful for automated config changes in scripts.')}
</div>
</div>

<div class="box purple" style="margin-top:24px"><div class="box-title">💼 Interview Tips</div>
1. "Mujhe practically dikha sakte ho?" ke liye hamesha ready raho — commands practice karo<br>
2. Har answer mein real example do — "Maine production pe ye issue solve kiya..."<br>
3. Security implications hamesha mention karo — "Ye 777 kyun dangerous hai"<br>
4. Monitoring approach batao — "Pehle logs check karta hun, phir..."<br>
5. Troubleshooting systematic approach — step by step explain karo
</div>
</div>`,

// ==================== PERMISSION CALCULATOR ====================
function calcPerm() {
  const checks = { ur:4, uw:2, ux:1, gr:4, gw:2, gx:1, or2:4, ow:2, ox:1 };
  let u=0, g=0, o=0;
  if(document.getElementById('ur')?.checked) u+=4;
  if(document.getElementById('uw')?.checked) u+=2;
  if(document.getElementById('ux')?.checked) u+=1;
  if(document.getElementById('gr')?.checked) g+=4;
  if(document.getElementById('gw')?.checked) g+=2;
  if(document.getElementById('gx')?.checked) g+=1;
  if(document.getElementById('or2')?.checked) o+=4;
  if(document.getElementById('ow')?.checked) o+=2;
  if(document.getElementById('ox')?.checked) o+=1;
  
  const num = `${u}${g}${o}`;
  const sym = (n) => (n&4?'r':'-')+(n&2?'w':'-')+(n&1?'x':'-');
  const symStr = sym(u)+sym(g)+sym(o);
  const desc = `Owner: ${(u&4?'read ':'')+(u&4?'':'')}${sym(u).replace(/-/g,'')||'none'} | Group: ${sym(g).replace(/-/g,'')||'none'} | Others: ${sym(o).replace(/-/g,'')||'none'}`;
  
  const el = document.getElementById('perm-result');
  const del = document.getElementById('perm-desc');
  if(el) el.textContent = `${num} — ${symStr}`;
  if(del) del.textContent = desc;
}

// ==================== SCROLL BEHAVIOR ====================
document.getElementById('main').addEventListener('scroll', function() {
  const btn = document.getElementById('scrolltop');
  if(this.scrollTop > 400) btn.classList.add('show');
  else btn.classList.remove('show');
});

// ==================== INIT ====================
buildNav();
loadPage('home');
</script>
