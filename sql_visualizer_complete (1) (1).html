 query:[
  {t:`<span class="kw">EXPLAIN ANALYZE</span>`,l:[0]},
  {t:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> emp`,l:[1]},
  {t:`<span class="kw">WHERE</span> sal <span class="op">&gt;</span> <span class="num">80000</span>;`,l:[2]},
  {t:``,l:[]},
  {t:`<span class="cm">-- Output:</span>`,l:[]},
  {t:`<span class="cm">-- Seq Scan / Index Scan</span>`,l:[]},
  {t:`<span class="cm">-- cost=0.00..8.17 rows=3</span>`,l:[]},
 ],
 steps:[
  {label:'Seq Scan',qL:[1,2],cpp:`<span class="cc">// Seq Scan = loop all rows</span>\n<span class="ck">for</span>(<span class="ck">auto</span>&amp; r:table) check(r);\n<span class="cc">// O(n)</span>`,
   explain:`<b>Seq Scan</b> = koi index nahi, har row check. Large tables pe slow. EXPLAIN mein dikhna = problem.`,
   render(){return`<div class="dl">EXPLAIN — Seq Scan:</div><div class="cte-box" style="font-family:var(--mono);font-size:12px;color:#c8c8c0;line-height:1.9"><div><span style="color:var(--red-dk)">Seq Scan</span> on emp  (cost=0.00..1.06 rows=6)</div><div>  Filter: (sal &gt; 80000)</div><div style="color:var(--text3)">  Rows Removed by Filter: 3</div></div><div class="info-box err" style="margin-top:6px">⚠ Large table pe Seq Scan = performance problem!</div>`;}},
  {label:'Index Scan',qL:[0,1,2],cpp:`<span class="cc">// Index Scan = B-Tree</span>\nidx.lower_bound(80000);\n<span class="cc">// O(log n)</span>`,
   explain:`<b>Index Scan</b> — index use ho raha hai! Cost kaafi kam. Yeh dikhna = query optimized.`,
   render(){return`<div class="dl">EXPLAIN — Index Scan:</div><div class="cte-box" style="font-family:var(--mono);font-size:12px;color:#c8c8c0;line-height:1.9"><div><span style="color:var(--teal-dk)">Index Scan</span> using idx_sal on emp</div><div>  (cost=0.14..0.43 rows=3)</div><div>  Index Cond: (sal &gt; 80000)</div></div><div class="info-box ok" style="margin-top:6px">✓ Index Scan = optimized! Cost much lower.</div>`;}},
  {label:'Plan Nodes',qL:[],cpp:`<span class="cc">// EXPLAIN ANALYZE = run + time</span>`,
   explain:`<b>Plan nodes cheatsheet</b> — yeh sab EXPLAIN mein aate hain. Interview mein koi bhi pooch sakta hai.`,
   render(){return[['Seq Scan','Full table, O(n)','re'],['Index Scan','B-Tree, O(log n)','te'],['Index Only Scan','Covering index, fastest','te'],['Bitmap Heap Scan','Multiple index lookups','bl'],['Hash Join','Hash table build + probe','am'],['Nested Loop Join','Classic nested for-loop','am'],['Merge Join','Both sorted, merge O(n)','pu']].map(([n,d,c])=>`<div style="display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);margin:2px 0"><span class="tag ${c}" style="min-width:130px">${n}</span><span style="font-size:11px;color:var(--text2)">${d}</span></div>`).join('');}},
 ]},

{cat:'Performance',name:'Transactions & ACID',diff:'m',
 desc:'Transaction = atomic unit. Ya sab hoga, ya kuch nahi. Bank transfer = perfect example.',
 query:[
  {t:`<span class="kw">BEGIN</span>;`,l:[0]},
  {t:`<span class="kw">UPDATE</span> accounts <span class="kw">SET</span>`,l:[1]},
  {t:`  bal = bal - <span class="num">500</span>`,l:[2]},
  {t:`  <span class="kw">WHERE</span> id = <span class="num">1</span>; <span class="cm">-- Raj</span>`,l:[3]},
  {t:`<span class="kw">UPDATE</span> accounts <span class="kw">SET</span>`,l:[4]},
  {t:`  bal = bal + <span class="num">500</span>`,l:[5]},
  {t:`  <span class="kw">WHERE</span> id = <span class="num">2</span>; <span class="cm">-- Priya</span>`,l:[6]},
  {t:`<span class="kw">COMMIT</span>; <span class="cm">-- ya ROLLBACK</span>`,l:[7]},
 ],
 steps:[
  {label:'Problem',qL:[1,2,3,4,5,6],cpp:`<span class="cc">// Bina transaction:</span>\nraj.bal -= 500; <span class="cc">// SUCCESS</span>\n<span class="cc">// 💥 server crash!</span>\npriya.bal += 500; <span class="cc">// NEVER</span>\n<span class="cc">// ₹500 gum!</span>`,
   explain:`<b>Problem</b>: Raj se ₹500 kat gaya, server crash, Priya ko nahi mila. Transaction ensure karta — ya dono operations honge ya koi nahi.`,
   render(){return`<div style="display:flex;flex-direction:column;gap:6px">${rb('hi','Raj balance: ₹5000')}${rb('am','UPDATE 1: Raj - ₹500 → ₹4500 ✓')}<div class="info-box err">💥 Server crash / network failure!</div>${rb('fail','UPDATE 2: Priya + ₹500 → NEVER RAN')}<div class="info-box err">Result: ₹500 gum! Raj ke paas bhi nahi, Priya ke paas bhi nahi.</div></div>`;}},
  {label:'ACID',qL:[0,7],cpp:`<span class="cc">// A: Atomicity — all or nothing</span>\n<span class="cc">// C: Consistency — rules ok</span>\n<span class="cc">// I: Isolation — concurrent safe</span>\n<span class="cc">// D: Durability — disk pe save</span>`,
   explain:`<b>ACID</b> — har production database mein. Atomicity=sab ya kuch nahi. Consistency=data valid. Isolation=concurrent safe. Durability=commit ke baad permanent.`,
   render(){return[{p:'A — Atomicity',d:'Sab operations ya sab rollback. Half done nahi.',bg:'var(--blue-bg)',bd:'var(--blue)',tx:'var(--blue-dk)'},{p:'C — Consistency',d:'Database valid state mein. Constraints nahi tooti.',bg:'var(--teal-bg)',bd:'var(--teal)',tx:'var(--teal-dk)'},{p:'I — Isolation',d:'Concurrent transactions disturb nahi karte.',bg:'var(--amber-bg)',bd:'var(--amber)',tx:'var(--amber-dk)'},{p:'D — Durability',d:'Committed data crash ke baad bhi safe.',bg:'var(--purple-bg)',bd:'var(--purple)',tx:'var(--purple-dk)'}].map(a=>`<div class="acid-card" style="background:${a.bg};border-color:${a.bd}"><div class="acid-prop" style="color:${a.tx}">${a.p}</div><div class="acid-def" style="color:${a.tx}">${a.d}</div></div>`).join('');}},
  {label:'Isolation Levels',qL:[],cpp:`<span class="cc">// Higher = safer, slower</span>\n<span class="cc">// 1. READ UNCOMMITTED</span>\n<span class="cc">// 2. READ COMMITTED (PG default)</span>\n<span class="cc">// 3. REPEATABLE READ (MySQL def)</span>\n<span class="cc">// 4. SERIALIZABLE (strictest)</span>`,
   explain:`<b>4 Isolation Levels</b> — 3 problems prevent karte hain: Dirty Read, Non-Repeatable Read, Phantom Read. Higher level = zyada locking = slower.`,
   render(){const lvls=[['READ UNCOMMITTED','✗','✗','✗','Fastest'],['READ COMMITTED','✓','✗','✗','Fast (PG default)'],['REPEATABLE READ','✓','✓','✗','Medium (MySQL def)'],['SERIALIZABLE','✓','✓','✓','Slowest']];return tbl(['Level','Dirty','Non-Rep','Phantom'],lvls.map(([l,d,n,p,spd])=>[l,d.includes('✓')?`<span style="color:var(--teal)">${d}</span>`:`<span style="color:var(--red)">${d}</span>`,n.includes('✓')?`<span style="color:var(--teal)">${n}</span>`:`<span style="color:var(--red)">${n}</span>`,p.includes('✓')?`<span style="color:var(--teal)">${p}</span>`:`<span style="color:var(--red)">${p}</span>`]));}},
 ]},

{cat:'Performance',name:'Pagination — OFFSET vs Keyset',diff:'m',
 desc:'OFFSET large data pe slow. Production mein Keyset (Cursor) pagination use hoti hai.',
 query:[
  {t:`<span class="cm">-- OFFSET (simple but slow):</span>`,l:[]},
  {t:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> emp <span class="kw">ORDER BY</span> id`,l:[1]},
  {t:`<span class="kw">LIMIT</span> <span class="num">2</span> <span class="kw">OFFSET</span> <span class="num">4</span>;`,l:[2]},
  {t:``,l:[]},
  {t:`<span class="cm">-- Keyset (production fast):</span>`,l:[]},
  {t:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> emp`,l:[5]},
  {t:`<span class="kw">WHERE</span> id <span class="op">&gt;</span> <span class="num">4</span>  <span class="cm">-- last seen id</span>`,l:[6]},
  {t:`<span class="kw">ORDER BY</span> id <span class="kw">LIMIT</span> <span class="num">2</span>;`,l:[7]},
 ],
 steps:[
  {label:'OFFSET problem',qL:[1,2],cpp:`<span class="cc">// OFFSET = scan + discard!</span>\n<span class="cc">// OFFSET 1M LIMIT 10</span>\n<span class="cc">// = read 1M+10, discard 1M</span>`,
   explain:`<b>OFFSET problem</b> — OFFSET 4 = 4 rows scan karo, discard karo. OFFSET 1,000,000 = 1M wasted reads! Deep pages pe bahut slow.`,
   render(){return`<div class="dl">LIMIT 2 OFFSET 4:</div>${EMP.map((r,i)=>{const skip=i<4;const keep=i>=4&&i<6;return rb(keep?'pass':skip?'fail':'gr',`${skip?'✗ scanned+discarded':keep?'✓ returned':'—'} Row ${i+1}: ${r.name}`)}).join('')}<div class="info-box err" style="margin-top:6px">⚠ 4 rows wasted. OFFSET 1M = 1M wasted reads!</div>`;}},
  {label:'Keyset',qL:[5,6,7],cpp:`<span class="cc">// Keyset = index use!</span>\n<span class="cc">// WHERE id > last_id</span>\n<span class="cc">// O(log n) + O(limit) only</span>`,
   explain:`<b>Keyset</b> = last seen id save karo. Next page: WHERE id > last_id. Index directly jump — koi wasted reads nahi. Instagram, Twitter yahi use karte hain.`,
   render(){const lastId=2;return`<div class="dl">WHERE id > ${lastId} LIMIT 2:</div>${EMP.map(r=>{const include=r.id>lastId&&r.id<=lastId+2;return rb(include?'pass':r.id<=lastId?'gr':'fail',`${r.id<=lastId?'(cursor se pehle — index skip)':include?'✓ returned':'—'}: ${r.name}`);}).join('')}<div class="info-box ok" style="margin-top:6px">✓ Index jumps to id > 2. No wasted reads!</div>`;}},
  {label:'Comparison',qL:[],cpp:``,
   explain:`<b>Summary</b> — OFFSET simple lekin slow at depth. Keyset fast lekin no random page.`,
   render(){return tbl(['Feature','OFFSET','Keyset'],[['Page access','Any page directly','Only sequential'],['Performance','O(offset) degrades','O(log n) always fast'],['Consistency','Rows skip if data changes','Stable cursor'],['Use case','Admin panels, small data','Feeds, APIs, large data']].map(r=>[`<b>${r[0]}</b>`,`<span style="color:var(--red-dk)">${r[1]}</span>`,`<span style="color:var(--teal-dk)">${r[2]}</span>`]));}},
 ]},

{cat:'Design',name:'Normalization 1NF → 3NF',diff:'m',
 desc:'Data duplication hatao, anomalies prevent karo. 1NF=atomic, 2NF=no partial dep, 3NF=no transitive dep.',
 query:[
  {t:`<span class="cm">-- Unnormalized (bad):</span>`,l:[]},
  {t:`<span class="kw">CREATE TABLE</span> orders (`,l:[1]},
  {t:`  order_id, customer_name,`,l:[2]},
  {t:`  customer_city, <span class="cm">-- repeated!</span>`,l:[3]},
  {t:`  items   <span class="cm">-- multiple values!</span>`,l:[4]},
  {t:`);`,l:[5]},
 ],
 steps:[
  {label:'Problem',qL:[1,2,3,4],cpp:`struct Order {\n  string custName; <span class="cc">// repeated!</span>\n  string custCity; <span class="cc">// repeated!</span>\n  string items;    <span class="cc">// array in string!</span>\n};`,
   explain:`<b>Unnormalized</b> — customer_city har order mein repeat. Raj ki city change = sab rows update. Multiple items ek field mein. Anomalies!`,
   render(){const data=[{oid:1,cust:'Raj',city:'Delhi',items:'Laptop, Mouse'},{oid:2,cust:'Raj',city:'Delhi',items:'Keyboard'},{oid:3,cust:'Priya',city:'Mumbai',items:'Phone, Tablet'}];return`<div class="norm-table"><table><thead><tr><th>order_id</th><th>customer</th><th>city</th><th>items</th></tr></thead><tbody>${data.map(r=>`<tr><td>${r.oid}</td><td>${r.cust}</td><td class="bad">${r.city} ← dup!</td><td class="bad">${r.items} ← multi!</td></tr>`).join('')}</tbody></table></div><div class="info-box err" style="margin-top:6px">Delhi change = 2 rows update karo!</div>`;}},
  {label:'1NF',qL:[],cpp:`<span class="cc">// 1NF: Atomic values only</span>\n<span class="cc">// No arrays, primary key honi</span>`,
   explain:`<b>1NF</b> — har cell mein sirf ek value. "Laptop, Mouse" → do alag rows.`,
   render(){const data=[{oid:1,cust:'Raj',city:'Delhi',item:'Laptop'},{oid:1,cust:'Raj',city:'Delhi',item:'Mouse'},{oid:2,cust:'Raj',city:'Delhi',item:'Keyboard'},{oid:3,cust:'Priya',city:'Mumbai',item:'Phone'},{oid:3,cust:'Priya',city:'Mumbai',item:'Tablet'}];return`<div class="dl">1NF — Atomic values:</div><div class="norm-table"><table><thead><tr><th>order_id</th><th>customer</th><th>city</th><th>item</th></tr></thead><tbody>${data.map(r=>`<tr><td>${r.oid}</td><td>${r.cust}</td><td class="bad">${r.city} ← still dup</td><td class="good">${r.item} ✓</td></tr>`).join('')}</tbody></table></div>`;}},
  {label:'2NF → 3NF',qL:[],cpp:`<span class="cc">// 2NF: No partial dependency</span>\n<span class="cc">// 3NF: No transitive dep</span>`,
   explain:`<b>2NF</b> — partial dependencies hatao (city sirf customer pe depend, order pe nahi). <b>3NF</b> — transitive dependencies hatao (zip → city → state = state alag table mein). Rule: "Key, whole key, nothing but key."`,
   render(){return`<div style="display:flex;flex-direction:column;gap:8px">${[{n:'1NF',r:'Atomic values, no arrays, primary key',c:'te'},{n:'2NF',r:'1NF + no partial dependency on composite key',c:'te'},{n:'3NF',r:'2NF + no transitive dependency',c:'te'},{n:'BCNF',r:'Every determinant is candidate key',c:'bl'},{n:'Denormalization',r:'Performance ke liye intentional rule break',c:'am'}].map(f=>`<div class="rb"><span class="tag ${f.c}" style="min-width:110px;text-align:center">${f.n}</span><span style="font-size:12px;color:var(--text2)">${f.r}</span></div>`).join('')}</div>`;}},
 ]},

{cat:'Design',name:'Views / Stored Procs / Triggers',diff:'m',
 desc:'Database objects jo SQL reusable aur automated banate hain. Views, Procedures, Functions, Triggers.',
 query:[
  {t:`<span class="cm">-- VIEW:</span>`,l:[]},
  {t:`<span class="kw">CREATE VIEW</span> high_earners <span class="kw">AS</span>`,l:[1]},
  {t:`  <span class="kw">SELECT</span> * <span class="kw">FROM</span> emp <span class="kw">WHERE</span> sal><span class="num">80000</span>;`,l:[2]},
  {t:``,l:[]},
  {t:`<span class="cm">-- PROCEDURE:</span>`,l:[]},
  {t:`<span class="kw">CREATE PROCEDURE</span> give_raise(dept,pct)`,l:[5]},
  {t:`<span class="kw">BEGIN</span> <span class="kw">UPDATE</span>...; <span class="kw">COMMIT</span>; <span class="kw">END</span>;`,l:[6]},
 ],
 steps:[
  {label:'VIEW',qL:[1,2],cpp:`<span class="cc">// VIEW = saved SELECT</span>\n<span class="cc">// Virtual table</span>\nauto view = []{\n  return emp.filter(sal>80000);\n};`,
   explain:`<b>VIEW</b> — saved SELECT query. Virtual table. Fresh data har baar. Security ke liye users ko table nahi, view do. Materialized View = actual data store (fast but stale).`,
   render(){const view=EMP.filter(r=>r.sal>80000);return tbl(['name','dept','sal'],view.map(r=>[r.name,r.dept,`<span class="nc">₹${r.sal}</span>`]))+`<div class="info-box info" style="margin-top:6px">SELECT * FROM high_earners — alag filter nahi likhna!</div>`;}},
  {label:'Proc vs Func',qL:[5,6],cpp:`<span class="cc">// Procedure = void function</span>\nvoid giveRaise(dept, pct);\n<span class="cc">// Function = returns value</span>\nint calcBonus(sal);`,
   explain:`<b>Procedure vs Function:</b> Procedure=side effects (UPDATE/INSERT), kuch return nahi. Function=value return karta hai, SELECT mein use. Trigger=event pe auto-fire.`,
   render(){return[{t:'VIEW',d:'Saved SELECT. Virtual table. Read-only usually. Security layer.',c:'bl'},{t:'Stored Procedure',d:'CALL karo. DML operations. Transactions. No return (usually).',c:'te'},{t:'Function (UDF)',d:'SELECT mein use karo. Value return. No side effects ideally.',c:'am'},{t:'Trigger',d:'INSERT/UPDATE/DELETE pe auto-fire. Audit logs, validation.',c:'pu'},{t:'Materialized View',d:'Actual data store. Fast read. Manual/scheduled refresh.',c:'gr'}].map(it=>`<div style="display:flex;gap:8px;padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--card);margin:3px 0"><span class="tag ${it.c}" style="min-width:110px;text-align:center;line-height:1.4">${it.t}</span><span style="font-size:12px;color:var(--text2)">${it.d}</span></div>`).join('');}},
 ]},

{cat:'Design',name:'Keys, Constraints & Relations',diff:'m',

 ],
 steps:[
  {label:'Key Types',qL:[1,2],cpp:`<span class="cc">// PK = unique + not null</span>\n<span class="cc">// auto index banta hai</span>`,
   explain:`<b>Key types:</b> PK = unique identifier, auto index, only one per table. UNIQUE = duplicate nahi lekin NULL allowed (multiple NULL ok in SQL). FOREIGN KEY = reference integrity.`,
   render(){return[{t:'PRIMARY KEY',d:'Unique + NOT NULL. Auto index. Table per 1 hi.',c:'bl'},{t:'UNIQUE',d:'Duplicate nahi. NULL allowed (multiple). Secondary PK.',c:'te'},{t:'FOREIGN KEY',d:'Reference integrity. Parent row exist karna chahiye.',c:'am'},{t:'NOT NULL',d:'NULL allowed nahi. Default = NULL allowed.',c:'pu'},{t:'CHECK',d:'Custom validation: CHECK(sal > 0), CHECK(age >= 18).',c:'gr'},{t:'DEFAULT',d:'Value na do toh yeh lagta hai.',c:'pk'}].map(it=>`<div style="display:flex;gap:8px;padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--card);margin:3px 0"><span class="tag ${it.c}" style="min-width:100px;text-align:center">${it.t}</span><span style="font-size:12px;color:var(--text2)">${it.d}</span></div>`).join('');}},

 ]},

{cat:'Interview Qs',name:'Classic Interview Queries',diff:'h',
 desc:'Most asked SQL queries in interviews. Pattern yaad karo, data change karo. Step by step solve karo.',
 query:[
  {t:`<span class="cm">-- Q: 2nd highest salary?</span>`,l:[]},
  {t:`<span class="kw">SELECT</span> <span class="fn">MAX</span>(sal)`,l:[1]},
  {t:`<span class="kw">FROM</span> emp`,l:[2]},
  {t:`<span class="kw">WHERE</span> sal <span class="op">&lt;</span>`,l:[3]},
  {t:`  (<span class="kw">SELECT</span> <span class="fn">MAX</span>(sal) <span class="kw">FROM</span> emp);`,l:[4]},
 ],
 steps:[
  {label:'2nd Highest',qL:[1,2,3,4],cpp:`<span class="cc">// Method 1: subquery</span>\n<span class="cc">// Inner: MAX = 120000</span>\n<span class="cc">// Outer: MAX where sal < 120000</span>`,
   explain:`<b>2nd highest salary</b> — Inner query MAX nikalta hai (120000). Outer query woh remove karke MAX nikalta. Works but NULL if only 1 distinct value.`,
   render(){const mx=Math.max(...EMP.map(r=>r.sal));const second=Math.max(...EMP.filter(r=>r.sal<mx).map(r=>r.sal));return`<div class="cte-box"><div class="cte-label">Inner MAX = ₹${mx}</div></div><div class="dl">sal < ${mx}:</div>${EMP.filter(r=>r.sal<mx).map(r=>rb('pass',`₹${r.sal} — ${r.name}`)).join('')}<div class="info-box ok" style="margin-top:6px">2nd Highest = ₹${second}</div>`;}},
  {label:'Nth Highest',qL:[1,2,3,4],cpp:`<span class="cc">// Nth: DENSE_RANK approach</span>\n<span class="cc">// or LIMIT 1 OFFSET N-1</span>`,
   explain:`<b>Nth highest — 3 methods:</b> 1. DENSE_RANK() = N. 2. LIMIT 1 OFFSET N-1. 3. Correlated subquery with N-1 distinct values above.`,
   render(){const sorted=[...new Set(EMP.map(r=>r.sal))].sort((a,b)=>b-a);return`<div class="dl">All unique salaries ranked:</div>${sorted.map((s,i)=>rb('hi',`Rank ${i+1}: ₹${s} — ${EMP.filter(r=>r.sal===s).map(r=>r.name).join(', ')}`)).join('')}<div class="info-box info" style="margin-top:6px">LIMIT 1 OFFSET N-1 → Rank N ki salary</div>`;}},
  {label:'Duplicate rows',qL:[],cpp:`<span class="cc">// Find: GROUP BY + HAVING COUNT > 1</span>\n<span class="cc">// Delete: keep MIN(id) per group</span>`,
   explain:`<b>Duplicate find:</b> GROUP BY col HAVING COUNT(*) > 1. <b>Delete:</b> DELETE WHERE id NOT IN (SELECT MIN(id) FROM t GROUP BY dup_cols).`,
   render(){const dupsDemo=[{id:1,name:'Raj',dept:'Eng'},{id:2,name:'Raj',dept:'Eng'},{id:3,name:'Priya',dept:'HR'},{id:4,name:'Priya',dept:'HR'}];return tbl(['id','name','dept','action'],dupsDemo.map((r,i)=>{const keep=i===0||i===2;return[r.id,r.name,r.dept,`<span style="color:${keep?'var(--teal)':'var(--red)'}">` +(keep?'✓ KEEP (MIN id)':'✗ DELETE')+`</span>`];}));}},
  {label:'Patterns',qL:[],cpp:``,
   explain:`<b>Top interview query patterns</b> — template yaad karo.`,
   render(){return[{t:'2nd Highest Salary',q:'MAX(sal) WHERE sal < (SELECT MAX(sal))'},{t:'Nth Highest (clean)',q:'DENSE_RANK() OVER(ORDER BY sal DESC) = N'},{t:'Top N per group',q:'ROW_NUMBER() OVER(PARTITION BY g ORDER BY val) ≤ N'},{t:'Find duplicates',q:'GROUP BY cols HAVING COUNT(*) > 1'},{t:'Delete duplicates',q:'DELETE WHERE id NOT IN (SELECT MIN(id) GROUP BY cols)'},{t:'Running total',q:'SUM(col) OVER(ORDER BY date ROWS UNBOUNDED PRECEDING)'},{t:'Employees no manager',q:'LEFT JOIN + WHERE mgr.id IS NULL'},{t:'Salary > dept avg',q:'AVG(sal) OVER(PARTITION BY dept)'},{t:'Consecutive records',q:'LAG()/LEAD() ya self-join ON id = id+1'},{t:'Pivot table',q:'SUM(CASE WHEN col=val THEN 1 END) per category'},{t:'YoY / MoM growth',q:'(cur - LAG(cur)) / LAG(cur) * 100'},{t:'Customers no orders',q:'LEFT JOIN orders WHERE orders.id IS NULL'}].map((p,i)=>`<div class="q-box"><div class="q-num">Q${i+1}</div><div class="q-text">${p.t}</div><div class="q-ans"><code>${p.q}</code></div></div>`).join('');}},
 ]},

{cat:'Interview Qs',name:'DELETE vs TRUNCATE vs DROP',diff:'m',
 desc:'Interview mein 80% log yeh question poochhte hain. Ek line mein alag karo: DML vs DDL, rollback, triggers.',
 query:[
  {t:`<span class="kw">DELETE FROM</span> t <span class="kw">WHERE</span> ...;  <span class="cm">-- DML</span>`,l:[0]},
  {t:`<span class="kw">TRUNCATE TABLE</span> t;         <span class="cm">-- DDL</span>`,l:[1]},
  {t:`<span class="kw">DROP TABLE</span> t;              <span class="cm">-- DDL</span>`,l:[2]},
 ],
 steps:[
  {label:'Comparison',qL:[0,1,2],cpp:`<span class="cc">// DELETE = row by row (log)</span>\n<span class="cc">// TRUNCATE = bulk delete (fast)</span>\n<span class="cc">// DROP = table structure bhi</span>`,
   explain:`<b>DELETE vs TRUNCATE vs DROP</b> — sabse common interview question.`,
   render(){return tbl(['Feature','DELETE','TRUNCATE','DROP'],[['Type','DML','DDL','DDL'],['Rollback','✓ YES','✗ NO (usually)','✗ NO'],['WHERE clause','✓ YES','✗ NO','✗ NO'],['Triggers fire','✓ YES','✗ NO','N/A'],['Auto-increment reset','✗ NO','✓ YES (usually)','N/A'],['Speed','Slow (logged)','Fast (bulk)','Instant'],['Structure deleted','✗ NO','✗ NO','✓ YES']].map(r=>[`<b>${r[0]}</b>`,r[1].includes('✓')?`<span style="color:var(--teal)">${r[1]}</span>`:r[1].includes('✗')?`<span style="color:var(--red)">${r[1]}</span>`:r[1],r[2].includes('✓')?`<span style="color:var(--teal)">${r[2]}</span>`:r[2].includes('✗')?`<span style="color:var(--red)">${r[2]}</span>`:r[2],r[3].includes('✓')?`<span style="color:var(--teal)">${r[3]}</span>`:r[3].includes('✗')?`<span style="color:var(--red)">${r[3]}</span>`:r[3]]));}},
  {label:'Quick Qs',qL:[],cpp:``,
   explain:`<b>Common variations aur quick answers</b>.`,
   render(){const qs=[{q:'WHERE vs HAVING?',a:'WHERE=row filter (GROUP BY se pehle). HAVING=group filter. WHERE mein aggregate nahi.'},{q:'RANK vs DENSE_RANK?',a:'RANK: gaps with ties (1,2,2,4). DENSE_RANK: no gaps (1,2,2,3). ROW_NUMBER: always unique.'},{q:'IN vs EXISTS performance?',a:'EXISTS: large datasets pe fast (short-circuits). IN: small lists ok. NOT IN: NULL trap!'},{q:'Clustered vs Non-clustered index?',a:'Clustered: actual rows sorted by index (1 per table). Non-clustered: separate pointer structure.'},{q:'NULL = NULL kya hai?',a:'NULL! Koi bhi comparison NULL return karta. IS NULL / IS NOT NULL use karo.'},{q:'VIEW vs Materialized VIEW?',a:'VIEW: fresh data every time, slow. Materialized VIEW: stored, fast, stale (needs refresh).'},{q:'OLTP vs OLAP?',a:'OLTP: transactions, normalized, fast writes. OLAP: analytics, denormalized, fast reads.'}];return qs.map((q,i)=>`<div class="q-box"><div class="q-num">Q${i+1}</div><div class="q-text">${q.q}</div><div class="q-ans">${q.a}</div></div>`).join('');}},
 ]},

{cat:'Interview Qs',name:'SQL vs NoSQL',diff:'m',
 desc:'Kab SQL, kab NoSQL? System design interviews mein yeh bahut aata hai.',
 query:[
  {t:`<span class="cm">-- SQL: structured, relations</span>`,l:[]},
  {t:`<span class="cm">-- NoSQL: flexible, scale</span>`,l:[]},
  {t:`<span class="cm">-- CAP theorem tradeoffs</span>`,l:[]},
 ],
 steps:[
  {label:'SQL (RDBMS)',qL:[],cpp:`<span class="cc">// ACID + Schema + Joins</span>\nmap&lt;key, structured_row&gt;`,
   explain:`<b>SQL databases</b> — structured data, ACID, joins, fixed schema. PostgreSQL, MySQL, SQLite. Kab use: transactions, relations, consistency critical.`,
   render(){return`<div style="display:flex;flex-direction:column;gap:6px">${[['✓ ACID transactions','Bank, e-commerce, ERP','te'],['✓ Complex queries + JOINs','Analytics, reporting','te'],['✓ Data integrity (constraints)','Medical records','te'],['✓ Mature ecosystem','Production-proven','te'],['✗ Horizontal scale hard','Sharding complex','re'],['✗ Fixed schema','Schema changes = migrations','re']].map(([f,ex,c])=>`<div class="rb ${c}">${f}<span style="font-size:11px;margin-left:auto;opacity:.7">${ex}</span></div>`).join('')}</div>`;}},
  {label:'NoSQL Types',qL:[],cpp:`<span class="cc">// Different data models</span>`,
   explain:`<b>4 NoSQL types</b> — har ek alag problem solve karta hai.`,
   render(){return[{t:'Document (MongoDB)',d:'JSON-like docs. Flexible schema. Content, profiles.',c:'bl'},{t:'Key-Value (Redis)',d:'Cache, sessions, counters. Ultra-fast O(1).',c:'te'},{t:'Wide Column (Cassandra)',d:'Time series, logs. Massive scale. AP system.',c:'am'},{t:'Graph (Neo4j)',d:'Relationships, social networks, recommendations.',c:'pu'}].map(it=>`<div class="acid-card" style="background:var(--${it.c==='bl'?'blue':it.c==='te'?'teal':it.c==='am'?'amber':'purple'}-bg);border-color:var(--${it.c==='bl'?'blue':it.c==='te'?'teal':it.c==='am'?'amber':'purple'});margin:3px 0"><div class="acid-prop" style="color:var(--${it.c==='bl'?'blue':it.c==='te'?'teal':it.c==='am'?'amber':'purple'}-dk)">${it.t}</div><div class="acid-def" style="color:var(--${it.c==='bl'?'blue':it.c==='te'?'teal':it.c==='am'?'amber':'purple'}-dk)">${it.d}</div></div>`).join('');}},
  {label:'CAP Theorem',qL:[],cpp:`<span class="cc">// Consistency + Availability</span>\n<span class="cc">// + Partition Tolerance</span>\n<span class="cc">// Pick only 2!</span>`,
   explain:`<b>CAP Theorem</b> — distributed systems mein 3 mein se sirf 2 guarantee kar sakte ho. SQL = CP. Cassandra = AP. Network partitions real life mein hote hain.`,
   render(){return`<div style="display:flex;flex-direction:column;gap:6px">${[{p:'C — Consistency',d:'Sab nodes same data dekhte hain. Read always latest write.',c:'te'},{p:'A — Availability',d:'Har request ko response milega. Kabhi down nahi.',c:'am'},{p:'P — Partition Tolerance',d:'Network split hone pe bhi system kaam karta hai.',c:'bl'}].map(a=>`<div class="acid-card" style="background:${a.c==='te'?'var(--teal-bg)':a.c==='am'?'var(--amber-bg)':'var(--blue-bg)'};border-color:var(--${a.c==='te'?'teal':a.c==='am'?'amber':'blue'})"><div class="acid-prop" style="color:var(--${a.c==='te'?'teal':a.c==='am'?'amber':'blue'}-dk)">${a.p}</div><div class="acid-def" style="color:var(--${a.c==='te'?'teal':a.c==='am'?'amber':'blue'}-dk)">${a.d}</div></div>`).join('')}<div class="info-box info" style="margin-top:6px">SQL (CP): Consistency + Partition Tolerance<br>Cassandra (AP): Availability + Partition Tolerance<br>Traditional RDBMS (CA): Consistency + Availability (no partition)</div>`;}},
 ]},

{cat:'Interview Qs',name:'Query Optimization Tips',diff:'h',
 desc:'Slow queries ko fast karna. Index, query rewriting, avoid full scans — practical tips.',
 query:[
  {t:`<span class="cm">-- SLOW:</span>`,l:[]},
  {t:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> t <span class="kw">WHERE</span> <span class="fn">YEAR</span>(dt)=<span class="num">2024</span>`,l:[1]},
  {t:`<span class="cm">-- FAST:</span>`,l:[]},
  {t:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> t <span class="kw">WHERE</span>`,l:[3]},
  {t:`  dt <span class="kw">BETWEEN</span> <span class="str">'2024-01-01'</span>`,l:[4]},
  {t:`  <span class="kw">AND</span> <span class="str">'2024-12-31'</span>;`,l:[5]},
 ],
 steps:[
  {label:'Index Killers',qL:[1],cpp:`<span class="cc">// Index pe function = SLOW</span>\nYEAR(dt) = 2024  <span class="cc">// no index!</span>\n<span class="cc">// Range instead:</span>\ndt BETWEEN 2024-01-01 AND 2024-12-31`,
   explain:`<b>Index killers</b> — column pe function use karna index invalidate karta hai. YEAR(dt)=2024 = full scan. dt BETWEEN range = index use.`,
   render(){return[['YEAR(date_col) = 2024','Index bypass! Full scan','err'],['UPPER(name) = "RAJ"','Index bypass!','err'],['sal * 1.1 > 100000','Function on column','err'],['sal > 90909','Rewrite — index use','ok'],['date_col BETWEEN d1 AND d2','Range query — fast','ok'],['name LIKE "Raj%"','Prefix match — index ok','ok'],["name LIKE '%aj%'",'Contains — NO index (% left)','warn']].map(([q,d,c])=>`<div class="info-box ${c}" style="margin-bottom:3px"><span style="font-family:var(--mono);font-size:11px">${q}</span><br><span style="font-size:11px">${d}</span></div>`).join('');}},
  {label:'SELECT *',qL:[3,4,5],cpp:`<span class="cc">// SELECT * = sab columns fetch</span>\n<span class="cc">// Covering index bypass</span>\n<span class="cc">// SELECT only needed cols</span>`,
   explain:`<b>SELECT * avoid karo production mein</b> — zyada data transfer, covering index nahi use hota, schema change pe breakage. Sirf needed columns select karo.`,
   render(){return`<div style="display:flex;flex-direction:column;gap:6px">${[{t:'❌ SELECT *',d:'Sab columns fetch. Covering index bypass. Schema fragile.',c:'err'},{t:'✓ SELECT name, sal',d:'Only needed. Covering index possible. Less network.',c:'ok'},{t:'❌ SELECT DISTINCT *',d:'Full scan + sort. Avoid on large tables.',c:'warn'},{t:'✓ Specific columns',d:'Query planner ko help karo.',c:'ok'}].map(it=>`<div class="info-box ${it.c}"><b>${it.t}</b> — ${it.d}</div>`).join('')}</div>`;}},
  {label:'Tips Checklist',qL:[],cpp:``,
   explain:`<b>Query optimization checklist</b> — slow query mile toh yeh dekho.`,
   render(){return[['Add index on WHERE/JOIN/ORDER BY cols','Most impactful fix','te'],['Use covering index for hot queries','Fastest — no table lookup','te'],['Avoid functions on indexed cols','Index killer!','re'],['SELECT specific cols (not *)','Less I/O, covering index','am'],['Use LIMIT for sampling/testing','Avoid full scans','am'],['Use EXISTS instead of COUNT > 0','Short-circuits faster','te'],['Check EXPLAIN ANALYZE output','Find Seq Scans','bl'],['Partition large tables by date','Time-series performance','bl'],['VACUUM/ANALYZE for stale stats','Query planner accuracy','gr'],['Avoid OFFSET for pagination','Use keyset instead','re']].map(([t,d,c])=>`<div class="rb ${c}" style="flex-direction:column;align-items:flex-start;margin-bottom:2px"><div style="font-weight:600;font-size:12px">${t}</div><div style="font-size:11px;opacity:.75">${d}</div></div>`).join('');}},
 ]}

,{cat:'Stored & Triggers',name:'Stored Procedures',diff:'m',
 desc:'Stored procedures = database mein store SQL code. Reusable, secure, compiled once. IN/OUT parameters, IF/WHILE logic sab available.',
 query:[
  {t:`<span class="kw">CREATE PROCEDURE</span> give_raise(`,l:[0]},
  {t:`  IN  dept_name <span class="kw">VARCHAR</span>,`,l:[1]},
  {t:`  IN  pct       <span class="kw">DECIMAL</span>,`,l:[2]},
  {t:`  OUT affected  <span class="kw">INT</span>`,l:[3]},
  {t:`)`,l:[4]},
  {t:`<span class="kw">BEGIN</span>`,l:[5]},
  {t:`  <span class="kw">UPDATE</span> employees`,l:[6]},
  {t:`  <span class="kw">SET</span> sal = sal * (<span class="num">1</span> + pct/<span class="num">100</span>)`,l:[7]},
  {t:`  <span class="kw">WHERE</span> dept = dept_name;`,l:[8]},
  {t:`  <span class="kw">SET</span> affected = ROW_COUNT();`,l:[9]},
  {t:`<span class="kw">END</span>;`,l:[10]},
 ],
 steps:[
  {label:'Parameters',qL:[1,2,3],
   cpp:`// IN = read-only input\n// OUT = output (like ref param)\n// INOUT = read + write\nvoid give_raise(string dept,\n  double pct, int& affected);`,
   explain:`<b>IN/OUT/INOUT:</b> IN = readonly input. OUT = output value (caller gets it). INOUT = both. C++ mein IN = const ref, OUT = reference. CALL give_raise('Eng', 10, @count);`,
   render(){
     var rows = [['IN','Read-only input. Caller value pass karta hai.','IN dept VARCHAR'],['OUT','Output. Procedure set karta hai.','OUT affected INT'],['INOUT','Input + output both.','INOUT counter INT']];
     return tbl(['Mode','Meaning','Example'],rows.map(function(r){return[('<span class="tag bl">'+r[0]+'</span>'),r[1],('<span style="font-family:var(--mono);color:var(--teal);font-size:11px">'+r[2]+'</span>')]}));
   }},
  {label:'Body logic',qL:[5,6,7,8,9,10],
   cpp:`// SQL procedure body:\nDECLARE v_count INT;\nIF condition THEN\n  UPDATE...;\nELSEIF ... THEN ...\nELSE ...\nEND IF;`,
   explain:`<b>Procedure body</b> — DECLARE variables, IF/ELSEIF/ELSE/END IF, WHILE/LOOP/REPEAT available. ROW_COUNT() = rows affected by last DML. C++ functions jaisa lekin SQL syntax.`,
   render(){
     var h = '<div class="cte-box"><div class="cte-label">Procedure Control Flow</div>';
     h += '<div style="font-family:var(--mono);font-size:12px;color:var(--text);line-height:1.9">';
     h += '<span style="color:var(--blue)">DECLARE</span> v INT DEFAULT 0;<br>';
     h += '<span style="color:var(--blue)">IF</span> v > 0 <span style="color:var(--blue)">THEN</span><br>';
     h += '&nbsp;&nbsp;<span style="color:var(--blue)">UPDATE</span>...; <span style="color:var(--blue)">COMMIT</span>;<br>';
     h += '<span style="color:var(--blue)">ELSEIF</span> v < 0 <span style="color:var(--blue)">THEN</span> ...<br>';
     h += '<span style="color:var(--blue)">ELSE SET</span> status = <span style="color:var(--coral)">\'FAILED\'</span>;<br>';
     h += '<span style="color:var(--blue)">END IF</span>;</div></div>';
     return h;
   }},
  {label:'Proc vs Func',qL:[0,10],
   cpp:`// Procedure = void + side effects\nvoid proc();\n// Function = returns value\nint udf();`,
   explain:`<b>Procedure vs Function:</b> Procedure = side effects (UPDATE/INSERT), kuch return nahi. Function = value return karta hai, SELECT mein use kar sakte. Trigger = event pe auto-fire.`,
   render(){
     return tbl(['Feature','Procedure','Function (UDF)'],[
       ['Returns','Nothing / OUT params','Single value'],
       ['In SELECT','Cannot','Can use'],
       ['DML inside','Yes (UPDATE etc)','Usually not'],
       ['COMMIT/ROLLBACK','Yes','No'],
       ['Call syntax','CALL proc(...)','SELECT func(...)']
     ].map(function(r){return['<b>'+r[0]+'</b>',r[1],r[2]]}));
   }},
 ]},

{cat:'Stored & Triggers',name:'Triggers',diff:'m',
 desc:'Trigger = INSERT/UPDATE/DELETE pe automatically chalti hai. BEFORE/AFTER. OLD/NEW pseudorecords. Audit logs, validation.',
 query:[
  {t:`<span class="kw">CREATE TRIGGER</span> salary_audit`,l:[0]},
  {t:`<span class="kw">AFTER UPDATE ON</span> employees`,l:[1]},
  {t:`<span class="kw">FOR EACH ROW</span>`,l:[2]},
  {t:`<span class="kw">BEGIN</span>`,l:[3]},
  {t:`  <span class="kw">INSERT INTO</span> audit_log`,l:[4]},
  {t:`  <span class="kw">VALUES</span>(OLD.sal, NEW.sal, NOW());`,l:[5]},
  {t:`<span class="kw">END</span>;`,l:[6]},
 ],
 steps:[
  {label:'BEFORE vs AFTER',qL:[0,1,2],
   cpp:`// BEFORE: validate/modify NEW\n// AFTER: audit, side effects`,
   explain:`<b>BEFORE trigger</b> = data change se pehle. Validation, NEW values modify karo. <b>AFTER trigger</b> = baad mein. Audit logs, notifications ke liye.`,
   render(){
     var items = [
       ['BEFORE INSERT','Validate, set defaults, modify NEW','bl'],
       ['BEFORE UPDATE','Check business rules, prevent bad updates','bl'],
       ['AFTER INSERT','Audit log, notification, cascade','te'],
       ['AFTER UPDATE','Log OLD+NEW values, sync tables','te'],
       ['AFTER DELETE','Archive, soft delete, cascade','am']
     ];
     var h = '';
     items.forEach(function(t){
       h += '<div class="rb '+t[2]+'" style="flex-direction:column;align-items:flex-start;margin-bottom:3px">';
       h += '<div style="font-weight:600;font-size:12px">'+t[0]+'</div>';
       h += '<div style="font-size:11px;opacity:.8">'+t[1]+'</div></div>';
     });
     return h;
   }},
  {label:'OLD / NEW',qL:[4,5],
   cpp:`// OLD = values before change\n// NEW = values after change\nOLD.sal; // before\nNEW.sal; // after`,
   explain:`<b>OLD aur NEW</b> — trigger ke andar pseudorecords. OLD = pehle ki values (UPDATE/DELETE). NEW = nayi values (INSERT/UPDATE). BEFORE mein NEW modify bhi kar sakte.`,
   render(){
     var before = {name:'Raj',sal:85000,dept:'Eng'};
     var after = {name:'Raj',sal:90000,dept:'Eng'};
     var h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
     h += '<div class="cte-box"><div class="cte-label">OLD (before UPDATE)</div>';
     Object.keys(before).forEach(function(k){h += '<div class="rb fail">'+k+': '+before[k]+'</div>';});
     h += '</div><div class="cte-box"><div class="cte-label">NEW (after UPDATE)</div>';
     Object.keys(after).forEach(function(k){h += '<div class="rb pass">'+k+': '+after[k]+(k==='sal'?' ← changed':'')+'</div>';});
     h += '</div></div>';
     h += '<div class="info-box info" style="margin-top:6px">Audit: OLD.sal=85000, NEW.sal=90000, diff=+5000</div>';
     return h;
   }},
 ]},

{cat:'Window Advanced',name:'NTILE / PERCENT_RANK / CUME_DIST',diff:'h',
 desc:'Percentile aur distribution functions. Marketing segmentation, statistical analysis ke liye.',
 query:[
  {t:`<span class="kw">SELECT</span> name, sal,`,l:[0]},
  {t:`  <span class="fn">NTILE</span>(<span class="num">4</span>)        <span class="kw">OVER</span>(w) <span class="kw">AS</span> quartile,`,l:[1]},
  {t:`  <span class="fn">PERCENT_RANK</span>() <span class="kw">OVER</span>(w) <span class="kw">AS</span> pct_rank,`,l:[2]},
  {t:`  <span class="fn">CUME_DIST</span>()    <span class="kw">OVER</span>(w) <span class="kw">AS</span> cume`,l:[3]},
  {t:`<span class="kw">FROM</span> employees`,l:[4]},
  {t:`<span class="kw">WINDOW</span> w <span class="kw">AS</span> (<span class="kw">ORDER BY</span> sal);`,l:[5]},
 ],
 steps:[
  {label:'NTILE',qL:[1],
   cpp:`// NTILE(4) = quartiles\nint q = floor(i*4/total)+1;`,
   explain:`<b>NTILE(N)</b> — rows ko N equal buckets. NTILE(4)=quartiles, NTILE(10)=deciles. Customer segmentation ke liye perfect.`,
   render(){
     var sorted = EMP.slice().sort(function(a,b){return a.sal-b.sal;});
     var n=4, total=sorted.length;
     var clss = ['re','am','bl','te'];
     var segs = ['Bottom','Lower-Mid','Upper-Mid','Top'];
     return tbl(['name','sal','NTILE(4)','segment'],sorted.map(function(r,i){
       var q = Math.floor(i*n/total)+1;
       return [r.name,'₹'+r.sal,'<span class="tag '+clss[q-1]+'">Q'+q+'</span>',segs[q-1]+' 25%'];
     }));
   }},
  {label:'PERCENT_RANK',qL:[2],
   cpp:`// (rank-1)/(total-1)\n// Range: 0.0 to 1.0`,
   explain:`<b>PERCENT_RANK()</b> = (rank-1)/(n-1). 0.0=lowest, 1.0=highest. "Tum kitne percent se zyada kamate ho."`,
   render(){
     var sorted = EMP.slice().sort(function(a,b){return a.sal-b.sal;});
     var n = sorted.length;
     return tbl(['name','sal','PERCENT_RANK'],sorted.map(function(r,i){
       var pct = n>1 ? (i/(n-1)*100).toFixed(0) : 100;
       return [r.name,'₹'+r.sal,'<span class="nc">'+pct+'%</span>'];
     }));
   }},
  {label:'CUME_DIST',qL:[3],
   cpp:`// rows_up_to / total\n// Range: 1/N to 1.0\n// Never 0!`,
   explain:`<b>CUME_DIST()</b> = fraction of rows ≤ current. Never 0 (minimum 1/N). PERCENT_RANK starts at 0, CUME_DIST starts at 1/N.`,
   render(){
     var sorted = EMP.slice().sort(function(a,b){return a.sal-b.sal;});
     var n = sorted.length;
     return tbl(['name','sal','PERCENT_RANK','CUME_DIST'],sorted.map(function(r,i){
       var pr = n>1 ? (i/(n-1)).toFixed(2) : '1.00';
       var cd = ((i+1)/n).toFixed(2);
       return [r.name,'₹'+r.sal,pr,'<span class="nc">'+cd+'</span>'];
     }));
   }},
 ]},

{cat:'SQL Patterns',name:'Pivot Table',diff:'h',

{cat:'SQL Patterns',name:'Gap & Island Problems',diff:'h',
 desc:'Consecutive sequences mein gaps dhundho ya consecutive islands nikalo. Data quality, attendance tracking.',
 query:[
  {t:`<span class="cm">-- Gaps in IDs:</span>`,l:[]},
  {t:`<span class="kw">SELECT</span> id+<span class="num">1</span> gap_start,`,l:[1]},
  {t:`  next_id-<span class="num">1</span> gap_end`,l:[2]},
  {t:`<span class="kw">FROM</span> (`,l:[3]},
  {t:`  <span class="kw">SELECT</span> id,`,l:[4]},
  {t:`    <span class="fn">LEAD</span>(id) <span class="kw">OVER</span>(<span class="kw">ORDER BY</span> id) next_id`,l:[5]},
  {t:`  <span class="kw">FROM</span> emp) t`,l:[6]},
  {t:`<span class="kw">WHERE</span> next_id - id > <span class="num">1</span>;`,l:[7]},
 ],
 steps:[
  {label:'Gap Problem',qL:[1,2,3,4,5,6,7],
   cpp:`// IDs: 1,2,3,5,6,8\n// Gaps: 4,7 missing`,
   explain:`<b>LEAD trick</b> — LEAD(id) = next row ka ID. next - current > 1 mein gap hai. current+1 se next-1 tak missing.`,
   render(){
     var ids = [1,2,3,5,6,8,10];
     var h = '<div class="dl">IDs with gaps:</div>';
     ids.forEach(function(id,i){
       var next = ids[i+1];
       var gap = next && next-id>1;
       h += '<div class="rb '+(gap?'re':'hi')+'">ID: '+id+(gap?' → GAP! '+(id+1)+' to '+(next-1)+' missing':'')+'</div>';
     });
     return h;
   }},
  {label:'Island Pattern',qL:[],
   cpp:`// Island = consecutive group\n// date - row_number = constant\n// for consecutive rows`,
   explain:`<b>Island trick</b> — consecutive rows ke liye date - ROW_NUMBER() = same constant. Non-consecutive pe yeh change hota hai. Island ki "group key" yahi hai!`,
   render(){
     var data = [{id:1,val:1},{id:2,val:1},{id:3,val:1},{id:4,val:0},{id:5,val:1},{id:6,val:1}];
     return tbl(['id','val','row_num','id - rn (island key)'], data.map(function(r,i){
       var rn = i+1;
       var key = r.val ? (r.id - rn) : null;
       return [r.id, r.val, rn, key!==null ? '<span class="nc">'+key+'</span>' : '<span class="null-val">—</span>'];
     })) + '<div class="info-box info" style="margin-top:6px">Same key = same island! GROUP BY that key to get island ranges.</div>';
   }},
 ]},

{cat:'SQL Patterns',name:'Slowly Changing Dimensions',diff:'h',
 desc:'Historical data track karna. SCD Type 1 (overwrite), Type 2 (new row), Type 3 (extra column). Data warehouse essential.',
 query:[
  {t:`<span class="cm">-- SCD Type 2: Full history</span>`,l:[]},
  {t:`<span class="kw">CREATE TABLE</span> emp_history (`,l:[1]},
  {t:`  id         <span class="kw">INT</span>,`,l:[2]},
  {t:`  dept       <span class="kw">VARCHAR</span>,`,l:[3]},
  {t:`  valid_from <span class="kw">DATE</span>,`,l:[4]},
  {t:`  valid_to   <span class="kw">DATE</span>,   <span class="cm">-- NULL=current</span>`,l:[5]},
  {t:`  is_current <span class="kw">BOOLEAN</span>`,l:[6]},
  {t:`);`,l:[7]},
 ],
 steps:[
  {label:'SCD Types',qL:[],
   cpp:`// Type 1: Overwrite (no history)\n// Type 2: New row (full history)\n// Type 3: Extra column (1 prev)`,
   explain:`<b>3 SCD types</b> — Type 1 = simple overwrite (history lost). Type 2 = most common, full history with date ranges. Type 3 = only 1 previous value stored.`,
   render(){
     var items = [
       ['Type 1 — Overwrite','Purani value replace. No history. Simple.','UPDATE emp SET dept=...','am'],
       ['Type 2 — New Row','Nayi row + date range. Full history. Most used.','INSERT new, UPDATE old valid_to','te'],
       ['Type 3 — Extra Col','Ek column prev value ke liye. Sirf 1 history.','ALTER TABLE ADD prev_dept','bl']
     ];
     var h = '';
     items.forEach(function(t){
       h += '<div class="acid-card" style="background:var(--'+{'am':'amber','te':'teal','bl':'blue'}[t[3]]+'-bg);border-color:var(--'+{'am':'amber','te':'teal','bl':'blue'}[t[3]]+');margin:3px 0">';
       h += '<div class="acid-prop" style="color:var(--'+{'am':'amber','te':'teal','bl':'blue'}[t[3]]+'-dk)">'+t[0]+'</div>';
       h += '<div class="acid-def" style="color:var(--'+{'am':'amber','te':'teal','bl':'blue'}[t[3]]+'-dk)">'+t[1]+'<br><span style="font-family:var(--mono);font-size:11px">'+t[2]+'</span></div></div>';
     });
     return h;
   }},
  {label:'Type 2 History',qL:[1,2,3,4,5,6,7],
   cpp:`// On dept change:\n// 1. UPDATE old: valid_to=today\n// 2. INSERT new: valid_from=today`,
   explain:`<b>SCD Type 2</b> — valid_from, valid_to date range. is_current flag. Current = valid_to IS NULL ya is_current=TRUE. Point-in-time query = WHERE date BETWEEN valid_from AND COALESCE(valid_to,'9999-12-31').`,
   render(){
     var history = [
       {id:1,dept:'Eng',from:'2020-01-01',to:'2022-06-30',cur:false},
       {id:1,dept:'Sales',from:'2022-07-01',to:'2023-12-31',cur:false},
       {id:1,dept:'Eng',from:'2024-01-01',to:null,cur:true}
     ];
     return tbl(['id','dept','valid_from','valid_to','is_current'], history.map(function(r){
       return [r.id, r.dept, r.from,
         r.to ? r.to : '<span class="null-val">NULL</span>',
         r.cur ? '<span class="tag te">✓ YES</span>' : '<span class="tag gr">No</span>'];
     }), history.map(function(r){return r.cur?'pass':'hi'}));
   }},
 ]},

{cat:'Real Problems',name:'Consecutive Login Streak',diff:'h',
 desc:'Max consecutive login days per user. Amazon, Google, Flipkart interviews mein classic question. Island problem variant.',
 query:[
  {t:`<span class="kw">WITH</span> numbered <span class="kw">AS</span> (`,l:[0]},
  {t:`  <span class="kw">SELECT</span> user_id, login_date,`,l:[1]},
  {t:`    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span>(`,l:[2]},
  {t:`      <span class="kw">PARTITION BY</span> user_id`,l:[3]},
  {t:`      <span class="kw">ORDER BY</span> login_date) rn`,l:[4]},
  {t:`  <span class="kw">FROM</span> logins),`,l:[5]},
  {t:`grp <span class="kw">AS</span> (`,l:[6]},
  {t:`  <span class="kw">SELECT</span> user_id,`,l:[7]},
  {t:`    login_date - rn <span class="kw">AS</span> grp_key`,l:[8]},
  {t:`  <span class="kw">FROM</span> numbered)`,l:[9]},
  {t:`<span class="kw">SELECT</span> user_id, <span class="fn">MAX</span>(<span class="fn">COUNT</span>(*))`,l:[10]},
  {t:`<span class="kw">FROM</span> grp <span class="kw">GROUP BY</span> user_id, grp_key;`,l:[11]},
 ],
 steps:[
  {label:'ROW_NUMBER trick',qL:[1,2,3,4,5],
   cpp:`// Key insight:\n// consecutive dates:\n// date - row_num = SAME\n// Jan1-1=0, Jan2-2=0\n// Jan5-4=1, Jan6-5=1`,
   explain:`<b>Key insight</b> — consecutive dates pe date - row_number = same constant. Gap hone pe constant change hota hai. Yahi island group key hai!`,
   render(){
     var rows = [{d:1,rn:1,key:0},{d:2,rn:2,key:0},{d:3,rn:3,key:0},{d:5,rn:4,key:1},{d:6,rn:5,key:1}];
     return tbl(['login_day','row_num','day - rn = group_key'], rows.map(function(r){
       return ['Jan '+r.d, r.rn, r.d+' - '+r.rn+' = <span class="'+(r.key===0?'nc':'')+'" style="font-weight:600">'+r.key+'</span>'];
     })) + '<div class="info-box ok" style="margin-top:6px">Same group_key = consecutive streak! COUNT per group = streak length</div>';
   }},
  {label:'Final result',qL:[6,7,8,9,10,11],
   cpp:`// GROUP BY user + grp_key\n// COUNT = streak length\n// MAX = longest streak`,
   explain:`<b>Final step</b> — GROUP BY user_id + grp_key. COUNT(*)=streak length. MAX of that = max streak. Clean 2-CTE solution.`,
   render(){
     return tbl(['user_id','streak_group','streak_len','is_max'],[
       ['Raj','Jan 1-3 (key=0)','3','<span class="tag te">MAX ✓</span>'],
       ['Raj','Jan 5-6 (key=1)','2','No'],
       ['Priya','Jan 1-2 (key=0)','2','No'],
       ['Priya','Jan 4-6 (key=1)','3','<span class="tag te">MAX ✓</span>']
     ]) + '<div class="info-box info" style="margin-top:6px">Raj max=3, Priya max=3</div>';
   }},
 ]},

{cat:'Real Problems',name:'MoM / YoY Growth Rate',diff:'h',
 desc:'Month-over-month ya Year-over-year growth. Time series analysis — data analyst interviews mein zaroori.',
 query:[
  {t:`<span class="kw">SELECT</span> month, revenue,`,l:[0]},
  {t:`  <span class="fn">LAG</span>(revenue) <span class="kw">OVER</span>`,l:[1]},
  {t:`    (<span class="kw">ORDER BY</span> month) prev_rev,`,l:[2]},
  {t:`  (revenue - <span class="fn">LAG</span>(revenue)`,l:[3]},
  {t:`    <span class="kw">OVER</span>(<span class="kw">ORDER BY</span> month))`,l:[4]},
  {t:`  * <span class="num">100.0</span> / <span class="fn">NULLIF</span>(<span class="fn">LAG</span>(revenue)`,l:[5]},
  {t:`    <span class="kw">OVER</span>(<span class="kw">ORDER BY</span> month), <span class="num">0</span>)`,l:[6]},
  {t:`  <span class="kw">AS</span> mom_pct`,l:[7]},
  {t:`<span class="kw">FROM</span> monthly_revenue;`,l:[8]},
 ],
 steps:[
  {label:'LAG for prev',qL:[1,2],
   cpp:`// LAG = previous row\nLAG(revenue) OVER(ORDER BY month)`,
   explain:`<b>LAG(revenue)</b> = pichle month ki revenue. First month = NULL. NULLIF(LAG(...),0) = division by zero se bachao.`,
   render(){
     var data = [{m:'Jan',rev:100000},{m:'Feb',rev:120000},{m:'Mar',rev:115000},{m:'Apr',rev:140000},{m:'May',rev:135000},{m:'Jun',rev:160000}];
     return tbl(['month','revenue','LAG (prev)'],data.map(function(d,i){
       return [d.m, fmt(d.rev), i===0?'<span class="null-val">NULL</span>':fmt(data[i-1].rev)];
     }));
   }},
  {label:'Growth %',qL:[3,4,5,6,7],
   cpp:`// MoM% = (cur-prev)/prev*100\ngrowth = (cur-prev)/prev*100.0`,
   explain:`<b>MoM Growth %</b> = (current - previous) / previous × 100. NULLIF(prev,0) se division by zero safe. Negative = decline.`,
   render(){
     var data = [{m:'Jan',rev:100000},{m:'Feb',rev:120000},{m:'Mar',rev:115000},{m:'Apr',rev:140000},{m:'May',rev:135000},{m:'Jun',rev:160000}];
     return tbl(['month','revenue','prev','MoM %'],data.map(function(d,i){
       var prev = i>0?data[i-1].rev:null;
       var g = prev ? ((d.rev-prev)/prev*100).toFixed(1) : null;
       return [d.m, fmt(d.rev),
         prev?fmt(prev):'<span class="null-val">NULL</span>',
         g===null?'—':'<span style="color:'+(g>0?'var(--teal)':'var(--red)')+'font-weight:600">'+(g>0?'+':'')+g+'%</span>'
       ];
     }));
   }},
 ]},

{cat:'Real Problems',name:'Top N per Group',diff:'m',
 desc:'Har department mein top 2 highest paid employees. ROW_NUMBER pattern — most asked interview query.',
 query:[
  {t:`<span class="kw">WITH</span> ranked <span class="kw">AS</span> (`,l:[0]},
  {t:`  <span class="kw">SELECT</span> name, dept, sal,`,l:[1]},
  {t:`    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span>(`,l:[2]},
  {t:`      <span class="kw">PARTITION BY</span> dept`,l:[3]},
  {t:`      <span class="kw">ORDER BY</span> sal <span class="kw">DESC</span>`,l:[4]},
  {t:`    ) <span class="kw">AS</span> rn`,l:[5]},
  {t:`  <span class="kw">FROM</span> employees`,l:[6]},
  {t:`)`,l:[7]},
  {t:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> ranked`,l:[8]},
  {t:`<span class="kw">WHERE</span> rn <= <span class="num">2</span>;`,l:[9]},
 ],
 steps:[
  {label:'ROW_NUMBER',qL:[2,3,4,5],
   cpp:`// PARTITION BY dept ORDER BY sal DESC\n// rn=1 = top earner per dept`,
   explain:`<b>ROW_NUMBER() OVER(PARTITION BY dept ORDER BY sal DESC)</b> — har dept ke andar rank. rn=1 = highest paid, rn=2 = second highest.`,
   render(){
     var g = {};
     EMP.forEach(function(r){if(!g[r.dept])g[r.dept]=[];g[r.dept].push(Object.assign({},r));});
     Object.values(g).forEach(function(arr){arr.sort(function(a,b){return b.sal-a.sal;});arr.forEach(function(r,i){r.rn=i+1;});});
     var all = Object.values(g).reduce(function(a,b){return a.concat(b)},[]);
     return tbl(['name','dept','sal','rn'],all.map(function(r){
       return [r.name,r.dept,'₹'+r.sal,'<span class="'+(r.rn<=2?'nc':'')+'">#'+r.rn+'</span>'];
     }));
   }},
  {label:'WHERE rn <= 2',qL:[8,9],
   cpp:`// Filter: only rn <= 2\n// = top 2 per dept`,
   explain:`<b>WHERE rn <= 2</b> — sirf top 2 per department. Change to rn <= N for top-N. Yeh pattern interview mein bar bar aata hai!`,
   render(){
     var g = {};
     EMP.forEach(function(r){if(!g[r.dept])g[r.dept]=[];g[r.dept].push(Object.assign({},r));});
     var result = [];
     Object.entries(g).forEach(function(entry){
       var dept=entry[0], rows=entry[1];
       rows.sort(function(a,b){return b.sal-a.sal;});
       rows.slice(0,2).forEach(function(r,i){result.push(Object.assign({},r,{rn:i+1}));});
     });
     return tbl(['dept','name','sal','rn'],result.map(function(r){
       return [r.dept,r.name,'₹'+r.sal,'<span class="nc">#'+r.rn+'</span>'];
     })) + '<div class="info-box ok" style="margin-top:6px">Change rn &lt;= 2 to any N for top-N per group!</div>';
   }},
 ]},

{cat:'Real Problems',name:'SQL Query Optimization',diff:'h',
 desc:'Slow queries fast karna. Index killers, SELECT *, rewriting tips — practical production knowledge.',
 query:[
  {t:`<span class="cm">-- SLOW (index bypass):</span>`,l:[]},
  {t:`<span class="kw">WHERE</span> <span class="fn">YEAR</span>(dt) = <span class="num">2024</span>`,l:[1]},
  {t:`<span class="cm">-- FAST (range query):</span>`,l:[]},
  {t:`<span class="kw">WHERE</span> dt <span class="kw">BETWEEN</span>`,l:[3]},

 ],
 steps:[
  {label:'Index Killers',qL:[1],
   cpp:`// Function on column = no index!\nYEAR(dt) = 2024  // full scan\n// Fix: range query instead`,
   explain:`<b>Index killers</b> — column pe function use karna index invalidate karta hai. YEAR(dt) = full scan. dt BETWEEN range = index use.`,
   render(){
     var items = [
       ['YEAR(date_col) = 2024','Full scan! Index bypass','err'],
       ['UPPER(name) = "RAJ"','Full scan! Index bypass','err'],
       ['sal * 1.1 > 100000','Function on column','warn'],
       ['dt BETWEEN d1 AND d2','Range — index ok!','ok'],
       ['name LIKE "Raj%"','Prefix — index ok','ok'],
       ["name LIKE '%aj%'",'Contains — NO index (% left)','warn'],
       ['sal > 90909','Rewrite of sal*1.1>100k','ok']
     ];
     var h = '';
     items.forEach(function(it){
       h += '<div class="info-box '+it[2]+'" style="margin-bottom:3px">';
       h += '<span style="font-family:var(--mono);font-size:11px">'+it[0]+'</span><br>';
       h += '<span style="font-size:11px">'+it[1]+'</span></div>';
     });
     return h;
   }},
  {label:'Checklist',qL:[3,4],
   cpp:`// Optimization checklist`,
   explain:`<b>Query optimization checklist</b> — slow query mile toh yeh sab dekho.`,
   render(){
     var items = [
       ['Add index on WHERE/JOIN/ORDER BY cols','Most impactful fix','te'],
       ['Use covering index for hot queries','No table lookup needed','te'],
       ['Avoid functions on indexed columns','Index killer!','re'],
       ['SELECT specific cols (not *)','Less I/O, covering index','am'],
       ['Use EXISTS not COUNT(*) > 0','Short-circuits faster','te'],
       ['Check EXPLAIN ANALYZE output','Find Seq Scans','bl'],
       ['Avoid OFFSET for pagination','Use keyset instead','re'],
       ['Partition large tables by date','Time-series speed','bl']
     ];
     var h = '';
     items.forEach(function(it){

// ─── STATE ────────────────────────────────────────────────────────────────────
let curC=0, curS=0, filtered=concepts.map((_,i)=>i);

// ─── CATEGORIES ───────────────────────────────────────────────────────────────
const cats=[...new Set(concepts.map(c=>c.cat))];
const catColors={'Foundations':'var(--blue)','JOINs':'var(--teal)','Advanced':'var(--amber)','Performance':'var(--purple)','Design':'var(--coral)','Interview Qs':'var(--pink)','Stored & Triggers':'var(--green)','Window Advanced':'var(--purple)','SQL Patterns':'var(--coral)','Real Problems':'var(--red)'};
const diffLabel={e:'Easy',m:'Med',h:'Hard'};

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSidebar(filterText=''){
  const nav=document.getElementById('navContent');
  nav.innerHTML='';
  filtered=[];
  const fl=filterText.toLowerCase();
  cats.forEach(cat=>{
    const inCat=concepts.map((c,i)=>({c,i})).filter(({c,i})=>c.cat===cat&&(c.name.toLowerCase().includes(fl)||c.desc.toLowerCase().includes(fl)||cat.toLowerCase().includes(fl)||fl===''));
    if(!inCat.length)return;
    const div=document.createElement('div');
    div.innerHTML=`<div class="cat-label" style="color:${catColors[cat]||'var(--text3)'}">${cat}</div>`;
    inCat.forEach(({c,i})=>{
      filtered.push(i);
      const item=document.createElement('div');
      item.className='nav-item'+(i===curC?' active':'');
      item.innerHTML=`<span class="nav-dot" style="background:${catColors[cat]||'var(--blue)'}"></span><span style="flex:1">${c.name}</span><span class="diff-badge diff-${c.diff}">${diffLabel[c.diff]}</span>`;
      item.onclick=()=>{curC=i;curS=0;render();document.querySelector('.sidebar').classList.remove('open');};
      div.appendChild(item);
    });
    nav.appendChild(div);
  });
  document.getElementById('navCount').textContent=`${filtered.length} concepts`;
}

function filterConcepts(val){buildSidebar(val);}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const con=concepts[curC];
  const step=con.steps[curS];
  const activeL=new Set(step.qL);

  document.getElementById('ctitle').textContent=con.name;
  document.getElementById('mobileTitle').textContent=con.name;

  const tag=document.getElementById('ctag');
  tag.textContent={e:'Easy',m:'Medium',h:'Hard'}[con.diff];
  const tagStyles={e:'background:var(--teal-bg);color:var(--teal)',m:'background:var(--amber-bg);color:var(--amber)',h:'background:var(--red-bg);color:var(--red)'};
  tag.style.cssText=tagStyles[con.diff];

  document.getElementById('cdesc').textContent=con.desc;

  // Progress
  const pr=document.getElementById('progressRow');
  pr.innerHTML=con.steps.map((_,i)=>`<div class="progress-seg ${i<curS?'done':i===curS?'cur':''}"></div>`).join('');

  // SQL
  document.getElementById('sqlCode').innerHTML=con.query.map((q,i)=>{
    if(!q.t)return`<div style="height:4px"></div>`;
    return`<div class="cl ${activeL.has(i)?'lit':''}">${q.t}</div>`;
  }).join('');

  // CPP
  document.getElementById('cppHint').innerHTML=step.cpp;

  // Steps
  document.getElementById('stepBar').innerHTML=con.steps.map((s,i)=>
    `<button class="sp ${i===curS?'active':''}" onclick="goStep(${i})">${i+1}. ${s.label}</button>`
  ).join('');

  // Viz
  const viz=document.getElementById('vizArea');
  viz.innerHTML=step.render();
  viz.classList.remove('anim');void viz.offsetWidth;viz.classList.add('anim');

  // Explain
  document.getElementById('explainTxt').innerHTML=step.explain;

  // Nav buttons
  document.getElementById('prevBtn').disabled=curS===0;
  document.getElementById('nextBtn').disabled=curS===con.steps.length-1;
  document.getElementById('sc').textContent=`${curS+1} / ${con.steps.length}`;

  buildSidebar(document.getElementById('searchInput').value);
}

function goStep(i){curS=i;render();}
function nextStep(){if(curS<concepts[curC].steps.length-1){curS++;render();}}
function prevStep(){if(curS>0){curS--;render();}}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('searchInput'))return;
  if(e.key==='ArrowRight')nextStep();
  if(e.key==='ArrowLeft')prevStep();
  if(e.key==='ArrowDown'){const ci=filtered.indexOf(curC);if(ci<filtered.length-1){curC=filtered[ci+1];curS=0;render();}}
  if(e.key==='ArrowUp'){const ci=filtered.indexOf(curC);if(ci>0){curC=filtered[ci-1];curS=0;render();}}
});

render();
</script>
