<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laravel Advanced Concepts — Visual Deep Dive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap');
:root {
  --bg:     #0f1117;
  --bg2:    #161b27;
  --bg3:    #1e2535;
  --bg4:    #252d3f;
  --bd:     #2a3347;
  --bd2:    #364059;
  --tx:     #e8eaf0;
  --tx2:    #9ba3b8;
  --tx3:    #6b7491;
  --red:    #ff6b6b; --red-bg:    rgba(255,107,107,0.10);
  --orange: #ff9f43; --orange-bg: rgba(255,159,67,0.10);
  --yellow: #ffd32a; --yellow-bg: rgba(255,211,42,0.08);
  --green:  #1dd1a1; --green-bg:  rgba(29,209,161,0.10);
  --blue:   #54a0ff; --blue-bg:   rgba(84,160,255,0.10);
  --purple: #a29bfe; --purple-bg: rgba(162,155,254,0.10);
  --pink:   #fd79a8; --pink-bg:   rgba(253,121,168,0.10);
  --cyan:   #00cec9; --cyan-bg:   rgba(0,206,201,0.10);
  --r: 10px; --rs: 6px;
  --mono: 'JetBrains Mono', monospace;
  --ui: 'Inter', sans-serif;
  --display: 'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ui);background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#0f1117 0%,#161b27 60%,#1a2030 100%);
  border-bottom:1px solid var(--bd);
  padding:20px 24px 16px;
  position:sticky;top:0;z-index:100;
}
.header-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{
  width:40px;height:40px;border-radius:var(--rs);
  background:linear-gradient(135deg,var(--red),var(--orange));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.h-title{font-family:var(--display);font-size:20px;font-weight:700;color:var(--tx)}
.h-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.top-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-input{
  flex:1;min-width:200px;padding:8px 14px;
  background:var(--bg3);border:1px solid var(--bd);
  border-radius:20px;color:var(--tx);font-size:13px;
  font-family:var(--ui);outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--tx3)}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{
  padding:5px 14px;border-radius:20px;border:1px solid var(--bd);
  font-size:12px;font-weight:500;cursor:pointer;
  background:transparent;color:var(--tx2);
  transition:all .2s;font-family:var(--ui);
}
.cat-btn:hover{border-color:var(--bd2);color:var(--tx);background:var(--bg3)}
.cat-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* ── MAIN ── */
.main{padding:20px 24px;max-width:1300px;margin:0 auto}
.results-info{font-size:12px;color:var(--tx3);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

/* ── CARD ── */
.card{
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;transition:border-color .2s,transform .15s;
}
.card:hover{border-color:var(--bd2);transform:translateY(-1px)}
.card.open{border-color:var(--bd2)}
.card-top{padding:14px 16px;display:flex;align-items:flex-start;gap:10px}
.card-icon{
  width:36px;height:36px;border-radius:var(--rs);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.card-info{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}
.card-tagline{font-size:12px;color:var(--tx3);line-height:1.4}
.card-chev{color:var(--tx3);font-size:12px;transition:transform .2s;margin-top:3px;flex-shrink:0}
.card.open .card-chev{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--bd)}
.card.open .card-body{display:block}

/* ── BLOCKS INSIDE CARD ── */
.blk{padding:14px 16px;border-bottom:1px solid var(--bd)}
.blk:last-child{border-bottom:none}
.blk-label{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--tx3);margin-bottom:9px;
}
/* colored info boxes */
.box-danger {background:var(--red-bg);   border-left:3px solid var(--red);   border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;font-size:13px;color:#ffb3b3;line-height:1.65}
.box-warn   {background:var(--orange-bg);border-left:3px solid var(--orange); border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;font-size:13px;color:#ffc97a;line-height:1.65}
.box-success{background:var(--green-bg); border-left:3px solid var(--green);  border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;font-size:13px;color:#7decd6;line-height:1.65}
.box-info   {background:var(--blue-bg);  border-left:3px solid var(--blue);   border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;font-size:13px;color:#93c3ff;line-height:1.65}

/* flow */
.flow{display:flex;flex-direction:column;gap:5px}
.flow-box{
  padding:8px 14px;border-radius:var(--rs);
  font-size:12px;font-weight:500;color:var(--tx);
}
.flow-arr{display:flex;align-items:center;gap:8px;padding:0 6px}
.flow-arr-icon{font-size:16px;color:var(--tx3)}
.flow-arr-lbl{font-size:11px;color:var(--tx3)}

/* alternatives */
.alt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.alt-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px}
.alt-name{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.alt-desc{font-size:11px;color:var(--tx3);line-height:1.5}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-best{background:var(--green-bg);color:var(--green);border:1px solid rgba(29,209,161,.25)}
.badge-ok  {background:var(--orange-bg);color:var(--orange);border:1px solid rgba(255,159,67,.25)}
.badge-bad {background:var(--red-bg);color:var(--red);border:1px solid rgba(255,107,107,.25)}

/* vs code */
.vs-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vs-bad,.vs-good{border-radius:var(--rs);padding:10px 12px}
.vs-bad{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.2)}
.vs-good{background:rgba(29,209,161,.06);border:1px solid rgba(29,209,161,.2)}
.vs-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.vs-bad .vs-lbl{color:var(--red)}
.vs-good .vs-lbl{color:var(--green)}
.vs-code{font-size:11px;font-family:var(--mono);color:var(--tx2);line-height:1.7;white-space:pre-wrap;word-break:break-word}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--tx3);font-size:14px}
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="logo">🏗️</div>
    <div>
      <div class="h-title">Laravel Advanced Concepts</div>
      <div class="h-sub">Visual Deep Dive — Problem · Without it · Alternatives · Why Laravel wins</div>
    </div>
    <input class="search-input" type="text" placeholder="🔍  Search concept, category..." oninput="doSearch(this.value)" style="margin-left:auto">
  </div>
  <div class="cats" id="cats"></div>
</header>

<main class="main">
  <div class="results-info" id="info"></div>
  <div class="grid" id="grid"></div>
</main>

<script>
const DATA = [

alts:[

  {name:"Static factories",badge:"bad",desc:"Slightly better but still not mockable easily"},
  {name:"Pimple / PHP-DI",badge:"ok",desc:"Good containers but need manual config, no auto-wiring"},
  {name:"Laravel Container",badge:"best",desc:"Auto-wiring, interface binding, contextual binding, zero config"},

tagline:"Dependencies bahar se do — andar mat banao",

],
flow:[

tagline:"Data access ko centralize karo — business logic se alag rakho",

tagline:"Business logic ka ghar — Controller aur Repository ke beech mein",
visual:[
  {lbl:"🔴 Problem",cls:"box-danger",txt:"Document submit karne par: validate, save, send notification, generate PDF, clear cache, fire event — sab controller mein? 200 line ka fat controller?"},

public function store(Request $request) {
  $data = $request->validate([...]);

const CAT_COLORS = {
  Core:'#a29bfe',Architecture:'#1dd1a1',HTTP:'#54a0ff',
  Authorization:'#fd79a8',Events:'#ff9f43',Background:'#1dd1a1',
  Performance:'#00cec9',Data:'#ff9f43',Operations:'#ff6b6b',
  Quality:'#1dd1a1',Security:'#fd79a8'
};
const CAT_BG = {
  Core:'rgba(162,155,254,.12)',Architecture:'rgba(29,209,161,.12)',
  HTTP:'rgba(84,160,255,.12)',Authorization:'rgba(253,121,168,.12)',
  Events:'rgba(255,159,67,.12)',Background:'rgba(29,209,161,.12)',
  Performance:'rgba(0,206,201,.12)',Data:'rgba(255,159,67,.12)',
  Operations:'rgba(255,107,107,.12)',Quality:'rgba(29,209,161,.12)',
  Security:'rgba(253,121,168,.12)'
};
const FLOW_COLORS = [
  'var(--bg3)','var(--blue-bg)','var(--orange-bg)','var(--green-bg)',
  'var(--purple-bg)','var(--cyan-bg)','var(--red-bg)'
];
const FLOW_TC = [
  'var(--tx)','var(--blue)','var(--orange)','var(--green)',
  'var(--purple)','var(--cyan)','var(--red)'
];

let currentCat = 'All', currentSearch = '';

function buildCats() {
  const cats = ['All', ...new Set(DATA.map(d => d.cat))];
  document.getElementById('cats').innerHTML = cats.map((c, i) =>
    `<button class="cat-btn${i === 0 ? ' active' : ''}" onclick="setCat('${c}',this)">${c}${c === 'All' ? ` (${DATA.length})` : ''}</button>`
  ).join('');
}

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function doSearch(val) {
  currentSearch = val.toLowerCase();
  renderGrid();
}

function renderGrid() {
  const items = DATA.filter(d => {
    const matchCat = currentCat === 'All' || d.cat === currentCat;
    const matchQ = !currentSearch ||
      d.title.toLowerCase().includes(currentSearch) ||
      d.tagline.toLowerCase().includes(currentSearch) ||
      d.cat.toLowerCase().includes(currentSearch);
    return matchCat && matchQ;
  });

  document.getElementById('info').textContent =
    `Showing ${items.length} of ${DATA.length} concepts`;

  if (items.length === 0) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">No concepts found. Try a different search term.</div>`;
    return;
  }

  document.getElementById('grid').innerHTML = items.map(d => {
    const col = CAT_COLORS[d.cat] || '#9ba3b8';
    const bg  = CAT_BG[d.cat]    || 'rgba(155,163,184,.1)';
    return `
<div class="card" id="card-${d.id}" onclick="toggle(${d.id})">
  <div class="card-top">
    <div class="card-icon" style="background:${bg}">${d.icon}</div>
    <div class="card-info">
      <div class="card-title"><span style="color:${col};font-family:var(--mono);font-size:11px;margin-right:6px">#${String(d.id).padStart(2,'0')}</span>${d.title}</div>
      <div class="card-tagline">${d.tagline}</div>
    </div>
    <div class="card-chev">▼</div>
  </div>
  <div class="card-body">
    ${d.visual.map(v => `
      <div class="blk">
        <div class="blk-label">${v.lbl}</div>
        <div class="${v.cls}">${v.txt}</div>
      </div>
    `).join('')}
    <div class="blk">
      <div class="blk-label">🔄 Flow visualization</div>
      <div class="flow">${buildFlow(d.flow)}</div>
    </div>
    <div class="blk">
      <div class="blk-label">⚖️ Alternatives — kya use karein?</div>
      <div class="alt-grid">${d.alts.map(a => `
        <div class="alt-card">
          <div class="alt-name">${a.name}<span class="badge badge-${a.badge}">${a.badge==='best'?'✓ Best':a.badge==='ok'?'~ OK':'✗ Avoid'}</span></div>
          <div class="alt-desc">${a.desc}</div>
        </div>
      `).join('')}</div>
    </div>
    <div class="blk">
      <div class="blk-label">❌ Wrong way vs ✅ Laravel way</div>
      <div class="vs-wrap">
        <div class="vs-bad"><div class="vs-lbl">Without / wrong approach</div><div class="vs-code">${esc(d.vs.bad)}</div></div>
        <div class="vs-good"><div class="vs-lbl">Laravel best practice</div><div class="vs-code">${esc(d.vs.good)}</div></div>
      </div>
    </div>
  </div>
</div>`;
  }).join('');
}

function buildFlow(flow) {
  let ci = 0;
  return flow.map(f => {
    if (f.arr !== undefined) {
      return `<div class="flow-arr"><div class="flow-arr-icon">${f.arr}</div><div class="flow-arr-lbl">${f.lbl || ''}</div></div>`;
    }
    const bg = f.bg || FLOW_COLORS[ci % FLOW_COLORS.length];
    const tc = f.tc || FLOW_TC[ci % FLOW_TC.length];
    ci++;
    return `<div class="flow-box" style="background:${bg};color:${tc}">${f.box}</div>`;
  }).join('');
}

function toggle(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildCats();
renderGrid();
</script>
</body>
</html>
