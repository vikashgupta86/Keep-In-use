<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>React Concepts Visualizer — Complete Edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2130;--bg5:#1f2940;
  --border:#1e2d40;--border2:#2a3d55;--border3:#3a5070;
  --text:#dde6f0;--text2:#8fa8c0;--text3:#4d6680;
  --purple:#a78bfa;--purple2:#7c3aed;--purple-bg:#160f2e;--purple-bd:#3d1f80;
  --teal:#2dd4bf;--teal2:#0f766e;--teal-bg:#041f1b;--teal-bd:#0d4f48;--teal-dk:#5eead4;
  --blue:#60a5fa;--blue2:#1d4ed8;--blue-bg:#0c1e3d;--blue-bd:#1e3f7a;--blue-dk:#93c5fd;
  --amber:#fbbf24;--amber2:#d97706;--amber-bg:#1f1203;--amber-bd:#78350f;--amber-dk:#fde68a;
  --coral:#f87171;--coral2:#dc2626;--coral-bg:#1f0808;--coral-bd:#7f1d1d;
  --green:#4ade80;--green2:#16a34a;--green-bg:#031a0b;--green-bd:#14532d;
  --pink:#f472b6;--pink-bg:#1f0818;--pink-bd:#831843;
  --orange:#fb923c;--orange-bg:#1a0c03;--orange-bd:#7c2d12;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne','Segoe UI',sans-serif;
  --glow:0 0 20px rgba(167,139,250,.15);
  --glow2:0 0 40px rgba(45,212,191,.1);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--purple2)}

.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:0;overflow-y:auto;position:sticky;top:0;height:100vh}
.sidebar-logo{padding:16px 14px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.logo-main{font-size:15px;font-weight:800;color:var(--text);letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.logo-main span{color:var(--teal)}
.logo-sub{font-size:10.5px;color:var(--text3);margin-top:3px;font-weight:400}
.logo-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(167,139,250,.2) 0%,transparent 70%);pointer-events:none}

.cat-label{padding:12px 14px 4px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);display:flex;align-items:center;gap:6px}
.cat-label::after{content:'';flex:1;height:1px;background:var(--border)}

.topic-btn{display:flex;align-items:center;width:100%;text-align:left;padding:6px 14px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s;border-left:2px solid transparent;gap:7px}
.topic-btn:hover{background:rgba(255,255,255,.03);color:var(--text);border-left-color:var(--border3)}
.topic-btn.active{background:rgba(167,139,250,.08);color:var(--purple);border-left-color:var(--purple)}
.topic-btn.active .tb-name{color:var(--purple)}
.tb-name{flex:1}
.tb-tag{font-size:9px;padding:1px 5px;border-radius:4px;opacity:.7;white-space:nowrap}

.diff-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.diff-e{background:var(--green)}.diff-m{background:var(--amber)}.diff-h{background:var(--coral)}.diff-x{background:var(--pink)}

/* INTERVIEW BTN */
.interview-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 20px);margin:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border3);background:linear-gradient(135deg,rgba(251,191,36,.05),rgba(251,191,36,.02));color:var(--amber-dk);cursor:pointer;font-size:11.5px;font-family:var(--sans);font-weight:600;transition:all .2s}
.interview-btn:hover{border-color:var(--amber2);background:rgba(251,191,36,.1);box-shadow:0 0 15px rgba(251,191,36,.1)}
.interview-btn .ib-icon{font-size:14px}

/* MAIN */
.main{display:flex;flex-direction:column;min-height:100vh;overflow:hidden}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;text-align:center;gap:16px;position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(167,139,250,.06) 0%,transparent 70%);pointer-events:none}
.welcome-icon{font-size:48px;filter:drop-shadow(0 0 20px rgba(167,139,250,.4));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome h2{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{color:var(--text2);max-width:460px;line-height:1.8;font-size:13.5px}
.welcome-stats{display:flex;gap:20px;margin-top:8px}
.w-stat{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);text-align:center}
.w-stat-n{font-size:20px;font-weight:800;color:var(--teal)}
.w-stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:600px;margin-top:8px}
.qc{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:11.5px;color:var(--text2);cursor:pointer;transition:all .15s;text-align:left}
.qc:hover{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.05)}
.qc-tag{font-size:9px;color:var(--text3);display:block;margin-top:2px}

/* HEADER */
.concept-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg2);position:relative}
.concept-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--purple-bd),var(--teal-bd),transparent)}
.concept-title{font-size:18px;font-weight:800;color:var(--text)}
.concept-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd);font-weight:600;letter-spacing:.3px}
.diff-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.diff-badge.e{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.diff-badge.m{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.diff-badge.h{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-bd)}
.diff-badge.x{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-bd)}

.concept-desc{padding:9px 20px;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border);line-height:1.7;background:var(--bg)}

/* GRID */
.top-grid{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0}
.left-col,.right-col{display:flex;flex-direction:column;overflow:hidden}
.left-col{border-right:1px solid var(--border)}

.panel{border-bottom:1px solid var(--border)}
.panel-hd{padding:6px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.panel-hd-dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}
.panel-hd-dot2{background:var(--purple)}

/* CODE */
.code-wrap{padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.9;background:var(--bg);overflow-x:auto;overflow-y:auto;max-height:280px}
.code-line{display:block;padding:0 6px;border-radius:3px;transition:all .2s;border-left:2px solid transparent;white-space:pre}
.code-line.hl{background:rgba(167,139,250,.1);border-left-color:var(--purple)}
.code-line.hl2{background:rgba(45,212,191,.08);border-left-color:var(--teal)}
.kw{color:#c792ea}.op{color:#89ddff}.str{color:#c3e88d}.num{color:#f78c6c}.fn{color:#82aaff}.cm{color:#4a6070;font-style:italic}.lk{color:#f07178}.tp{color:#ffcb6b}.dc{color:#546e7a}

/* LARAVEL */
.laravel-wrap{padding:10px 14px;font-size:12px;background:var(--bg);overflow-y:auto;max-height:180px;min-height:60px}
.lv-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.lv-label::before{content:'';width:12px;height:1px;background:var(--teal)}
.lv-code{font-family:var(--mono);font-size:11.5px;color:var(--teal-dk);line-height:1.8;white-space:pre-wrap}

/* STEP BAR */
.step-bar{display:flex;align-items:center;gap:5px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;flex-wrap:nowrap}
.step-pill{padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:none;white-space:nowrap;transition:all .15s;font-family:var(--sans)}
.step-pill:hover{border-color:var(--purple);color:var(--purple)}
.step-pill.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}

/* VIZ */
.viz{padding:14px;overflow-y:auto;flex:1;min-height:200px;display:flex;flex-direction:column;gap:7px}
.viz-fade .v-row,.viz-fade .v-flow{animation:fadeIn .25s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* EXPLAIN */
.explain{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2)}
.explain-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--amber);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.explain-lbl::before{content:'';width:12px;height:1px;background:var(--amber)}
.explain-txt{color:var(--text2);line-height:1.75;font-size:12.5px;max-height:100px;overflow-y:auto}

/* NAV */
.nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);background:var(--bg2)}
.nb{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.nb:hover:not(:disabled){background:rgba(167,139,250,.1);color:var(--purple);border-color:var(--purple)}
.nb:disabled{opacity:.25;cursor:default}
.sc{font-size:11px;color:var(--text3);font-weight:600}

/* VIZ ELEMENTS */
.v-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.v-box{padding:5px 11px;border-radius:6px;font-size:11.5px;font-weight:600;border:1px solid transparent;font-family:var(--mono);line-height:1.4}
.v-box.small{font-size:10px;padding:3px 8px}
.v-box.purple{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.v-box.teal{background:var(--teal-bg);border-color:var(--teal-bd);color:var(--teal-dk)}
.v-box.blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-dk)}
.v-box.amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.v-box.coral{background:var(--coral-bg);border-color:var(--coral-bd);color:var(--coral)}
.v-box.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.v-box.gray{background:var(--bg4);border-color:var(--border2);color:var(--text2)}
.v-box.pink{background:var(--pink-bg);border-color:var(--pink-bd);color:var(--pink)}
.v-box.orange{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange)}
.v-arrow{color:var(--text3);font-size:13px;flex-shrink:0}
.v-label{font-size:10.5px;color:var(--text3);font-family:var(--sans)}
.v-divider{width:100%;height:1px;background:var(--border);margin:3px 0}
.v-flow{display:flex;flex-direction:column;gap:6px;width:100%}
.v-lifecycle{display:flex;align-items:stretch;gap:0;border:1px solid var(--border2);border-radius:8px;overflow:hidden;width:100%}
.v-lc-step{flex:1;padding:7px 4px;text-align:center;font-size:10px;background:var(--bg3);border-right:1px solid var(--border);color:var(--text3)}
.v-lc-step:last-child{border-right:none}
.v-lc-step.active{background:rgba(167,139,250,.1);color:var(--purple);font-weight:700}
.v-lc-step.teal{background:rgba(45,212,191,.08);color:var(--teal)}
.v-lc-step .lc-icon{font-size:14px;display:block;margin-bottom:2px}
.dl{font-size:11px;color:var(--text3);padding:1px 0;font-weight:600;font-family:var(--sans)}
.tree-line{width:1px;height:14px;background:var(--border2);margin:0 auto}
.v-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.v-badge.yes{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.v-badge.no{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-bd)}
.v-badge.warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.v-badge.info{background:var(--blue-bg);color:var(--blue-dk);border:1px solid var(--blue-bd)}
.v-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%}
.v-card{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px}
.v-card-title{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px;font-weight:700}
.v-tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}

/* INTERVIEW PANEL */
.interview-screen{display:flex;flex-direction:column;flex:1;min-height:0}
.interview-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:10px}
.interview-title{font-size:18px;font-weight:800;color:var(--amber)}
.interview-body{flex:1;overflow-y:auto;padding:20px}
.q-filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.q-filter{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.q-filter:hover{border-color:var(--purple);color:var(--purple)}
.q-filter.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}

.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.q-card:hover{border-color:var(--border3)}
.q-header{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.q-num{font-size:10px;color:var(--text3);font-weight:700;background:var(--bg3);padding:2px 7px;border-radius:4px;border:1px solid var(--border);margin-top:2px;flex-shrink:0;font-family:var(--mono)}
.q-text{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.5}
.q-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:5px}
.q-diff{font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:700}
.q-diff.e{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.q-diff.m{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.q-diff.h{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-bd)}
.q-topic{font-size:9.5px;padding:2px 7px;border-radius:10px;background:var(--blue-bg);color:var(--blue-dk);border:1px solid var(--blue-bd);font-weight:600}
.q-arrow{color:var(--text3);font-size:14px;transition:transform .2s;margin-left:auto;flex-shrink:0}
.q-card.open .q-arrow{transform:rotate(180deg)}
.q-answer{display:none;padding:0 16px 14px 16px;border-top:1px solid var(--border)}
.q-card.open .q-answer{display:block}
.q-ans-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);font-weight:700;margin:10px 0 6px;display:flex;align-items:center;gap:5px}
.q-ans-label::before{content:'';width:10px;height:1px;background:var(--teal)}
.q-ans-text{color:var(--text2);font-size:12.5px;line-height:1.8}
.q-code{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:var(--mono);font-size:11.5px;color:var(--teal-dk);line-height:1.8;margin-top:8px;overflow-x:auto;white-space:pre}
.q-tip{background:rgba(251,191,36,.05);border:1px solid var(--amber-bd);border-radius:6px;padding:8px 12px;font-size:11.5px;color:var(--amber-dk);margin-top:8px;line-height:1.7}
.q-tip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--amber);margin-bottom:3px}

/* SEARCH */
.search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2)}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--sans);outline:none;transition:border-color .15s}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:var(--purple)}

/* PROGRESS BAR */
.progress-bar{height:2px;background:var(--border);position:relative;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--teal));transition:width .3s ease;border-radius:1px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-main">⚛️ <span>React</span> Visualizer</div>
      <div class="logo-sub">Laravel Dev Edition — Hinglish</div>
      <div class="logo-glow"></div>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-inp" placeholder="Search concepts..." id="searchInput" oninput="filterTopics(this.value)"/>
    </div>
    <button class="interview-btn" onclick="showInterview()">
      <span class="ib-icon">🎯</span> Interview Questions
      <span style="margin-left:auto;background:rgba(251,191,36,.15);border:1px solid var(--amber-bd);padding:1px 6px;border-radius:10px;font-size:9px">90+</span>
    </button>
    <div id="sidebarContent"></div>
  </div>
  <div class="main" id="main">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">⚛️</div>
      <h2>React Seekho — Laravel ki Nazar Se</h2>
      <p>Har concept Laravel se compare karke, step-by-step visualize karke, aur real project examples ke saath samjho. Plus interview preparation!</p>
      <div class="welcome-stats">
        <div class="w-stat"><div class="w-stat-n">35+</div><div class="w-stat-l">Concepts</div></div>
        <div class="w-stat"><div class="w-stat-n">90+</div><div class="w-stat-l">Interview Qs</div></div>
        <div class="w-stat"><div class="w-stat-n">150+</div><div class="w-stat-l">Visual Steps</div></div>
      </div>
      <div class="quick-grid" id="quickLinks"></div>
    </div>
    <div id="conceptScreen" style="display:none;flex-direction:column;flex:1"></div>
    <div id="interviewScreen" style="display:none"></div>
  </div>
</div>

<script>
const CONCEPTS = [
// ═══════════════════════════════════════════════════
// FOUNDATIONS
// ═══════════════════════════════════════════════════
{cat:'Foundations',name:'Component',diff:'e',tag:'Core',
 desc:'React component = Laravel Blade component + Controller ka kaam ek hi jagah. Ek function jo JSX return kare — bas itna hi hai React component. Poori React app components ka ek tree hoti hai.',
 query:[
  {t:`<span class="kw">function</span> <span class="fn">ProductCard</span>({ name, price, inStock }) {`,l:[0]},
  {t:`  <span class="cm">// Logic (Controller jaisa)</span>`,l:[]},
  {t:`  <span class="kw">const</span> formatted = <span class="str">\`₹\${price.toLocaleString()}\`</span>;`,l:[1]},
  {t:`  <span class="kw">const</span> status = inStock ? <span class="str">'Available'</span> : <span class="str">'Out of Stock'</span>;`,l:[1]},
  {t:``,l:[]},
  {t:`  <span class="cm">// Template (Blade jaisa)</span>`,l:[]},
  {t:`  <span class="kw">return</span> (`,l:[2]},
  {t:`    &lt;<span class="lk">div</span> className=<span class="str">"card"</span>&gt;`,l:[2]},

{cat:'State & Hooks',name:'useState',diff:'e',tag:'Core Hook',
 desc:'useState = PHP session ka frontend version. Component ki yaaddasht — value store karo, change karo, React automatically UI update karega. React ka sabse important hook.',

 ],

{cat:'Architecture',name:'Virtual DOM',diff:'h',tag:'Internals',
 desc:'Virtual DOM = React ka internal draft system. Real DOM mein change se pehle React ek lightweight copy banata hai, diff karta hai, sirf zaroorat ke changes apply karta hai.',
 query:[
  {t:`<span class="cm">// JSX → React.createElement → VDOM</span>`,l:[]},
  {t:`<span class="kw">const</span> el = &lt;<span class="lk">div</span> className=<span class="str">"card"</span>&gt;`,l:[0]},
  {t:`  &lt;<span class="lk">h2</span>&gt;{title}&lt;/<span class="lk">h2</span>&gt;`,l:[0]},

  {t:``,l:[]},
  {t:`<span class="cm">// Compiles to:</span>`,l:[]},
  {t:`React.<span class="fn">createElement</span>(<span class="str">'div'</span>, {className:<span class="str">'card'</span>},`,l:[1]},
  {t:`  React.<span class="fn">createElement</span>(<span class="str">'h2'</span>, <span class="kw">null</span>, title)`,l:[1]},
  {t:`);`,l:[1]},
  {t:``,l:[]},
  {t:`<span class="cm">// VDOM object (plain JS):</span>`,l:[]},
  {t:`{ type: <span class="str">'div'</span>, props: {className:<span class="str">'card'</span>},`,l:[2]},
  {t:`  children: [{type:<span class="str">'h2'</span>, props:{}, children:[title]}]`,l:[2]},
  {t:`}`,l:[2]},
 ],
 steps:[
  {label:'What is VDOM',qL:[0,1,2,3,6,7,8,9],laravel:`<span class="lv-code">// Laravel mein koi VDOM nahi —
// Har request pe server HTML render karta hai
// Browser = fresh start
// React mein: JS objects mein UI describe
// Real DOM mein bas changes apply</span>`,explain:`<b>Virtual DOM = Real DOM ka JavaScript object shadow.</b> Real DOM operations (appendChild, innerHTML) browser ke saath communicate karte hain — slow. React pehle plain JS objects mein UI describe karta hai (fast), phir actual DOM se compare karta hai, phir sirf differences apply karta hai. Git diff jaisa.`,
   render(){return`<div class="v-flow">
<div class="dl">VDOM = Plain JS object tree:</div>
<div class="v-row"><div class="v-box blue small">{type:'div', props:{...}, children:[...]}</div></div>

  {label:'Reconciliation',qL:[11,12,13],laravel:`<span class="lv-code">// Git diff jaisa:
git diff old.html new.html

{cat:'Architecture',name:'React.memo',diff:'m',tag:'Performance',
 desc:'React.memo = HOC jo component ko memoize karta hai. Agar props same hain toh re-render skip karo. useCallback ke saath use karo best results ke liye.',
 query:[
  {t:`<span class="cm">// Wrap component with memo</span>`,l:[]},
  {t:`<span class="kw">const</span> UserRow = <span class="fn">React.memo</span>(<span class="kw">function</span> <span class="fn">UserRow</span>({ user, onDelete }) {`,l:[0]},
  {t:`  console.<span class="fn">log</span>(<span class="str">'UserRow renders'</span>);`,l:[]},
  {t:`  <span class="kw">return</span> &lt;<span class="lk">tr</span>&gt;`,l:[]},
  {t:`    &lt;<span class="lk">td</span>&gt;{user.name}&lt;/<span class="lk">td</span>&gt;`,l:[]},
  {t:`    &lt;<span class="lk">button</span> onClick={() =&gt; <span class="fn">onDelete</span>(user.id)}&gt;Delete&lt;/<span class="lk">button</span>&gt;`,l:[]},
  {t:`  &lt;/<span class="lk">tr</span>&gt;;`,l:[]},
  {t:`});`,l:[]},
  {t:``,l:[]},
  {t:`<span class="cm">// Custom comparator</span>`,l:[]},
  {t:`<span class="kw">const</span> UserRow = <span class="fn">React.memo</span>(UserRowFn, (prev, next) => {`,l:[1]},
  {t:`  <span class="kw">return</span> prev.user.id === next.user.id <span class="cm">// true = skip render</span>`,l:[1]},
  {t:`    && prev.user.updatedAt === next.user.updatedAt;`,l:[1]},
  {t:`});`,l:[]},
 ],
 steps:[
  {label:'How it works',qL:[0,1,2,3,4,5,6,7],laravel:`<span class="lv-code">// Laravel mein direct equivalent nahi
// Lekin concept jaisa hai:
// Eloquent: $user->isDirty()
// Sirf dirty models database mein save hote hain
// memo: sirf changed props pe re-render</span>`,explain:`<b>React.memo = Props compare karo, re-render decide karo.</b> Normally jab parent re-renders hota hai, sare children bhi render hote hain. memo se wrapped component shallow comparison karta hai props ka — agar same hai toh skip. 100 rows wali table mein ek row change pe sirf woh row render hogi.`,
   render(){return`<div class="v-flow">
<div class="dl">Without React.memo:</div>
<div class="v-row"><div class="v-box coral small">Parent re-renders → ALL 100 UserRows render ❌</div></div>
<div class="dl" style="margin-top:4px">With React.memo:</div>
<div class="v-row"><div class="v-box green small">Parent re-renders → only changed UserRow renders ✓</div></div>
<div class="v-divider"></div>
<div class="dl">Comparison type:</div>
<div class="v-row"><div class="v-badge warn">Shallow comparison (default)</div></div>
<div class="v-row"><div class="v-badge info">Custom comparator (for deep)</div></div>
<div class="v-divider"></div>
<div class="v-row"><div class="v-badge info">useCallback + React.memo = best combo</div></div>
</div>`}},
  {label:'Custom Compare',qL:[9,10,11,12,13],laravel:`<span class="lv-code">// Custom isDirty check:
public function isDirty(array $attributes = [])
{
  // Compare old vs new specific attributes
  return $this->original['id'] !== $this->id
    || $this->original['updated_at'] !== $this->updated_at;
}</span>`,explain:`<b>Custom comparator = granular control.</b> Default shallow comparison objects ke liye galat result deta hai. Custom function mein (prev, next) milte hain — true return karo agar same hai (skip render), false karo agar different (render). Expensive comparisons avoid karo yahan.`,
   render(){return`<div class="v-flow">
<div class="dl">Custom comparator return:</div>
<div class="v-row"><div class="v-badge yes">true = same = SKIP render</div></div>
<div class="v-row"><div class="v-badge no">false = different = DO render</div></div>
<div class="v-divider"></div>
<div class="dl">When to use:</div>

<div class="v-row"><div class="v-badge info">Expensive renders</div></div>
<div class="v-row"><div class="v-badge info">Pure display components</div></div>
<div class="v-divider"></div>
<div class="dl">⚠️ Measure before adding memo!</div>
</div>`}}
 ]},

// INTERVIEW QUESTIONS
// ═══════════════════════════════════════════════════
const INTERVIEW_QS = [
// BASIC
{q:'React kya hai aur Vue/Angular se kaise alag hai?',diff:'e',topic:'Basics',
 ans:'React ek UI library hai (framework nahi) jo Facebook ne banaya. Sirf View layer handle karta hai — routing, state management ke liye alag libraries chahiye. Vue = opinionated framework (built-in routing/state). Angular = full MVC framework, TypeScript-first. React ka Virtual DOM aur unidirectional data flow iske core features hain.',
 code:`// React = just components
function App() { return <h1>Hello</h1>; }

// Vue component
export default { template: '<h1>Hello</h1>' }`,
 tip:'Interview mein kehna: "React = flexible library, Vue = progressive framework, Angular = full framework with batteries included"'},

{q:'Virtual DOM kya hai aur ye actual DOM se faster kyon hai?',diff:'e',topic:'Core',
 ans:'Virtual DOM = Real DOM ka plain JavaScript object representation. Real DOM operations slow hain kyunki browser ka rendering engine involve hota hai. VDOM fast hai kyunki sirf JS objects hain. Process: 1) New VDOM banao, 2) Old VDOM se diff karo, 3) Sirf differences (patch) real DOM mein apply karo.',
 code:`// VDOM = plain object
{ type: 'div', props: { className: 'card' }, children: [...] }

// Real DOM = slow browser API
document.getElementById('x').style.color = 'red'; // slow!`,
 tip:'"Git diff" analogy use karo — poori file nahi, sirf changes apply karo.'},

{q:'Class Component vs Functional Component mein kya fark hai?',diff:'e',topic:'Core',
 ans:'Functional components = simple functions jo JSX return karte hain. Hooks ke saath sab features available. Class components = extend Component, render() method zaroori, this.state aur lifecycle methods. Modern React mein functional + hooks preferred hain. Class components sirf Error Boundary ke liye aaj bhi use hote hain.',
 code:`// Modern: Functional
function Counter() {
  const [count, setCount] = useState(0);
  return <button onClick={() => setCount(c => c+1)}>{count}</button>;
}

// Legacy: Class
class Counter extends Component {
  state = { count: 0 };
  render() { return <button>{this.state.count}</button>; }
}`,
 tip:'Kehna: "Hooks ne class components ki zaroorat almost khatam kar di hai, sirf Error Boundaries ke liye class use hota hai."'},

{q:'useState mein state directly mutate kyon nahi karna chahiye?',diff:'e',topic:'State',
 ans:'React shallow comparison karta hai — agar same reference return karo toh React samjhega koi change nahi hua, re-render nahi hoga. items.push(x) same array reference return karta hai — React detect nahi karega. [...items, x] nayi array return karta hai — React change detect karega aur re-render karega.',
 code:`// ❌ Wrong — same reference
const items = state.items;
items.push(newItem);
setState({ items }); // React: "same array, no change"

// ✓ Correct — new reference
setState({ items: [...state.items, newItem] }); // React detects change`,
 tip:'"Immutability = React ki superpower" — predict karna aasaan hota hai kab UI update hogi.'},

{q:'useEffect dependency array ke sare cases explain karo.',diff:'e',topic:'Hooks',
 ans:'useEffect(fn) = har render ke baad chale. useEffect(fn, []) = sirf mount pe (once). useEffect(fn, [dep]) = dep change hone pe. useEffect cleanup return karo = unmount ya next effect se pehle chale. ESLint react-hooks/exhaustive-deps rule sabhi used variables ko deps mein add karne ko kehti hai.',
 code:`useEffect(fn);          // ❌ infinite loop risk
useEffect(fn, []);      // ✓ mount only
useEffect(fn, [userId]); // ✓ userId change pe
useEffect(() => {
  const sub = subscribe();
  return () => sub.unsubscribe(); // cleanup
}, []);`,
 tip:'Cleanup function bhoolna = memory leak. Production mein AbortController se fetch cancel karo.'},

{q:'props drilling problem kya hai aur kaise solve karo?',diff:'e',topic:'State',
 ans:'Props drilling = data 5-6 levels neeche pass karna padta hai, beech wale components sirf pass-through karte hain. Solutions: 1) Context API (auth, theme, global data), 2) State management (Zustand, Redux) for complex apps, 3) Component composition (children prop), 4) Custom hooks with Context.',
 code:`// Problem:
App → Layout → Sidebar → NavItem → Avatar → {user}
// 5 levels tak sirf pass-through!

// Solution: Context
const { user } = useContext(AuthContext); // kahi bhi!`,
 tip:'"Context use karo global data ke liye, props use karo local data ke liye — overengineering mat karo"'},

// INTERMEDIATE
{q:'useEffect mein async/await directly kyon nahi use kar sakte?',diff:'m',topic:'Hooks',
 ans:'useEffect callback ko either kuch return nahi karna chahiye ya cleanup function return karna chahiye. Async function Promise return karta hai — React expect karta hai cleanup function ya nothing. Solution: async function effect ke andar define karo.',
 code:`// ❌ Wrong
useEffect(async () => {
  const data = await fetchData(); // React ko Promise mila
}, []);

// ✓ Correct
useEffect(() => {
  const fetchData = async () => {
    const data = await api.get('/users');
    setUsers(data);
  };
  fetchData();
}, []);`,
 tip:'Race condition bhi handle karo: AbortController ya isMounted flag use karo'},

{q:'useMemo aur useCallback mein kya fark hai?',diff:'m',topic:'Performance',
 ans:'useMemo = computed VALUE memoize karta hai. useCallback = FUNCTION reference memoize karta hai. useCallback(fn, deps) = useMemo(() => fn, deps) ke equivalent hai. useMemo jab heavy calculation ho. useCallback jab function React.memo wrapped child ko pass karo.',
 code:`// useMemo = value cache
const sortedList = useMemo(
  () => items.sort((a,b) => a.price - b.price),
  [items]
); // sortedList = sorted array

// useCallback = function reference stable
const handleClick = useCallback(
  (id) => deleteItem(id),
  [deleteItem]
); // handleClick = same fn reference`,
 tip:'"Both optimize renders, but useMemo = value, useCallback = function" — ye yaad rakho'},

{q:'React mein reconciliation kaise kaam karta hai?',diff:'m',topic:'Core',
 ans:'Reconciliation = React ka algorithm jo decide karta hai kya update karna hai. Rules: 1) Different element types = subtree unmount + remount. 2) Same type = props update. 3) Lists mein key prop se track karta hai. React 18 mein Fiber architecture se work chunks mein split hota hai — UI block nahi hoti.',
 code:`// Same type — sirf props update:
<div className="old" /> → <div className="new" /> // ✓ fast

// Different type — full remount:
<div> → <span> // ❌ slow, unmount+remount

// Lists — key se tracking:
<li key={user.id}>{user.name}</li> // ✓ correct`,
 tip:'"key prop = React ka primary tracking mechanism for lists" — stable unique ID use karo'},

{q:'Controlled vs Uncontrolled components mein kya fark hai?',diff:'m',topic:'Forms',
 ans:'Controlled = React state form value control karta hai (value + onChange dono). Single source of truth. Uncontrolled = DOM apna state manage karta hai, useRef se value access karo. Controlled = real-time validation possible. Uncontrolled = simpler, file inputs ke liye zaroori.',
 code:`// Controlled:
<input value={name} onChange={e => setName(e.target.value)} />

// Uncontrolled:
const inputRef = useRef();
<input ref={inputRef} />
// inputRef.current.value se access karo

// File input = always uncontrolled
<input type="file" ref={fileRef} />`,
 tip:'"React Hook Form internally uncontrolled use karta hai — less re-renders ke liye"'},

{q:'useLayoutEffect aur useEffect mein kya fark hai?',diff:'m',topic:'Hooks',
 ans:'useEffect = asynchronous, browser paint ke baad. useLayoutEffect = synchronous, DOM update ke baad lekin browser paint se pehle. useLayoutEffect mein DOM measurements accurate hote hain (getBoundingClientRect). Normally useEffect use karo — sirf DOM measurement ya visual glitch rokne ke liye useLayoutEffect.',
 code:`useEffect(() => {
  // Async — browser paint ke baad
  // API calls, subscriptions yahan
});

useLayoutEffect(() => {
  // Sync — paint se pehle
  // DOM measurement, scroll position
  const rect = ref.current.getBoundingClientRect();
  setPosition(rect);
});`,
 tip:'SSR mein useLayoutEffect warning deta hai — useEffect prefer karo ya isomorphic hook use karo'},

{q:'React mein performance optimize karne ke kya tarike hain?',diff:'m',topic:'Performance',
 ans:'1) React.memo — unnecessary re-renders rokna. 2) useMemo — expensive calculations cache. 3) useCallback — stable fn references. 4) Code splitting — lazy() aur Suspense. 5) Virtualization — react-window/virtual for long lists. 6) Key prop correctly use karna. 7) State structure optimize karna — related state saath rakho. 8) React DevTools Profiler se measure karo.',
 code:`// 1. React.memo
const UserRow = React.memo(({ user }) => <tr>{user.name}</tr>);

// 2. Code splitting
const Dashboard = lazy(() => import('./Dashboard'));

// 3. List virtualization
import { FixedSizeList } from 'react-window';`,
 tip:'"Profile first, optimize second" — premature optimization worst pattern hai React mein'},

// ADVANCED
{q:'Fiber architecture kya hai aur React 16+ mein kyun important hai?',diff:'h',topic:'Internals',
 ans:'Fiber = React 16 mein rewrite hua reconciliation engine. Pehle = synchronous rendering (UI freeze). Fiber = work units (fibers) mein split, pauseable/resumeable/prioritizable. Concurrent Mode enable karta hai. Features: Time slicing (50ms chunks), Suspense, Transitions (startTransition), Priority scheduling.',
 code:`// React 18 concurrent features:
import { startTransition, useDeferredValue } from 'react';

// Low priority update
startTransition(() => {
  setSearchResults(filterData(query));
});

// Deferred value
const deferredQuery = useDeferredValue(query);`,
 tip:'"Fiber = React ka internal scheduler — important updates (typing) ko low priority updates se pehle process karo"'},

{q:'React mein memory leaks kab hote hain aur kaise rokein?',diff:'h',topic:'Performance',
 ans:'Memory leaks: 1) Cleanup nahi kiya (timer, subscription). 2) Unmounted component pe setState. Solutions: useEffect cleanup function. AbortController for fetch. isMounted pattern. React 18 mein strict mode double invocation ye leaks detect karta hai.',
 code:`// Memory leak example:
useEffect(() => {
  const timer = setInterval(tick, 1000);
  // ❌ No cleanup!
}, []);

// ✓ Fix:
useEffect(() => {
  const timer = setInterval(tick, 1000);
  return () => clearInterval(timer); // cleanup!
}, []);

// ✓ Fetch cleanup:
useEffect(() => {
  const controller = new AbortController();
  fetch('/api/data', { signal: controller.signal });
  return () => controller.abort();
}, []);`,
 tip:'"React 18 Strict Mode development mein effects twice mount karta hai — ye intentional hai leaks detect karne ke liye"'},

{q:'Context vs Redux vs Zustand — kab kya use karein?',diff:'h',topic:'State',
 ans:'Context: Simple global state (auth, theme). Re-render issue hai. Redux: Large apps, time-travel debugging, complex state logic, DevTools. Zustand: Simple API, minimal boilerplate, no provider needed, performance optimized. React Query: Server state ke liye (fetch, cache, sync) — Redux ki zaroorat km kar deta hai.',
 code:`// Context (simple):
const theme = useContext(ThemeContext);

// Zustand (recommended for local global state):
const useStore = create((set) => ({
  count: 0,
  increment: () => set(s => ({ count: s.count + 1 }))
}));

// React Query (server state):
const { data } = useQuery({ queryKey: ['users'], queryFn: fetchUsers });`,
 tip:'"Context + useState = small apps. Zustand = medium apps. Redux Toolkit = large complex apps with DevTools need"'},

{q:'React Server Components kya hain? (React 18+)',diff:'h',topic:'Advanced',
 ans:'RSC = Server pe run hone wale components. JavaScript bundle mein include nahi hote. Direct database access kar sakte hain. "use client" directive se client component banate hain. Next.js App Router mein default sab server components hain. Benefits: Smaller bundle, faster load, direct data access.',
 code:`// Server Component (default in Next.js App Router)
// ❌ No hooks, no browser APIs
async function UserList() {
  const users = await db.users.findMany(); // Direct DB!
  return <ul>{users.map(u => <li key={u.id}>{u.name}</li>)}</ul>;
}

// Client Component
'use client';
function Counter() {
  const [count, setCount] = useState(0); // Hooks OK
  return <button onClick={() => setCount(c => c+1)}>{count}</button>;
}`,
 tip:'"RSC = Laravel Controller jaisa — server pe logic, client ko sirf HTML bhejo. Smaller JS bundle = faster app"'},

{q:'Hooks ke rules kya hain aur ye kyon hain?',diff:'m',topic:'Hooks',
 ans:'Rule 1: Top level pe call karo — loops, conditions, nested functions ke andar nahi. Rule 2: Sirf React functions mein (components ya custom hooks) — plain JS functions mein nahi. Reason: React hooks ka order track karta hai — agar order change ho (conditional) toh state galat component ko milegi. ESLint plugin "eslint-plugin-react-hooks" enforce karta hai.',
 code:`// ❌ Wrong — conditional hook
if (isLoggedIn) {
  const [data, setData] = useState(null); // ERROR!
}

// ✓ Correct — condition inside hook
const [data, setData] = useState(null);
useEffect(() => {
  if (isLoggedIn) fetchData();
}, [isLoggedIn]);`,
 tip:'"React hooks = call order matters — linked list internally. Order change = state mixing"'},

{q:'useId, useTransition, useDeferredValue — React 18 new hooks explain karo.',diff:'h',topic:'React 18',
 ans:'useId: SSR-safe unique ID generate karna (label-input pairing ke liye). useTransition: [isPending, startTransition] — non-urgent updates mark karo (search, filter). useDeferredValue: value ka deferred copy — urgent render pehle, deferred baad mein. useTransition = action wrap karo, useDeferredValue = value defer karo.',
 code:`// useId
const id = useId();
<label htmlFor={id}>Name</label>
<input id={id} />

// useTransition
const [isPending, startTransition] = useTransition();
startTransition(() => setFilter(newFilter)); // low priority

// useDeferredValue
const deferredQuery = useDeferredValue(query);
// deferredQuery = slightly stale, fast typing ke liye`,
 tip:'"startTransition = tell React: ye update urgent nahi hai, user input first" — smooth UX ke liye'},

{q:'forwardRef kab aur kaise use karte hain?',diff:'m',topic:'Advanced',
 ans:'forwardRef = parent component ko child DOM element ka ref access dene deta hai. Design system components (Input, Button) mein common. useImperativeHandle se custom ref API expose kar sakte ho.',
 code:`// Child exposes ref
const Input = forwardRef((props, ref) => {
  return <input ref={ref} {...props} />;
});

// Parent uses it
function Form() {
  const inputRef = useRef();
  useEffect(() => inputRef.current.focus(), []);
  return <Input ref={inputRef} placeholder="Search..." />;
}`,
 tip:'"Design system mein almost har input/button component mein forwardRef hona chahiye"'},

{q:'React mein event handling kaise kaam karta hai? Synthetic events kya hain?',diff:'e',topic:'Events',
 ans:'React Synthetic Events = browser native events ka wrapper. Cross-browser compatible, same API sab browsers mein. React event delegation use karta hai — actual DOM node pe nahi, root pe listeners hote hain (React 17+ mein root container). Event pooling React 17 mein remove hua. onClick, onChange, onSubmit — camelCase mein.',
 code:`// Synthetic event
function handleClick(e) {
  e.preventDefault(); // Works same across browsers
  e.stopPropagation(); // Event bubbling rokna
  console.log(e.target.value);
}

// Event delegation — React manages listeners
<button onClick={handleClick}>Click</button>
// Actually: root.addEventListener('click', handler)`,
 tip:'"React mein event delegation = performance benefit — 1000 buttons ke liye 1 listener"'},

{q:'Strict Mode kya karta hai React mein?',diff:'e',topic:'Dev Tools',
 ans:'StrictMode = development-only component jo potential problems detect karta hai. React 18 mein: 1) Components ko twice invoke karta hai (state consistency check). 2) Deprecated lifecycle warnings. 3) Unexpected side effects detect karna. Production builds mein koi effect nahi.',
 code:`// index.js:
root.render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);

// Development mein:
// - Effects twice mount hote hain (intentional!)
// - Helps find cleanup issues
// - Deprecation warnings`,
 tip:'"StrictMode double-invocation = side effects detect karta hai — iska matlab bug nahi hai, feature hai"'},

{q:'React DevTools se performance profiling kaise karte hain?',diff:'m',topic:'Dev Tools',
 ans:'React DevTools Profiler tab: Record button → user actions karo → Stop. Flame graph = component render times. "Why did this render?" shows exact reason. Components tab = props, state, hooks inspect karo. Browser se install karo. Wasted renders = grey (same output), actual renders = colored.',
 code:`// Add display name for better profiling
const UserCard = React.memo(function UserCard(props) {
  return <div>{props.name}</div>;
});
UserCard.displayName = 'UserCard'; // DevTools mein dikhega

// Why-did-you-render library:
// npm install @welldone-software/why-did-you-render`,
 tip:'"Profile karo before optimizing — gut feeling pe React.memo mat lagao everywhere"'},

{q:'key prop sirf lists mein hi use hota hai kya?',diff:'m',topic:'Core',
 ans:'Nahi! key component ko "reset" karne ke liye bhi use kar sakte ho. Jab key change ho, React component ko unmount karta hai aur fresh mount karta hai — state reset hoti hai. Ye ek powerful pattern hai jab tum sirf props change se component reset karna chahte ho.',
 code:`// Key as reset trigger — not just lists!
// userId change pe UserForm completely reset karo
<UserForm key={userId} userId={userId} />
// Jab userId change ho:
// - Old UserForm unmount
// - New UserForm fresh mount
// - All state reset!

// Vs: userId change pe manual reset (complex!)
useEffect(() => { resetForm(); }, [userId]);`,
 tip:'"key = React ka identity. Change it = fresh start" — underused powerful pattern hai ye'},

{q:'Batching kya hai React mein?',diff:'m',topic:'Performance',
 ans:'Batching = multiple setState calls ko ek single re-render mein group karna. React 17 = sirf React event handlers mein batch. React 18 = automatic batching everywhere (setTimeout, fetch callbacks, native events bhi). flushSync se batching rokna possible.',
 code:`// React 18: All updates batched automatically
setTimeout(() => {
  setCount(c => c + 1);
  setFlag(f => !f);
  // React 18: sirf 1 re-render ✓
  // React 17: 2 re-renders ❌
}, 1000);

// Force immediate update:
import { flushSync } from 'react-dom';
flushSync(() => setCount(c => c + 1)); // Immediate re-render`,
 tip:'"React 18 automatic batching = performance improvement bina kuch kiye"'},

{q:'Suspense kya hai aur kaise use karte hain?',diff:'m',topic:'Advanced',
 ans:'Suspense = async operations ke liye loading UI. Use cases: 1) lazy() loaded components, 2) Data fetching (React Query + Suspense mode), 3) React 18 streaming SSR. fallback prop mein loading UI do. Error Boundary ke saath pair karo error handling ke liye.',
 code:`// Code splitting
const Dashboard = lazy(() => import('./Dashboard'));
<Suspense fallback={<Spinner/>}>
  <Dashboard />
</Suspense>

// Data fetching (React Query + Suspense)
const { data } = useSuspenseQuery({
  queryKey: ['users'],
  queryFn: fetchUsers
});
// No isLoading check needed — Suspense handles it!`,
 tip:'"Suspense = declarative loading states — imperative isLoading checks se cleaner code"'},

{q:'Portals kab use karte hain?',diff:'m',topic:'DOM',
 ans:'Portals = component tree se bahar kisi DOM node mein render karo. Use cases: Modal/Dialog (body pe render karo, z-index issues avoid), Tooltips (overflow:hidden parent se escape), Toast notifications. Event bubbling React tree ke through hota hai (DOM nahi) — context still accessible hai.',
 code:`// Modal portal
function Modal({ children }) {
  return createPortal(
    <div className="modal-overlay">
      {children}
    </div>,
    document.body // Render body mein
  );
}

// Component tree mein hai lekin DOM mein body mein:
// React tree: Table → Modal
// DOM: body → .modal-overlay`,
 tip:'"Portal = component tree ka part rehta hai React ke liye — props, context, events sab normal"'},

// TYPESCRIPT
{q:'React mein TypeScript kyun use karein?',diff:'e',topic:'TypeScript',
 ans:'TypeScript = compile-time type safety. Props types autocompletion milti hai IDE mein. Wrong prop type dene pe build fail hota hai runtime se pehle. Refactoring safe ho jaata hai — rename karo, TS sab jagah error dikhata hai. Large teams mein code navigate karna aasaan. interface PropTypes > React.PropTypes (runtime) — faster aur more powerful.',
 code:`// Without TS — runtime error:
function UserCard({ name }) { return <h1>{name.toUpperCase()}</h1> }
<UserCard name={null} /> // Crash at runtime!

// With TS — compile time error:
interface UserCardProps { name: string; }
function UserCard({ name }: UserCardProps) { ... }
<UserCard name={null} /> // TS ERROR: null is not string ✓`,
 tip:'"TypeScript = Laravel ko strict types ke saath use karne jaisa — runtime surprises bahut km ho jaate hain"'},

{q:'TypeScript mein generic types React mein kab useful hain?',diff:'m',topic:'TypeScript',
 ans:'Generics = reusable types with flexibility. useState<User | null>(null), useRef<HTMLInputElement>(null), custom hooks mein generic data types. API functions mein: async function fetchData<T>(url: string): Promise<T>. Generic components: function List<T>({ items, renderItem }: ListProps<T>) — any type ke items ke liye ek component.',
 code:`// Generic API function:
async function fetchData<T>(url: string): Promise<T> {
  const res = await fetch(url);
  return res.json() as T;
}
const users = await fetchData<User[]>('/api/users');

// Generic component:
interface ListProps<T> {
  items: T[];
  renderItem: (item: T) => React.ReactNode;
}
function List<T>({ items, renderItem }: ListProps<T>) {
  return <ul>{items.map(renderItem)}</ul>;
}`,
 tip:'"Generics = DRY principle for types — ek function/component multiple types ke saath kaam kare"'},

// PERFORMANCE
{q:'React app slow ho rahi hai — kaise debug aur fix karein?',diff:'h',topic:'Performance',
 ans:'Step 1: React DevTools Profiler se identify karo kaunse components slow hain. Step 2: Why did this render? check karo. Step 3: Solutions: React.memo for pure components, useMemo for expensive calcs, useCallback for stable fn refs, code splitting for large bundles, virtualization for long lists, state ko zyada neeche move karo (avoid lifting too high).',
 code:`// Debug tools:
// 1. React DevTools Profiler
// 2. Why-did-you-render package
// 3. Chrome Performance tab

// Common fixes:
const MemoizedRow = React.memo(TableRow);           // unnecessary re-renders
const filtered = useMemo(() => filter(data), [data]); // expensive calc
const onClick = useCallback(() => handle(id), [id]);  // stable fn
const BigList = lazy(() => import('./BigList'));       // code split

// Long lists — virtualize:
import { FixedSizeList } from 'react-window';`,
 tip:'"Profile → Identify bottleneck → Fix specific issue. Never randomly add memos everywhere"'},

{q:'Re-render kab hota hai React mein aur kaise rokein?',diff:'m',topic:'Performance',
 ans:'Re-render triggers: 1) State change (setState). 2) Props change. 3) Parent re-render. 4) Context change. Rokne ke tarike: React.memo (props same hain toh skip). useMemo (computed value same rakhna). useCallback (function reference stable). State ko lower tree mein move karo. Context split karo.',
 code:`// Context split — re-renders minimize:
// Bad: ek context mein sab
const AppContext = createContext({ user, theme, cart, language });
// Good: separate contexts
const UserContext = createContext(user);
const ThemeContext = createContext(theme);
// Sirf relevant context change pe re-render hoga

// State colocation — push state down:
// Bad: parent mein state, sirf child use karta hai
// Good: child mein state rakhna = parent re-render nahi`,
 tip:'"State ko us component mein rakho jo actually use karta hai — unnecessarily lift mat karo"'},

// HOOKS ADVANCED
{q:'useImperativeHandle kya karta hai?',diff:'h',topic:'Hooks',
 ans:'useImperativeHandle = forwardRef ke saath use karo — parent ko sirf specific methods expose karo, poora DOM nahi. Design system mein useful: Input component sirf focus() expose kare, parent doosre DOM properties touch na kar sake. Encapsulation principle.',
 code:`const FancyInput = forwardRef((props, ref) => {
  const inputRef = useRef();
  
  useImperativeHandle(ref, () => ({
    focus: () => inputRef.current.focus(),
    clear: () => inputRef.current.value = '',
    // poora DOM nahi — sirf ye 2 methods
  }));
  
  return <input ref={inputRef} {...props} />;
});

// Parent:
const ref = useRef();
ref.current.focus(); // ✓ only exposed methods
ref.current.value;   // ❌ not exposed`,
 tip:'"useImperativeHandle = API design — implementation hide karo, interface expose karo"'},

{q:'useInsertionEffect kya hai aur kab use hota hai?',diff:'h',topic:'Hooks',
 ans:'useInsertionEffect = CSS-in-JS libraries ke liye. DOM mutations se pehle chalta hai — useLayoutEffect se bhi pehle. CSS inject karne ke liye (styled-components, emotion internally use karte hain). Normal app code mein kabhi use nahi karna chahiye — library authors ke liye hai.',
 code:`// Library code mein (not app code!):
useInsertionEffect(() => {
  // DOM mutations se pehle CSS inject karo
  const style = document.createElement('style');
  style.textContent = generatedCSS;
  document.head.appendChild(style);
  return () => style.remove();
}, [generatedCSS]);

// Execution order:
// useInsertionEffect → DOM mutation → useLayoutEffect → Paint → useEffect`,
 tip:'"Normal apps mein kabhi use mat karo — ye styled-components jaise libraries ke internal use ke liye hai"'},

// NEXT.JS
{q:'Next.js mein SSR, SSG, ISR kya hain?',diff:'m',topic:'Next.js',
 ans:'SSR (Server Side Rendering): Har request pe server HTML generate karta hai. Fresh data, SEO friendly. Laravel ke traditional rendering jaisa. SSG (Static Site Generation): Build time pe HTML generate. Super fast, CDN pe serve. Blog, docs ke liye. ISR (Incremental Static Regeneration): SSG + background refresh. revalidate time set karo. Best of both worlds.',
 code:`// SSR — App Router (Server Component):
async function Page() {
  const data = await fetch('/api', { cache: 'no-store' }); // no cache
  return <UI data={data} />;
}

// SSG — build time:
async function Page() {
  const data = await fetch('/api'); // cached by default
  return <UI data={data} />;
}

// ISR — revalidate:
const data = await fetch('/api', { next: { revalidate: 60 } }); // 60 sec`,
 tip:'"Laravel rendering = SSR. Static sites = SSG. Blog with fresh data = ISR. Choose based on data freshness need"'},

{q:'Next.js Server Actions kya hain?',diff:'h',topic:'Next.js',
 ans:'Server Actions = React 19 feature, Next.js mein available. Client component se directly server function call karo — API route banane ki zaroorat nahi. Form submission, data mutations ke liye. "use server" directive se mark karo. Laravel Controller mein directly function call karne jaisa.',
 code:`// Server Action define karo
'use server';
async function createUser(formData: FormData) {
  const name = formData.get('name');
  await db.user.create({ data: { name } });
  revalidatePath('/users');
}

// Client mein use karo:
<form action={createUser}> // No API route needed!
  <input name="name" />
  <button type="submit">Create</button>
</form>

// Or programmatically:
const result = await createUser(data);`,
 tip:'"Server Actions = Laravel form submit karke redirect jaisa — client-server roundtrip simplest possible"'},

// STATE MANAGEMENT
{q:'Zustand vs Context API — kab kya use karein?',diff:'m',topic:'State',
 ans:'Context API: Simple, built-in, no dependency. Lekin har context update pe sab consumers re-render hote hain. Simple global state (theme, language, auth) ke liye theek. Zustand: Selective subscriptions — sirf relevant slice use karo. No provider boilerplate. Middleware (persist, devtools). Medium apps ke liye perfect. Redux Toolkit: Large teams, complex logic, DevTools time-travel.',
 code:`// Context — auth ke liye (rarely changes):
const { user } = useContext(AuthContext); // OK

// Zustand — cart ke liye (frequently changes):
const items = useCartStore(state => state.items); // selective
// Sirf items change pe re-render, total change pe nahi

// RTK — complex enterprise app:
const { data } = useAppSelector(selectFilteredUsers);
// Memoized selectors, DevTools, middleware`,
 tip:'"Rule of thumb: Context = infrequent global data. Zustand = frequent updates. RTK = large team, complex logic"'},

// TESTING
{q:'React mein testing ke liye kya tools use karte hain?',diff:'m',topic:'Testing',
 ans:'Test runner: Vitest (Vite projects) ya Jest. Component testing: React Testing Library (RTL). API mocking: MSW (Mock Service Worker). E2E testing: Playwright ya Cypress. Unit testing: Vitest + RTL combination most popular hai. coverage report ke liye --coverage flag.',
 code:`// Vitest + RTL setup:
// vitest.config.ts:
test: { environment: 'jsdom', globals: true }

// Test file:
import { render, screen } from '@testing-library/react';
import userEvent from '@testing-library/user-event';

test('button click updates count', async () => {
  const user = userEvent.setup();
  render(<Counter />);
  await user.click(screen.getByRole('button'));
  expect(screen.getByText('1')).toBeInTheDocument();
});`,
 tip:'"Test behavior, not implementation — getByRole > getByTestId. Test kya user dekhta hai"'},

{q:'Snapshot testing kya hai aur iske drawbacks kya hain?',diff:'m',topic:'Testing',
 ans:'Snapshot testing = component ka HTML output save karo, future mein compare karo. Accidental UI changes catch karna. Drawbacks: 1) Snapshots stale ho jaate hain — developers blindly update karte hain. 2) Too large snapshots = meaningless. 3) Implementation detail test karte hain. Better alternative: RTL + specific assertions. Snapshots sirf stable UI components ke liye useful.',
 code:`// Snapshot test:
test('renders correctly', () => {
  const { container } = render(<Button>Click</Button>);
  expect(container).toMatchSnapshot();
});
// .snap file generate hoti hai — commit karo

// Better alternative:
test('button renders correctly', () => {
  render(<Button>Click</Button>);
  expect(screen.getByRole('button')).toHaveTextContent('Click');
  expect(screen.getByRole('button')).toBeEnabled();
});`,
 tip:'"Snapshots = lazy testing. RTL assertions = meaningful testing. Prefer specific over snapshot"'},

// PATTERNS
{q:'React mein data fetching ke patterns kya hain?',diff:'m',topic:'Patterns',
 ans:'1) useEffect + fetch (basic, boilerplate heavy). 2) React Query/SWR (recommended for most). 3) React Query + Suspense (cleanest DX). 4) Server Components in Next.js (zero client JS). Pattern choose karna: Small app = useEffect OK. Production = React Query. Next.js = Server Components + React Query hybrid.',
 code:`// 1. useEffect (basic)
useEffect(() => { fetch('/api').then(setData); }, []);

// 2. React Query (recommended)
const { data, isLoading } = useQuery({queryKey:['data'], queryFn: fetchFn});

// 3. With Suspense (cleanest)
const { data } = useSuspenseQuery({queryKey:['data'], queryFn: fetchFn});
// No isLoading check — Suspense handles it

// 4. Next.js Server Component (best performance)
async function Page() {
  const data = await db.findMany(); // direct DB!
  return <UI data={data}/>;
}`,
 tip:'"Next.js mein Server Components + React Query combination = ultimate stack"'},

{q:'Lifting State Up kya hai?',diff:'e',topic:'Patterns',
 ans:'Lifting state up = shared state ko lowest common ancestor mein rakho. Jab 2 sibling components same data chahiye — unke parent mein state rakho, dono ko props ke through do. Over-lifting problem bhi hai — state bahut upar le gaye toh props drilling ho jaata hai. Solution: Context ya State management library.',
 code:`// Problem: Dono components ko temperature chahiye
function TemperatureDisplay() { /* needs temp */ }
function TemperatureControl() { /* changes temp */ }

// Solution: Lift to parent
function TemperatureApp() {
  const [temp, setTemp] = useState(20); // lifted here
  return (
    <>
      <TemperatureDisplay temp={temp} />
      <TemperatureControl temp={temp} onChange={setTemp} />
    </>
  );
}`,
 tip:'"Lift state up jab siblings share karein — but too high = props drilling, Context se solve karo"'},

{q:'React mein composition kya hai? Inheritance se kyun better hai?',diff:'m',topic:'Patterns',
 ans:'React explicitly recommends composition over inheritance. children prop se flexible components banao. Inheritance se component hierarchy banana React mein anti-pattern hai. "Specialization" bhi composition se achieve karo — ek generic component ko props se specialize karo.',
 code:`// Inheritance ❌ React mein avoid karo
class SpecialButton extends Button { ... }

// Composition ✓
function Button({ children, variant, ...props }) {
  return <button className={variant} {...props}>{children}</button>;
}
// Specialize with props:
function PrimaryButton(props) {
  return <Button variant="primary" {...props} />;
}
// Flexible children:
function Card({ children }) {
  return <div className="card">{children}</div>;
}`,
 tip:'"children prop = Laravel @yield jaisa — parent decide nahi karta content kya ho, consumer decide karta hai"'},

{q:'React 19 mein kya naya aaya?',diff:'h',topic:'React 18+',
 ans:'React 19 major features: 1) Actions — async transitions with form handling. 2) useActionState hook — form state + action combine. 3) useOptimistic — optimistic UI updates. 4) use() hook — promises aur contexts read karna. 5) Server Actions stable. 6) ref as prop (no more forwardRef needed). 7) Improved hydration error messages.',
 code:`// useActionState — React 19
const [state, formAction, isPending] = useActionState(
  async (prevState, formData) => {
    const result = await submitForm(formData);
    return result;
  },
  initialState
);

// useOptimistic
const [optimisticItems, addOptimistic] = useOptimistic(items);
// Instantly show item, revert if API fails

// use() hook
const user = use(UserPromise); // Suspense mein resolve hota hai
const theme = use(ThemeContext); // useContext replacement`,
 tip:'"React 19 = forms aur async operations bahut simpler ho gaye — Server Actions + useActionState = game changer"'},

{q:'Lazy loading images React mein kaise karte hain?',diff:'e',topic:'Performance',
 ans:'Native browser lazy loading: loading="lazy" attribute on img. React mein: Next.js ka next/image (automatic lazy loading + optimization). react-intersection-observer se custom implementation. Intersection Observer API directly bhi use kar sakte ho.',
 code:`// 1. Native (simplest):
<img src="/photo.jpg" loading="lazy" alt="photo" />

// 2. Next.js Image (recommended for Next.js):
import Image from 'next/image';
<Image src="/photo.jpg" width={400} height={300} alt="photo" />
// Automatically: lazy, WebP format, responsive sizes

// 3. Custom with Intersection Observer:
const { ref, inView } = useInView({ triggerOnce: true });
<div ref={ref}>
  {inView && <img src="/photo.jpg" alt="photo" />}
</div>`,
 tip:'"Next.js Image component = sab kuch automatic — lazy, format, size optimization. Use it!"'},

{q:'Accessibility (a11y) React mein kaise ensure karein?',diff:'m',topic:'Accessibility',
 ans:'1) Semantic HTML use karo — button not div. 2) aria-* attributes jahan zaroori ho. 3) keyboard navigation test karo. 4) Focus management (modal open/close pe). 5) useId() se label-input pair. 6) Color contrast check. 7) axe-core ya eslint-plugin-jsx-a11y se auto-check. RTL ke getByRole() queries accessibility encourage karte hain.',
 code:`// ❌ Inaccessible:
<div onClick={handleClick}>Click me</div>

// ✓ Accessible:
<button onClick={handleClick}>Click me</button>

// ARIA labels:
<button aria-label="Delete user Rahul">🗑</button>

// Focus management in modal:
useEffect(() => {
  if (isOpen) closeButtonRef.current?.focus();
}, [isOpen]);

// Keyboard trap in modal:
// react-focus-trap-hook use karo`,
 tip:'"RTL mein getByRole() use karna = accessibility test bhi ho raha hai implicitly"'},
];

let currentTopic = null;
let currentStep = 0;
let interviewFilter = 'all';
let searchQuery = '';

function buildSidebar(){
  const cats = {};
  CONCEPTS.forEach((c,i)=>{
    if(!cats[c.cat]) cats[c.cat]=[];
    cats[c.cat].push({...c,idx:i});
  });
  let h='';
  for(const cat in cats){
    h+=`<div class="cat-label">${cat}</div>`;
    cats[cat].forEach(c=>{
      const dc=c.diff==='e'?'e':c.diff==='m'?'m':c.diff==='h'?'h':'x';
      h+=`<button class="topic-btn" data-name="${c.name.toLowerCase()}" onclick="loadTopic(${c.idx})">
        <span class="diff-dot diff-${dc}"></span>
        <span class="tb-name">${c.name}</span>
        <span class="tb-tag" style="background:var(--bg4);color:var(--text3)">${c.tag}</span>
      </button>`;
    });
  }
  document.getElementById('sidebarContent').innerHTML=h;
  const ql=document.getElementById('quickLinks');
  if(ql){
    let qh='';
    CONCEPTS.slice(0,8).forEach((c,i)=>{
      qh+=`<div class="qc" onclick="loadTopic(${i})"><div>${c.name}</div><span class="qc-tag">${c.tag}</span></div>`;
    });
    ql.innerHTML=qh;
  }
}

function filterTopics(q){
  searchQuery=q.toLowerCase();
  document.querySelectorAll('.topic-btn').forEach(b=>{
    const name=b.dataset.name||'';
    b.style.display=(!searchQuery||name.includes(searchQuery))?'flex':'none';
  });
}

function loadTopic(idx){
  currentTopic=CONCEPTS[idx];
  currentStep=0;
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('interviewScreen').style.display='none';
  const cs=document.getElementById('conceptScreen');
  cs.style.display='flex';
  document.querySelectorAll('.topic-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const diff=currentTopic.diff;
  const dc=diff==='e'?'e':diff==='m'?'m':'h';
  const dl=diff==='e'?'Beginner':diff==='m'?'Intermediate':'Advanced';
  cs.innerHTML=`
<div class="concept-header">
  <div class="concept-title">${currentTopic.name}</div>
  <span class="concept-tag">${currentTopic.tag}</span>
  <span class="diff-badge ${dc}">${dl}</span>
</div>
<div class="concept-desc">${currentTopic.desc}</div>
<div class="top-grid" style="flex:1;min-height:0">
  <div class="left-col" style="overflow-y:auto">
    <div class="panel">
      <div class="panel-hd"><span class="panel-hd-dot panel-hd-dot2"></span>React Code</div>
      <div class="code-wrap" id="sqlCode"></div>
    </div>
    <div class="panel">
      <div class="panel-hd"><span class="panel-hd-dot"></span>Laravel / PHP Equivalent</div>
      <div class="laravel-wrap"><div class="lv-label">Comparison</div><div class="lv-code" id="cppHint"></div></div>
    </div>
  </div>
  <div class="right-col" style="overflow-y:auto">
    <div class="panel" style="flex-shrink:0">
      <div class="step-bar" id="stepBar"></div>
      <div class="viz viz-fade" id="vizArea"></div>
    </div>
    <div class="explain" id="explainBox">
      <div class="explain-lbl">Kya ho raha hai</div>
      <div class="explain-txt" id="explainTxt"></div>
    </div>
    <div class="nav-row">
      <button class="nb" id="prevBtn" onclick="prevStep()">← Pichla</button>
      <span class="sc" id="sc"></span>
      <button class="nb" id="nextBtn" onclick="nextStep()">Agla →</button>
    </div>
  </div>
</div>`;
  renderStep();
}

function renderStep(){
  if(!currentTopic) return;
  const steps=currentTopic.steps;
  const step=steps[currentStep];
  const sb=document.getElementById('stepBar');
  sb.innerHTML=steps.map((s,i)=>`<button class="step-pill${i===currentStep?' active':''}" onclick="goStep(${i})">${s.label}</button>`).join('');
  const codeEl=document.getElementById('sqlCode');
  codeEl.innerHTML=currentTopic.query.map((q,li)=>{
    const hl=step.qL&&step.qL.includes(li);
    return`<span class="code-line${hl?' hl':''}">${q.t||' '}</span>`;
  }).join('');
  document.getElementById('cppHint').innerHTML=step.laravel||'';
  document.getElementById('vizArea').innerHTML=step.render();
  document.getElementById('explainTxt').innerHTML=step.explain||'';
  document.getElementById('sc').textContent=`${currentStep+1} / ${steps.length}`;
  document.getElementById('prevBtn').disabled=currentStep===0;
  document.getElementById('nextBtn').disabled=currentStep===steps.length-1;
  const bar=document.querySelector('.progress-bar');
  if(bar) bar.querySelector('.progress-fill').style.width=`${((currentStep+1)/steps.length)*100}%`;
}

function goStep(i){currentStep=i;renderStep();}
function nextStep(){if(currentStep<currentTopic.steps.length-1){currentStep++;renderStep();}}
function prevStep(){if(currentStep>0){currentStep--;renderStep();}}

function showInterview(){
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('conceptScreen').style.display='none';
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  const is=document.getElementById('interviewScreen');
  is.style.display='flex';
  is.style.flexDirection='column';
  renderInterview();
}

function renderInterview(){
  const is=document.getElementById('interviewScreen');
  const filtered=INTERVIEW_QS.filter(q=>
    interviewFilter==='all'||q.diff===interviewFilter||q.topic.toLowerCase()===interviewFilter
  );
  const topics=[...new Set(INTERVIEW_QS.map(q=>q.topic))];
  is.innerHTML=`
<div class="interview-header">
  <span style="font-size:20px">🎯</span>
  <div class="interview-title">React Interview Questions</div>
  <span style="margin-left:auto;font-size:12px;color:var(--text3)">${INTERVIEW_QS.length} questions • ${filtered.length} showing</span>
</div>
<div class="interview-body">
  <div class="q-filter-row">
    <button class="q-filter${interviewFilter==='all'?' active':''}" onclick="setFilter('all')">All (${INTERVIEW_QS.length})</button>
    <button class="q-filter${interviewFilter==='e'?' active':''}" onclick="setFilter('e')" style="color:var(--green)">● Beginner</button>
    <button class="q-filter${interviewFilter==='m'?' active':''}" onclick="setFilter('m')" style="color:var(--amber)">● Intermediate</button>
    <button class="q-filter${interviewFilter==='h'?' active':''}" onclick="setFilter('h')" style="color:var(--coral)">● Advanced</button>
    ${topics.map(t=>`<button class="q-filter${interviewFilter===t.toLowerCase()?' active':''}" onclick="setFilter('${t.toLowerCase()}')">${t}</button>`).join('')}
  </div>
  ${filtered.map((q,i)=>`
  <div class="q-card" id="qcard${i}" onclick="toggleQ(${i})">
    <div class="q-header">
      <span class="q-num">Q${INTERVIEW_QS.indexOf(q)+1}</span>
      <div style="flex:1">
        <div class="q-text">${q.q}</div>
        <div class="q-meta">
          <span class="q-diff ${q.diff}">${q.diff==='e'?'Beginner':q.diff==='m'?'Intermediate':'Advanced'}</span>
          <span class="q-topic">${q.topic}</span>
        </div>
      </div>
      <span class="q-arrow">▾</span>
    </div>
    <div class="q-answer">
      <div class="q-ans-label">Answer</div>
      <div class="q-ans-text">${q.ans}</div>
      ${q.code?`<pre class="q-code">${escapeHtml(q.code)}</pre>`:''}
      ${q.tip?`<div class="q-tip"><div class="q-tip-label">💡 Interview Tip</div>${q.tip}</div>`:''}
    </div>
  </div>`).join('')}
</div>`;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toggleQ(i){const c=document.getElementById('qcard'+i);c.classList.toggle('open');}
function setFilter(f){interviewFilter=f;renderInterview();}

buildSidebar();
</script>
</body>
</html>
